probe_id: latin_america_family_5B
name: Chile, Institutional Restructuring, Polarization, and Democratic Rupture
version: 0.1
status: candidate
format: probe_spec_v2
benchmark_pack: v0
compatibility_tier: v0-legacy

summary:
  purpose: >-
    Evaluate whether the intermediate graph representation can model a
    democratic road to socialist transformation, constitutional conflict,
    class polarization, military repositioning, economic disruption,
    external pressure, and regime rupture in Chile without collapsing the
    case into either leader biography, Cold War shorthand, or a single-day
    coup narrative.
  rationale: >-
    This probe adds Latin America to the suite through a tightly bounded
    institutional-breakdown case. It tests whether the same schema can
    represent how party competition, executive-legislative conflict, labor
    and business mobilization, military autonomy, legitimacy struggles,
    external constraint, and crisis sequencing interacted between the rise
    of Allende and the Pinochet coup while remaining queryable, grounded,
    and GNN-consumable.

scope:
  region: Latin America
  polity: Chile and interacting domestic and external actors
  temporal_window:
    start_year: 1964
    end_year: 1973
    label: Christian Democratic reformism, Allende's rise, Unidad Popular government, and military coup
  recommended_slices:
    - slice_id: reformist_preconditioning_and_party_system_strain
      start_year: 1964
      end_year: 1969
      label: Frei-era reformism, agrarian and social restructuring, party-system polarization, and preconditions for Unidad Popular
    - slice_id: allende_victory_and_institutional_confrontation
      start_year: 1970
      end_year: 1972
      label: Electoral victory, democratic socialist restructuring, constitutional bargaining, nationalization, and mounting confrontation
    - slice_id: terminal_breakdown_and_coup_pathway
      start_year: 1973
      end_year: 1973
      label: Institutional paralysis, strike waves, military repositioning, failed counterweights, and coup
  exclusions:
    - Post-1973 dictatorship and post-authoritarian settlement except as out-of-sample continuation labels
    - Treating Chilean politics as reducible to a superpower proxy contest with no domestic institutions or class actors
    - Treating the coup as an isolated terminal event with no graphable pathway of institutional erosion and counterweight failure
    - Purely retrospective democratic or anti-communist narratives unless used as contrastive annotations

artifacts:
  human_authored:
    - probe_spec
  frozen_inputs:
    - slice_entity_lists
    - source_snapshots
    - target_tables
    - election_and_vote_tables
    - institutional_conflict_tables
    - strike_and_mobilization_tables
    - external_constraint_tables
  machine_generated:
    - extracted_claims
    - linked_entities
    - instantiated_graphs
    - node_projection_tables
    - coalition_alignment_tables
    - institutional_breakdown_path_tables
    - ideology_alignment_tables

grounded_sources:
  structural_backbone:
    - source: Seshat Global History Databank
      role: >-
        Optional long-run context for governance, inequality, elite
        structure, and comparison-class reasoning about institutional
        capacity and political complexity in Latin America.
      required: false
  entity_spine:
    - source: Wikidata
      role: >-
        Stable IDs for actors, parties, coalitions, institutions, offices,
        military formations, firms, strikes, elections, and key events.
      required: true
    - source: Wikipedia
      role: >-
        Narrative grounding, chronology, entity expansion, and structured
        reconstruction of institutional conflict, mobilization, and coup
        sequence.
      required: true
  optional_forecast_layer:
    - source: Polymarket or similar forecast market when relevant for later companion probes
      role: >-
        Reserved for future bridge probes on democratic stress or coup-risk
        forecasting; not required inside 5B.
      required: false

core_question:
  text: >-
    Can a single graph schema represent how reformist restructuring,
    electoral realignment, ideological conflict, nationalization,
    executive-legislative confrontation, class mobilization, military
    autonomy, counterweight failure, and external pressure interacted to
    produce democratic rupture in Chile between the rise of Allende and the
    Pinochet coup in a way that is queryable and GNN-consumable?

historical_subquestions:
  - Which material reforms and sectoral restructurings altered political coalitions before and during the Unidad Popular period?
  - Which institutions organized, constrained, or failed to constrain executive power, opposition strategy, military autonomy, and constitutional conflict?
  - Which narratives and norms legitimized democratic socialism, anti-Marxist defense of order, constitutionalism, property rights, popular power, or exceptional intervention?
  - Which counterweights to democratic rupture existed, and why were they not decisive?
  - Through which business, labor, media, military, and party channels did polarization become institutionally consequential?
  - Through which external channels did foreign pressure, capital flight, sanctions-like pressure, covert support, or diplomatic alignment shape domestic possibilities?
  - Which shocks changed the trajectory, and through what pathways?
  - What differs between reformist preconditioning, institutional confrontation under Allende, and terminal breakdown in 1973?

schema_requirements:
  must_represent:
    node_types:
      - Actor
      - Institution
      - Office
      - Party
      - Coalition
      - AdministrativeRegion
      - MilitaryFormation
      - SecurityApparatus
      - Enterprise
      - Resource
      - LaborUnion
      - BusinessAssociation
      - SocialMovement
      - MediaOutlet
      - Event
      - Policy
      - Narrative
      - Norm
      - Counterweight
      - Shock
      - Claim
      - ExternalPower
      - ExternalConstraint
      - ConstitutionalBody
      - EconomicSector
    edge_types:
      - governs
      - contests
      - coalitions_with
      - supports
      - withdraws_support_from
      - nationalizes
      - regulates
      - mobilizes
      - strikes_against
      - commands
      - pressures
      - finances
      - legitimizes
      - delegitimizes
      - constrains
      - undermines
      - presupposes
      - depends_on
      - responds_to
      - coordinates_with
      - polarizes
      - intervenes_in
      - votes_against
      - appeals_to
      - overthrows
      - aligns_with
      - mediates
      - sabotages
    must_support:
      - time-scoped edges and nodes
      - uncertain or contested claims
      - many-to-many relations via relation nodes if needed
      - perspective-aware queries (e.g., presidency, Unidad Popular, Christian Democrats, National Party, Congress, Supreme Court, armed forces, business associations, labor federations, neighborhood organizations, external actors)
      - fixed-dimensional node projections for downstream GNN training
      - explicit distinction between party competition, constitutional bodies, class organizations, military command, and external intervention
      - explicit representation of institutional veto points and constitutional conflict
      - explicit representation of strikes, shortages, and economic disruption as structured political objects rather than background conditions
      - explicit representation of ideology, legitimacy, and legality claims as typed graph nodes
      - explicit representation of military autonomy and civilian-military boundary shifts as graph structure
    anti_requirements:
      - Do not collapse the case into biography of Salvador Allende, Augusto Pinochet, or any single actor.
      - Do not treat the coup as a single unexplained terminal event with no build-up of institutional breakdown.
      - Do not collapse ideology into untyped text blobs.
      - Do not reduce external influence to vague Cold War context without explicit channels, actors, and dependencies.
      - Do not treat Congress, courts, parties, labor, business associations, and armed forces as one generic elite node.

expected_graph_axes:
  material:
    - agrarian reform and land conflict
    - copper nationalization and control of strategic sectors
    - inflation, shortages, distribution conflict, and supply disruption
    - wage politics, labor militancy, and sectoral bargaining
    - transport and logistics disruption, including truckers' strike dynamics
  institutional:
    - presidency and executive strategy
    - National Congress and legislative veto structure
    - constitutional guarantees and constitutional interpretation
    - judiciary and legality claims
    - armed forces high command and shifting autonomy
    - Carabineros and public-order apparatus
    - party system, coalitions, and cabinet reshuffling
  ideological:
    - democratic road to socialism
    - anti-Marxist order, property, and anti-chaos narratives
    - constitutionalism and legality
    - popular power and mass participation
    - anti-imperialism and sovereignty
    - national security and exceptional intervention claims
  counterweights:
    - constitutional bargaining and statute-of-guarantees logic
    - centrist mediation by Christian Democrats or institutional brokers
    - cabinet inclusion of military figures as stabilizing mechanism
    - electoral legitimacy and parliamentary negotiation
    - labor discipline and civic restraint mechanisms
    - cross-class compromise attempts that failed or unraveled
  asymmetry_and_external_constraint:
    - U.S. pressure, covert intervention, and diplomatic leverage
    - business confidence, capital flight, and investment pressure
    - dependence on export earnings and external finance
    - Cold War ideological signaling as a constraint on elite strategy
    - unequal leverage between domestic reform project and external commercial-financial actors
  class_and_sectoral_organization:
    - CUT and other labor organizations
    - truck owners and transport business coordination
    - employer associations and professional bodies
    - neighborhood and local popular organizations
    - strategic firms, especially in mining and distribution
  media_and_legitimacy:
    - newspapers and broadcast platforms shaping legality and disorder narratives
    - rumor, salience, and legitimacy crises
    - framing of strikes, shortages, and violence
    - military self-legitimation and anti-government messaging

seed_entities:
  actors:
    - Salvador Allende
    - Eduardo Frei Montalva
    - Augusto Pinochet
    - Patricio Aylwin
    - Carlos Prats
    - Augusto Olivares
    - Unidad Popular
    - Christian Democratic Party of Chile
    - National Party of Chile
    - Central Unitaria de Trabajadores
    - Chilean truck owners associations
    - Chilean Armed Forces
    - Carabineros de Chile
    - United States government
    - Central Intelligence Agency
    - International Telephone and Telegraph
  events:
    - 1964 Chilean presidential election
    - agrarian reform expansion in the late 1960s
    - 1970 Chilean presidential election
    - Statute of Constitutional Guarantees
    - nationalization of copper in 1971
    - October 1972 strike wave
    - Tanquetazo
    - Chamber of Deputies resolution of August 1973
    - 1973 Chilean coup d'etat
  institutions:
    - Presidency of Chile
    - National Congress of Chile
    - Chamber of Deputies of Chile
    - Senate of Chile
    - Supreme Court of Chile
    - Constitutional bodies and electoral authorities
    - Chilean Army high command
    - Carabineros command
    - state economic ministries
  places:
    - Chile
    - Santiago
    - Valparaiso
    - Concepcion
    - Chuquicamata
    - copper-mining regions
    - key transport corridors
  enterprises_and_sectors:
    - Codelco predecessor copper structures
    - ITT
    - copper sector
    - transport sector
    - retail and distribution channels
    - agrarian estates and reform zones

generic_target_interface:
  graph_level_targets:
    - institutional_coherence_score
    - polarization_score
    - legitimacy_score
    - counterweight_strength_score
    - external_constraint_score
    - military_autonomy_score
    - economic_disruption_score
  slice_transition_targets:
    - coalition_cohesion_delta
    - elite_fragmentation_delta
    - strike_intensity_delta
    - institutional_conflict_delta
    - coup_risk_delta
    - external_pressure_delta
  rule: All targets must be computable from evidence available at or before the slice cutoff.

probe_tasks:
  retrieval_tasks:
    - id: rt1
      prompt: Which institutions and constitutional arrangements constrained or escalated confrontation between the Allende government and its opponents?
      expected_answer_shape:
        - Institution
        - ConstitutionalBody
        - Policy
        - Event
        - Edge path with constrains/contests/votes_against/appeals_to semantics
    - id: rt2
      prompt: Which narratives and norms made democratic socialism, anti-Marxist defense of order, or military intervention appear legitimate to different actors?
      expected_answer_shape:
        - Narrative
        - Norm
        - Actor
        - Claim
    - id: rt3
      prompt: Which labor, business, and sectoral organizations transformed economic conflict into political crisis?
      expected_answer_shape:
        - LaborUnion
        - BusinessAssociation
        - Enterprise
        - EconomicSector
        - Event
        - Edge path with mobilizes/strikes_against/pressures/sabotages semantics
    - id: rt4
      prompt: Through which external channels did foreign actors shape domestic political possibilities?
      expected_answer_shape:
        - ExternalPower
        - ExternalConstraint
        - Enterprise
        - Event
        - Edge path with finances/pressures/intervenes_in/depends_on semantics
    - id: rt5
      prompt: What plausible counterweights to rupture existed, and why did they fail?
      expected_answer_shape:
        - Counterweight
        - Institution
        - Actor
        - Claim
        - Edge path with mediates/constrains/undermines/withdraws_support_from semantics
    - id: rt6
      prompt: How did reformist preconditioning differ structurally from terminal breakdown in 1973?
      expected_answer_shape:
        - time-scoped subgraphs across at least two slices
  structural_tasks:
    - id: st1
      check: Can the IR keep the same entity identity across slices while allowing coalition shifts, cabinet changes, and military role changes?
    - id: st2
      check: Can the IR represent both slow institutional erosion and acute rupture events?
    - id: st3
      check: Can the IR distinguish constitutional legality claims from pure coercive power?
    - id: st4
      check: Can the IR represent labor, business, and media organizations as causal intermediaries rather than background context?
    - id: st5
      check: Can the IR encode contested interpretations of democratic legitimacy, class conflict, and foreign intervention without deleting minority claims?
  gnn_tasks:
    - id: gt1
      target: Predict next-slice institutional-conflict bucket from prior slice graph state.
    - id: gt2
      target: Predict whether a counterweight structure produces stabilization, stalemate, or further rupture.
    - id: gt3
      target: Predict next-slice strike-intensity category from graph state.
    - id: gt4
      target: Predict next-slice coup-risk bucket from prior graph state.

labels_and_targets:
  supervised_targets:
    institutional_breakdown_score:
      description: Degree to which executive, legislative, judicial, and military relations become mutually incompatible in the next slice.
      source_priority:
        - Wikipedia chronology extraction on cabinet crises, congressional resolutions, judicial conflict, and command changes
        - Wikidata event chronology
      leakage_rule: No post-slice evidence in feature construction.
      target_construction_rule: Freeze evidence by slice cutoff and emit one deterministic target record per slice.
    polarization_intensity_score:
      description: Degree of elite and mass polarization across parties, coalitions, and sectoral organizations in the next slice.
      source_priority:
        - election and coalition tables
        - article-derived relation counts on coalition splits, strike waves, and narrative conflict
        - Wikipedia chronology extraction
      leakage_rule: No post-slice evidence in feature construction.
      target_construction_rule: Freeze evidence by slice cutoff and summarize only contemporaneously visible alignment and conflict patterns.
    counterweight_failure_score:
      description: Degree to which mediation, constitutional bargaining, and centrist restraint fail to prevent escalation in the next slice.
      source_priority:
        - institutional conflict tables
        - chronology of negotiations, guarantees, cabinet rearrangements, and failed mediation efforts
      leakage_rule: Do not backfill failure using knowledge of the coup outcome when scoring earlier slices.
      target_construction_rule: Construct from pre-cutoff evidence on presence, weakening, withdrawal, or ineffectiveness of counterweights.
    military_intervention_risk:
      description: Estimated proximity of military intervention as inferable from prior graph structure and pre-cutoff events.
      source_priority:
        - command changes, public statements, failed interventions, and crisis events in chronology tables
        - article-derived relation counts on military autonomy, alignment, and civilian breakdown
      leakage_rule: No direct use of coup occurrence inside feature construction for earlier slices.
      target_construction_rule: Emit ordinal risk category using only evidence available before the slice endpoint.
    external_constraint_score:
      description: Degree to which foreign pressure, capital leverage, covert intervention, or diplomatic isolation shape domestic room for maneuver in the next slice.
      source_priority:
        - Wikipedia chronology extraction on foreign relations and intervention claims
        - article-derived relation counts on financing, pressure, and dependency
      leakage_rule: No post-slice archival revelations should enter earlier-slice features unless they describe information known within the slice.
      target_construction_rule: Score only channels visible or inferable from contemporaneous evidence at cutoff.
    economic_disruption_proxy:
      description: Degree to which shortages, strikes, distribution conflict, and sectoral disruption intensify political crisis.
      source_priority:
        - strike and mobilization tables
        - chronology of shortages, strikes, nationalizations, and transport conflict
        - article-derived event and relation counts
      leakage_rule: No post-slice evidence in feature construction.
      target_construction_rule: Aggregate only pre-cutoff disruption signals into one deterministic record per slice.
  weak_labels:
    - Wikidata event chronology
    - Wikipedia chronology extraction
    - election and coalition tables
    - institutional conflict tables
    - strike and mobilization tables

evaluation:
  stage_1_validity:
    checks:
      - schema instantiates a graph for every slice
      - all required node and edge types are representable
      - all nodes are time-scoped or explicitly persistent
      - entity IDs resolve to stable references where possible
      - parties, coalitions, constitutional bodies, labor organizations, and military formations remain distinguishable object types
  stage_2_grounding:
    metrics:
      - wikidata_entity_link_rate
      - wikipedia_citation_coverage
      - institutional_conflict_attachment_rate
      - strike_event_attachment_rate
      - coalition_alignment_grounding_rate
  stage_3_retrieval:
    metrics:
      - answer_path_recall
      - ideological_node_recall
      - counterweight_node_recall
      - institutional_path_recall
      - external_constraint_path_recall
      - temporal_slice_precision
  stage_4_prediction:
    metrics:
      - held_out_slice_classification_accuracy
      - calibration
      - robustness_across_reformist_vs_terminal_breakdown_subperiods
      - gain_from_ideology_and_counterweight_axes
      - coup_risk_bucket_accuracy
  win_condition: >-
    A candidate schema wins only if it instantiates valid time-scoped
    graphs for all slices, grounds actors, institutions, coalition changes,
    strikes, and rupture pathway structure to the required sources,
    retrieves material, institutional, ideological, counterweight,
    class-organization, and external-constraint subgraphs, passes negative
    leakage tests, preserves fixed-dimensional projections for downstream
    GNN use, and shows non-trivial improvement from adding ideology,
    counterweights, external constraint, and class-organization structure in
    the ablation suite.

negative_tests:
  - id: nt1
    prompt: Explain Chilean rupture only as the personal charisma or failure of Allende.
    expected_result: fail
    reason: prevents reduction to biography
  - id: nt2
    prompt: Return ideology and legitimacy as a paragraph summary without typed nodes.
    expected_result: fail
    reason: ideology must remain queryable
  - id: nt3
    prompt: Treat the military as an exogenous actor that suddenly appears only on the day of the coup.
    expected_result: fail
    reason: military autonomy and repositioning must be graphable over time
  - id: nt4
    prompt: Explain the crisis solely as U.S. intervention with no domestic parties, institutions, labor, business, or constitutional conflict.
    expected_result: fail
    reason: external pressure must not erase domestic causal structure
  - id: nt5
    prompt: Treat Congress, courts, labor, firms, and media as one generic opposition block.
    expected_result: fail
    reason: institutional and sectoral differentiation is necessary
  - id: nt6
    prompt: Infer inevitability of the September 1973 coup from the 1964-1969 slice.
    expected_result: fail
    reason: prevents temporal leakage and teleology

ablation_suite:
  - material_only
  - material_plus_institutions
  - material_plus_institutions_plus_ideology
  - material_plus_institutions_plus_ideology_plus_class_organizations
  - material_plus_institutions_plus_ideology_plus_external_constraint
  - full_model_with_counterweights
win_expectation:
  ideology_gain_required: true
  counterweight_gain_required: true
  external_constraint_gain_required: true
  class_organization_gain_required: true

splits:
  suggested_train:
    - reformist_preconditioning_and_party_system_strain
    - allende_victory_and_institutional_confrontation
  suggested_validation:
    - terminal_breakdown_and_coup_pathway
  suggested_stress_test:
    - Apply the learned schema, without redesign, to another Latin American democratic-breakdown or military-intervention probe.

modern_bridge:
  role: focused democratic-rupture and institutional-restructuring probe
  purpose: >-
    Tests whether the schema can represent democracy-under-stress,
    ideology-heavy restructuring, party-system polarization, military
    autonomy, and explicit counterweight failure in a Latin American case
    without requiring a full dictatorship-to-transition arc.
  downstream_alignment:
    - share ontology with anti-colonial, postcolonial, and contemporary democratic-stress probes where possible
    - reuse generic_target_interface where possible
    - keep institutions, counterweights, external constraint, and class-organization objects available for later Latin America probes
    - do not require direct market labels inside this probe

failure_modes_to_watch:
  - Democratic rupture represented only as the final coup event with no pathway.
  - Ideology represented as raw text with no queryable nodes.
  - Military and security apparatus collapsed into generic actor nodes with no autonomy or command structure.
  - Labor, business, and media organizations omitted despite their role in escalation.
  - External constraint flattened into vague Cold War atmosphere.
  - Counterweights omitted because they failed in the end.
  - Role changes over time causing duplicate entities instead of stable identities.
  - Later dictatorship knowledge leaking backward into pre-coup graph construction.

autoresearch_objective_hint:
  optimize_for:
    - grounding quality
    - retrieval of ideology and counterweights
    - retrieval of institutional-conflict and class-organization pathways
    - retrieval of external-constraint structure
    - temporal coherence
    - GNN-usable fixed projection
  avoid:
    - overfitting to the final coup day alone
    - schemas that reward only terminal winners or retrospective certainty
    - collapse of contested legality and legitimacy claims into one consensus narrative
    - treating democratic breakdown as either purely external or purely domestic

notes:
  - Keep the file human-editable; add machine-generated enrichments in separate derived artifacts.
  - This version of 5B is intentionally narrower than a full Chile 1964-2022 arc so the institutional-breakdown win condition stays sharp.
  - A later companion probe can extend from dictatorship through democratic transition and post-authoritarian settlement without contaminating this pre-coup probe.