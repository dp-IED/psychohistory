probe_id: africa_family_4A
name: Burkina Faso, Sankara, Anti-Imperial Development, and Revolutionary Rollback
version: 0.1
status: candidate
format: probe_spec_v2
benchmark_pack: v0
compatibility_tier: v0-legacy

summary:
  purpose: >-
    Evaluate whether the intermediate graph representation can model a modern
    postcolonial experiment in anti-imperial state transformation, including
    developmental ideology, debt resistance, elite conflict, mediated external
    constraint, regime rupture, and rollback, without collapsing the case into
    either heroic biography or deterministic coup narrative.
  rationale: >-
    This probe isolates the Sankara era and its aftermath as a focused test of
    ideology, sovereignty, debt, development, counterweights, and reversal. It
    is narrower than a full Burkina Faso-to-present arc, so autoresearch is
    forced to learn whether a schema can represent revolutionary transformation
    and rollback cleanly before later security-crisis probes are added.

scope:
  region: West Africa
  polity: Burkina Faso and interacting external/postcolonial actors
  temporal_window:
    start_year: 1983
    end_year: 2014
    label: Sankara revolution to the eve of post-Compaore rupture
  recommended_slices:
    - slice_id: sankara_revolutionary_restructuring
      start_year: 1983
      end_year: 1987
      label: Revolutionary rupture, anti-imperial development, and state-led transformation
    - slice_id: compaore_consolidation_and_reversal
      start_year: 1987
      end_year: 1998
      label: Assassination, regime consolidation, foreign-policy realignment, and rollback
    - slice_id: managed_pluralism_and_legitimacy_erosion
      start_year: 1999
      end_year: 2014
      label: Controlled pluralism, social pressure, and accumulated legitimacy strain
  exclusions:
    - Post-2014 uprising and later Sahel insurgency except as out-of-sample continuation labels
    - Treating Sankara as a purely symbolic or moral figure with no institutional program
    - Treating regime change solely as personal rivalry with no ideological, material, or external-constraint layer
    - Purely retrospective nationalist narratives unless used only as contrastive annotations

artifacts:
  human_authored:
    - probe_spec
  frozen_inputs:
    - slice_entity_lists
    - source_snapshots
    - target_tables
    - external_constraint_tables
  machine_generated:
    - extracted_claims
    - linked_entities
    - instantiated_graphs
    - node_projection_tables
    - ideology_alignment_tables
    - rollback_path_tables

grounded_sources:
  structural_backbone:
    - source: Seshat Global History Databank
      role: >-
        Optional deep-history context for governance, scale, inequality, and
        comparison-class reasoning about state capacity and legitimacy in West
        African political formations.
      required: false
  entity_spine:
    - source: Wikidata
      role: Stable IDs for actors, offices, institutions, donor structures, events, and political organizations.
      required: true
    - source: Wikipedia
      role: Narrative grounding, event descriptions, chronology, and source expansion from entity pages.
      required: true
  event_layer:
    - source: GDELT
      role: Time-stamped event flow, international reactions, media narratives, and later retrospective salience where available.
      required: false
    - source: ACLED
      role: Optional later-period event support near the 2014 boundary when relevant.
      required: false
  optional_forecast_layer:
    - source: Polymarket or similar forecast market when relevant for later companion probes
      role: Reserved for future bridge probes; not required inside 4A.
      required: false

core_question:
  text: >-
    Can a single graph schema represent how anti-imperial ideology,
    developmental transformation, debt and aid politics, elite conflict,
    counterweights, and external pressure interacted to produce both the
    Sankara experiment and its rollback in Burkina Faso in a way that is
    queryable and GNN-consumable?

historical_subquestions:
  - Which material and administrative reforms defined the Sankara project at each slice?
  - Which institutions organized, constrained, or were transformed by revolutionary governance?
  - Which narratives and norms legitimized self-reliance, anti-imperial sovereignty, austerity, popular mobilization, or rollback?
  - Which counterweights to rollback, elite capture, or external dependency existed, and why were they not decisive?
  - Through which debt, aid, diplomatic, and regional channels did external constraint shape political possibilities?
  - Which shocks changed the trajectory, and through what pathways?
  - What differs between revolutionary restructuring, post-1987 consolidation, and later legitimacy erosion?

schema_requirements:
  must_represent:
    node_types:
      - Actor
      - Institution
      - Office
      - AdministrativeRegion
      - Resource
      - Event
      - Policy
      - Narrative
      - Norm
      - Counterweight
      - Shock
      - Claim
      - ExternalPower
      - ExternalConstraint
      - DebtRegime
      - AidChannel
      - LocalElite
      - MassOrganization
      - DevelopmentProgram
      - SecurityApparatus
    edge_types:
      - governs
      - administers
      - reforms
      - mobilizes
      - legitimizes
      - delegitimizes
      - constrains
      - undermines
      - presupposes
      - contests
      - benefits
      - depends_on
      - responds_to
      - funds
      - disciplines
      - coopts
      - resists
      - channels_through
      - conditions
      - redistributes
      - centralizes
      - rolls_back
      - aligns_with
      - isolates
  must_support:
    - time-scoped edges and nodes
    - uncertain or contested claims
    - many-to-many relations via relation nodes if needed
    - perspective-aware queries (e.g., revolutionary leadership, rural communities, women's organizations, labor, military officers, foreign donors, regional governments)
    - fixed-dimensional node projections for downstream GNN training
    - explicit distinction between ideology, development program, and elite power struggle
    - explicit representation of debt, aid, and diplomatic constraint as causal structures
    - explicit representation of mass organizations and popular mobilization as typed graph objects
  anti_requirements:
    - Do not collapse ideology into untyped text blobs.
    - Do not reduce the Sankara period to a leader-centric biography.
    - Do not treat the 1987 rupture as a single unexplained terminal event.
    - Do not model external pressure only as vague foreign influence; represent debt, aid, alignment, and diplomatic channels explicitly.
    - Do not treat legitimacy as a scalar label with no graphable claims or norms.

expected_graph_axes:
  material:
    - agrarian and food-security policy
    - public-sector restructuring and austerity
    - vaccination, literacy, and health campaigns
    - labor, wages, and state resource allocation
    - donor dependence and fiscal constraint
  institutional:
    - presidency and revolutionary councils
    - committees for the defense of the revolution
    - military and security apparatus
    - ministries and development administration
    - local governance structures
    - party and para-state organizational channels
  ideological:
    - anti-imperial sovereignty
    - self-reliance and debt refusal
    - anti-corruption and anti-privilege norms
    - mass participation and revolutionary virtue
    - later narratives of normalization, realism, and stability
  counterweights:
    - labor resistance and professional opposition
    - internal military dissent
    - bureaucratic inertia
    - regional diplomatic pressure
    - donor and aid leverage
    - elite coalitions favoring rollback or accommodation
  asymmetry_and_external_constraint:
    - debt as postcolonial leverage
    - aid conditionality and diplomatic isolation
    - regional alignments and external security relationships
    - unequal bargaining between revolutionary state projects and external financial or diplomatic actors
    - mediated postcolonial dependence

seed_entities:
  actors:
    - Thomas Sankara
    - Blaise Compaore
    - Burkina Faso
    - National Council of the Revolution
    - Committees for the Defense of the Revolution
    - labor unions
    - women's organizations
    - military officers
    - foreign donors
    - regional governments
  events:
    - 1983 coup d'etat in Upper Volta
    - renaming of Upper Volta to Burkina Faso
    - major anti-corruption and austerity reforms
    - vaccination and development campaigns
    - 1987 assassination of Thomas Sankara
    - consolidation of Blaise Compaore rule
    - protests and legitimacy crises before 2014
  institutions:
    - presidency of Burkina Faso
    - National Council of the Revolution
    - Committees for the Defense of the Revolution
    - military command
    - ministries
    - donor and financial institutions
  places:
    - Burkina Faso
    - Ouagadougou
    - rural provinces
    - West Africa

generic_target_interface:
  graph_level_targets:
    - capacity_score
    - legitimacy_score
    - counterweight_strength_score
    - shock_response_score
    - external_constraint_score
    - ideological_coherence_score
    - rollback_pressure_score
  slice_transition_targets:
    - reform_intensity_delta
    - elite_cohesion_delta
    - legitimacy_delta
    - external_alignment_delta
    - rollback_delta
    - mass_mobilization_delta
  rule: All targets must be computable from evidence available at or before the slice cutoff.

probe_tasks:
  retrieval_tasks:
    - id: rt1
      prompt: Which institutions and development programs translated Sankara's ideology into state action?
      expected_answer_shape:
        - Institution
        - DevelopmentProgram
        - Policy
        - Event
    - id: rt2
      prompt: Which norms or narratives made self-reliance, anti-debt politics, or later rollback appear legitimate or necessary?
      expected_answer_shape:
        - Narrative
        - Norm
        - Actor
        - Claim
    - id: rt3
      prompt: What plausible counterweights to rollback or postcolonial dependency existed, and why were they not decisive?
      expected_answer_shape:
        - Counterweight
        - Institution
        - Actor
        - Claim
        - Edge path with constrains/undermines/coopts/conditions semantics
    - id: rt4
      prompt: Through which debt, aid, and diplomatic channels did external actors shape political possibilities in Burkina Faso?
      expected_answer_shape:
        - ExternalConstraint
        - DebtRegime
        - AidChannel
        - ExternalPower
        - Edge path with funds/conditions/channels_through/aligns_with semantics
    - id: rt5
      prompt: How did revolutionary restructuring differ structurally from post-1987 consolidation and later legitimacy erosion?
      expected_answer_shape:
        - time-scoped subgraphs across at least two slices
  structural_tasks:
    - id: st1
      check: Can the IR keep the same entity identity across slices while allowing role changes, regime shifts, and ideological reversal?
    - id: st2
      check: Can the IR represent both acute rupture events and slow rollback or legitimacy erosion?
    - id: st3
      check: Can the IR encode contested interpretations without deleting minority or anti-system claims?
    - id: st4
      check: Can the IR distinguish development programs, ideology, elite coalitions, and external constraints as separate but interacting structures?
    - id: st5
      check: Can the IR represent mass organizations and popular mobilization as more than narrative decoration?
  gnn_tasks:
    - id: gt1
      target: Predict next-slice rollback category from prior slice graph state.
    - id: gt2
      target: Predict whether a reform agenda produces durable institutional embedding versus symbolic or reversible change.
    - id: gt3
      target: Predict next-slice legitimacy erosion bucket from graph state.

labels_and_targets:
  supervised_targets:
    reform_embedding_score:
      description: Degree to which revolutionary reforms become institutionally embedded rather than symbolic or temporary.
      source_priority:
        - Wikipedia chronology extraction
        - article-derived institutional relation counts
      leakage_rule: No post-slice evidence in feature construction.
    external_constraint_score:
      description: Degree to which debt, aid, diplomatic, or regional pressures constrain domestic policy autonomy in the next slice.
      source_priority:
        - article-derived relation counts on aid, debt, diplomacy, and alignment
        - Wikipedia evidence on international positioning and donor relations
    elite_fragmentation_proxy:
      description: Degree of conflict or cohesion among governing, military, and administrative elites.
      source_priority:
        - event chronology on coups, purges, opposition, and elite realignment
        - article-derived relation counts
    legitimacy_erosion_proxy:
      description: Degree of accumulated distrust, opposition, and weakening consent around the regime.
      source_priority:
        - event chronology on protest, criticism, repression, and symbolic delegitimation
        - article-derived relation counts
    mass_mobilization_proxy:
      description: Degree of organized popular participation or demobilization relevant to regime durability.
      source_priority:
        - evidence on revolutionary committees, unions, women's mobilization, and civic pressure
        - article-derived relation counts
  weak_labels:
    - Wikidata event chronology
    - Wikipedia chronology extraction
    - article-derived relation counts
  target_construction_rule: Freeze evidence by slice cutoff and emit one deterministic target record per slice.

evaluation:
  stage_1_validity:
    checks:
      - schema instantiates a graph for every slice
      - all required node and edge types are representable
      - all nodes are time-scoped or explicitly persistent
      - entity IDs resolve to stable references where possible
      - ideology, development programs, and external constraints remain distinguishable object types
  stage_2_grounding:
    metrics:
      - wikidata_entity_link_rate
      - wikipedia_citation_coverage
      - external_constraint_attachment_rate
      - development_program_grounding_rate
  stage_3_retrieval:
    metrics:
      - answer_path_recall
      - ideological_node_recall
      - counterweight_node_recall
      - external_constraint_path_recall
      - rollback_path_recall
      - temporal_slice_precision
  stage_4_prediction:
    metrics:
      - held_out_slice_classification_accuracy
      - calibration
      - robustness_across_revolutionary_vs_rollback_subperiods
      - gain_from_ideology_and_external_constraint_axes
      - reform_embedding_bucket_accuracy
  win_condition: >-
    A candidate schema wins only if it instantiates valid time-scoped graphs
    for all slices, grounds entities, ideological objects, development
    programs, and external-constraint structure to the required sources,
    retrieves material, institutional, ideological, counterweight,
    development, and rollback subgraphs, passes negative leakage tests,
    preserves fixed-dimensional projections for downstream GNN use, and shows
    non-trivial improvement from adding ideology, counterweights, and
    external-constraint structure in the ablation suite.

negative_tests:
  - id: nt1
    prompt: Explain the Sankara period only as the will or charisma of one leader with no institutions, programs, or mass organizations.
    expected_result: fail
    reason: prevents reduction to biography
  - id: nt2
    prompt: Explain regime reversal solely as a personal coup with no ideological, developmental, or external-constraint layer.
    expected_result: fail
    reason: rollback must be represented as structured political change
  - id: nt3
    prompt: Return ideology as a summary paragraph without typed nodes.
    expected_result: fail
    reason: ideology must stay queryable
  - id: nt4
    prompt: Model debt and aid only as vague foreign influence with no explicit channels or conditioning structure.
    expected_result: fail
    reason: external constraint must be graphable
  - id: nt5
    prompt: Treat legitimacy as an overall score with no claims, norms, or institutional pathways.
    expected_result: fail
    reason: legitimacy must be structurally represented

ablation_suite:
  - material_only
  - material_plus_institutions
  - material_plus_institutions_plus_ideology
  - material_plus_institutions_plus_ideology_plus_mass_organizations
  - material_plus_institutions_plus_ideology_plus_external_constraint
  - full_model_with_counterweights
win_expectation:
  ideology_gain_required: true
  counterweight_gain_required: true
  external_constraint_gain_required: true
  mass_organization_gain_required: true

splits:
  suggested_train:
    - sankara_revolutionary_restructuring
    - compaore_consolidation_and_reversal
  suggested_validation:
    - managed_pluralism_and_legitimacy_erosion
  suggested_stress_test:
    - Apply the learned schema, without redesign, to another African anti-imperial or postcolonial rollback probe.

modern_bridge:
  role: focused postcolonial sovereignty and rollback probe
  purpose: tests whether the schema can represent ideology-heavy development politics, explicit anti-imperial claims, and structured rollback without requiring a full contemporary security-crisis stack
  downstream_alignment:
    - share ontology with DRC extraction and South Asia anti-colonial probes where possible
    - reuse generic_target_interface where possible
    - keep debt, aid, sovereignty, and mass-organization objects available for later Africa probes
    - do not require direct market labels inside this probe

failure_modes_to_watch:
  - Sankara represented as biography with no institutional or mass-political layer.
  - Ideology represented as raw text with no queryable nodes.
  - Rollback modeled as a single event with no pathway.
  - External constraint flattened into generic foreign influence.
  - Counterweights omitted because they did not ultimately prevent reversal.
  - Mass organizations treated as symbolic decoration rather than political structure.
  - Role changes over time causing duplicate entities instead of stable identities.
  - Later Sahel crisis logic leaking backward into the 1983-2014 probe.

autoresearch_objective_hint:
  optimize_for:
    - grounding quality
    - retrieval of ideology and counterweights
    - retrieval of debt, aid, and external-constraint structure
    - retrieval of development-program and mass-organization pathways
    - temporal coherence
    - GNN-usable fixed projection
  avoid:
    - overfitting to the coup moment alone
    - schemas that only reward terminal winners or retrospective myths
    - collapse of contested interpretations into a single consensus story
    - treating anti-imperial development as rhetoric with no institutional form

notes:
  - This probe should remain human-editable; add machine-generated enrichments in separate derived artifacts.
  - It is intentionally narrower than a full Burkina Faso-to-present arc so the win condition stays sharp.
  - A later companion probe can focus on post-2014 rupture, insurgency, and Sahel reordering without contaminating this probe.
