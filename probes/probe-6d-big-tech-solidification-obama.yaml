    - "counterweightvisibilitydelta"

probetasks:
  retrievaltasks:
    - "Retrieve the firms, platforms, app stores, and cloud infrastructures that dominate each slice and link them to the relevant user populations and developer ecosystems."
    - "Retrieve evidence for how app-store rules governed access, monetization, and developer dependence in the 2009-2011 slice."
    - "Retrieve evidence for cloud-scale dependence and data consolidation in the 2012-2014 slice, including hosting and monetization pathways."
    - "Retrieve narratives, norms, offices, and institutions that conferred liberal-technocratic legitimacy or public credibility in the 2015-2016 slice."
    - "Retrieve counterweights such as privacy controversies, antitrust murmurs, and platform dependence risks and connect them to the firms or platforms they constrained."
    - "Retrieve acquisitions, policy shifts, and major public controversies that altered concentration or legitimacy without leaking post-2016 outcomes."
  structuraltasks:
    - "Construct a slice-aware graph that distinguishes firms from platforms, app stores, cloud infrastructures, and data assets."
    - "Infer lock-in pathways from operating systems and app stores to users, developers, and downstream market actors."
    - "Model how legitimacy nodes attach to offices, institutions, narratives, and claims rather than to firms alone."
    - "Identify minimal subgraphs explaining why concentration increased between slices even when explicit antitrust intervention remained weak."
    - "Compare structural centrality of app stores versus cloud infrastructures across slices."
  gnntasks:
    - "Predict slice-level concentrationscore from graph structure available at the slice cutoff."
    - "Predict whether platformdependencyscore rises in the next slice using only current-slice material, institutional, and ideological structure."
    - "Classify whether a firm-platform cluster exhibits high appstorecontrolscore or high cloudcentralityscore from typed neighborhood structure."
    - "Estimate whether legitimacyscore remains robust despite rising counterweight visibility."

labelsandtargets:
  concentrationscore:
    description: "Composite slice-level measure of concentration across mobile operating systems, app-store distribution, cloud infrastructure, and dominant advertising-data platforms."
    sourcepriority:
      - "SEC filings"
      - "antitrust or competition materials"
      - "Wikipedia"
      - "Wikidata"
    leakagerule: "Use only concentration evidence available at or before the slice cutoff; no post-2016 antitrust findings may define earlier labels."
    targetconstructionrule: "Aggregate normalized indicators of market share concentration, acquisition accumulation, infrastructural centrality, and intermediation reach into a bounded ordinal or continuous score."
  platformdependencyscore:
    description: "Degree to which developers, advertisers, media intermediaries, startups, or users depend on dominant platforms for distribution, visibility, or monetization."
    sourcepriority:
      - "SEC filings"
      - "Wikipedia"
      - "GDELT"
      - "antitrust or competition materials"
    leakagerule: "Do not infer dependence from later public backlash; rely on contemporaneous statements, risks, and structural intermediations."
    targetconstructionrule: "Combine counts and weights of governsaccessTo, intermediates, locksin, and dependson edges affecting developer and market-actor nodes."
  cloudcentralityscore:
    description: "Importance of cloud infrastructure providers as hosts and dependency hubs within the slice graph."
    sourcepriority:
      - "SEC filings"
      - "Wikipedia"
      - "Wikidata"
    leakagerule: "No post-2016 cloud-AI concentration evidence may be used."
    targetconstructionrule: "Compute from hosting centrality, customer dependency breadth, and share of critical downstream platform and market-actor paths routed through CloudInfrastructure nodes."
  appstorecontrolscore:
    description: "Extent to which app stores control access, monetization, and policy compliance for mobile software ecosystems."
    sourcepriority:
      - "Wikipedia"
      - "SEC filings"
      - "antitrust or competition materials"
      - "GDELT"
    leakagerule: "Do not use later litigation outcomes or post-2016 policy disputes to label the 2009-2016 slices."
    targetconstructionrule: "Weight governsaccessTo, intermediates, monetizes, and locksin relations involving AppStore, Platform, DeveloperEcosystem, and UserPopulation nodes."
  legitimacyscore:
    description: "Strength of public and elite legitimacy linking dominant firms and platforms to innovation, safety, openness, modernity, or liberal-technocratic governance."
    sourcepriority:
      - "public policy or White House/agency material"
      - "GDELT"
      - "Wikipedia"
    leakagerule: "Legitimacy must be coded from contemporaneous institutions, narratives, claims, and policy framing, not from later retrospective judgment."
    targetconstructionrule: "Combine legitimizes edges from Institution, Office, Narrative, Norm, and Claim nodes, discounted by counterweight salience and scrutiny intensity."
  regulatorypressurescore:
    description: "Intensity of contemporaneous scrutiny, early competition concern, privacy pressure, and formal or informal regulatory attention."
    sourcepriority:
      - "antitrust or competition materials"
      - "public policy or White House/agency material"
      - "GDELT"
      - "Wikipedia"
    leakagerule: "Exclude post-2016 investigations and later antitrust escalations from label construction."
    targetconstructionrule: "Aggregate scrutinizes and constrains edges from RegulatoryBody, Institution, Policy, and Counterweight nodes, adjusted for formal versus informal status."
  laborprecarityproxy:
    description: "Proxy for labor or contractor precarity linked to platform ecosystems, moderation work, logistics dependence, or app-economy revenue insecurity."
    sourcepriority:
      - "SEC filings"
      - "GDELT"
      - "Wikipedia"
    leakagerule: "Do not backfill labor stress using later gig-politics discourse outside the slice window."
    targetconstructionrule: "Estimate from LaborPool exposure to platform-mediated monetization, contractor dependence, moderation outsourcing, logistics vulnerability, and weak institutional protections."

evaluation:
  stage1validity:
    - "Check that all required nodetypes and edgetypes are present in the produced graph."
    - "Check that each slice contains at least one material, institutional, ideological, and counterweight subgraph."
    - "Check that entities are time-scoped or explicitly persistent."
    - "Check that app-store and cloud relations are represented as first-class structure."
    - "Check that no forbidden Trump-era or frontier-AI leakage appears in nodes, edges, or targets."
  stage2grounding:
    - "Measure source coverage per node and edge across the required source stack."
    - "Measure provenance completeness for claims, acquisitions, policies, and legitimacy edges."
    - "Measure temporal consistency between evidence timestamps and slice assignment."
    - "Audit disagreement cases where Wikipedia, filings, and media salience imply different graph structure."
  stage3retrieval:
    - "Evaluate exactness of retrieving mobile lock-in pathways, cloud dependence hubs, and legitimacy-supporting institutions."
    - "Evaluate recall for counterweights and regulatory channels."
    - "Evaluate whether retrieval answers distinguish product adoption from structural intermediation."
    - "Evaluate slice-specific retrieval without importing future events."
  stage4prediction:
    - "Test predictive performance on graph-level targets and slice-transition deltas using only pre-cutoff evidence."
    - "Compare ablations to verify gains from adding ideology, platform structure, cloud structure, and counterweights."
    - "Check calibration of target predictions across slices rather than only aggregate accuracy."
    - "Inspect failure cases where material structure alone overpredicts concentration without legitimacy or institutional context."
  wincondition: "The full model outperforms simpler ablations on retrieval fidelity and target prediction while preserving temporal validity, representing app-store and cloud chokepoints explicitly, and keeping legitimacy and ideology as typed graph structure rather than prose."

negativetests:
  - "Explain Obama-era Big Tech only as product success."
  - "Ignore app stores and cloud chokepoints."
  - "Treat political legitimacy as background mood."
  - "Return ideology as prose only."
  - "Import Trump-era moderation conflict into 2009-2016."
  - "Model concentration without developers, advertisers, or user lock-in."
  - "Treat privacy controversies as irrelevant noise rather than typed counterweights."

ablationsuite:
  materialonly:
    description: "Keep firms, platforms, app stores, cloud infrastructure, data assets, users, and acquisition events only."
  materialplusinstitutions:
    description: "Add institutions, regulatory bodies, offices, and policies."
  materialplusinstitutionsplusideology:
    description: "Add narratives, norms, claims, and legitimacy edges."
  materialplusinstitutionsplusplatforms:
    description: "Stress-test platform intermediation by emphasizing AppStore and Platform structure while omitting cloud-specific centrality."
  materialplusinstitutionspluscloud:
    description: "Stress-test cloud dependence and hosting centrality while reducing app-store control structure."
  fullmodelwithcounterweights:
    description: "Include material, institutional, ideological, platform, cloud, labor, and counterweight structure with full provenance and temporal masking."

splits:
  suggestedtrain:
    - "Use 6C-1, 6C-2, and 6C-3 for ontology warm-start and transfer learning."
    - "Within this probe, train on 2009-2014 slices for slice-to-slice transition prediction."
    - "Allow auxiliary transfer from related business probes that share concentration and legitimacy structure without post-2016 leakage."
  suggestedvalidation:
    - "Validate on 2015-2016 with masked legitimacy and counterweight edges to test reconstruction and prediction."
    - "Use held-out entities from developer ecosystems, cloud customers, and regulatory channels."
  suggestedstresstest:
    - "Stress-test on 2015-2016 after removing app-store nodes, then after removing cloud nodes, to verify the model fails in interpretable ways."
    - "Stress-test with adversarial prompts that reframe concentration as product quality only."
    - "Stress-test temporal leakage guards by injecting post-2016 terms and requiring rejection."

bridgerole:
  modernbridge: "Links earlier platform-rise probes to later politicization and AI-security convergence by isolating the consolidation phase in which material concentration and liberal-technocratic legitimacy reinforced each other."
  purpose: "Provide a reusable modern business-system bridge between platform economics, institutional tolerance, and ideology-aware graph representation."
  downstreamalignment: "Aligns with downstream adaptive GNN tasks for concentration forecasting, dependency scoring, legitimacy analysis, and retrieval over mixed material-institutional graphs."
  failuremodestowatch:
    - "Overweighting consumer adoption while underweighting app-store and cloud chokepoints."
    - "Encoding legitimacy as sentiment rather than typed institutions, narratives, and norms."
    - "Flattening privacy or antitrust concerns into generic controversy."
    - "Leaking post-2016 backlash into target labels or explanations."
    - "Ignoring labor and contractor structure where it mediates platform scale."
  autoresearchobjectivehint: "Use this probe to test whether graph schemas that explicitly encode intermediation, hosting, legitimacy, and counterweights outperform actor-event-only baselines on both retrieval and slice-transition prediction."
  notes:
    - "This probe should remain narrowly centered on 2009-2016, not the entire Big Tech arc."
    - "The ontology should stay portable to adjacent probes on platform rise, politicization, and AI-platform-security convergence."
    - "All ideology-bearing content should be representable as nodes and edges, not leftover commentary."