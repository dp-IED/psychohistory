probeid: "6C-4"
family: "businessfamily6C"
name: "Big Tech Emergence, Platform Consolidation, and Political Reordering — Obama-Era Platform Consolidation"
version: "0.1"
status: "candidate"
format: "probespecv2"
benchmark_pack: v0
compatibility_tier: v0-legacy

summary:
  purpose: "Evaluate whether a single transferable graph IR can represent the Obama-era consolidation of Big Tech through smartphones, app stores, cloud infrastructure, data-platform scale, and liberal-technocratic legitimacy in a form suitable for grounded retrieval, explanation, and downstream adaptive GNN tasks."
  rationale: "This probe isolates the 2009-2016 consolidation phase in which mobile ecosystems, app-store intermediation, hyperscale cloud services, advertising-data concentration, and relatively permissive liberal-technocratic governance reinforced one another before later populist backlash and frontier-AI narratives changed the public and regulatory framing."

scope:
  region: "Western / U.S. with global spillover"
  polity: "Smartphone, cloud, app-store, data-platform, and liberal-technocratic consolidation of Big Tech"
  temporalwindow: "2009 to 2016"
  startyear: 2009
  endyear: 2016
  label: "Smartphones, cloud, app stores, and Obama-era platform concentration"
  recommendedslices:
    - sliceid: "6c4_mobile_platform_lockin"
      startyear: 2009
      endyear: 2011
      label: "Smartphone ecosystems and app-store lock-in"
    - sliceid: "6c4_cloud_ad_data_scale"
      startyear: 2012
      endyear: 2014
      label: "Cloud scale, data consolidation, and platform dependence"
    - sliceid: "6c4_liberal_technocratic_alignment"
      startyear: 2015
      endyear: 2016
      label: "Soft alignment with liberal technocracy, public legitimacy, and concentration"
  exclusions:
    - "Do not import Trump-era moderation conflict, nationalist backlash, or post-2016 antitrust escalation into the 2009-2016 graph state."
    - "Do not import frontier-AI, compute chokepoints, or post-2022 cloud-security narratives."
    - "Do not read later platform-state speech conflicts backward into the Obama-era slices."
    - "Do not collapse pre-2009 platform rise into this probe except as background dependencies explicitly marked as prehistory."
    - "Do not allow outcome labels to use evidence published after the relevant slice cutoff unless explicitly marked as retrospective metadata and excluded from supervision."

artifacts:
  humanauthored:
    - "Probe definition, slice boundaries, exclusions, ontology constraints, and evaluation rules."
    - "Curated seed entities, source-priority decisions, and leakage rules."
    - "Human review notes for ambiguous ideology, legitimacy, and counterweight coding."
  machinegenerated:
    - "Entity linking to Wikidata IDs and canonical aliases."
    - "Cross-source event extraction from filings, policy materials, Wikipedia, and GDELT."
    - "Candidate edge proposals, temporal normalization, and confidence-scored claim nodes."
    - "Target feature backfills, retrieval bundles, and ablation-ready graph projections."

groundedsources:
  - source: "Wikidata"
    role: "Canonical IDs, entity disambiguation, organizational relationships, and persistent metadata."
    required: true
  - source: "Wikipedia"
    role: "High-level chronology, product histories, acquisitions, platform timelines, and institutional context."
    required: true
  - source: "SEC filings"
    role: "Revenue structure, risk factors, segment reporting, platform dependence, acquisitions, and market concentration signals."
    required: true
  - source: "GDELT"
    role: "Media salience, controversy bursts, legitimacy narratives, and public-event timing."
    required: true
  - source: "Antitrust or competition materials"
    role: "Competition concerns, merger scrutiny, platform intermediation issues, and early regulatory murmurs."
    required: false
  - source: "Public policy or White House/agency material"
    role: "Obama administration policy posture, public legitimacy signals, innovation framing, and regulatory slack or restraint."
    required: false

corequestion: "Can a single graph schema represent how smartphones, app stores, cloud infrastructure, ad-tech, data concentration, and soft alignment with liberal-technocratic governance consolidated Big Tech power before major populist backlash, while remaining queryable, slice-aware, and consumable by downstream GNNs?"

historicaloranalyticalsubquestions:
  - "How did the iOS-Android duopoly structure mobile ecosystems, and how did that structure shape user lock-in, developer dependence, and default access pathways?"
  - "How did app-store intermediation convert platform ownership into governable access, monetization control, and distribution chokepoints for third-party developers?"
  - "How did hyperscale cloud services and adjacent infrastructure create dependence relationships among startups, enterprises, media platforms, and complementary digital markets?"
  - "How did advertising systems, cross-device identity, and data accumulation reinforce concentration beyond visible product quality or user growth?"
  - "How did elite political legitimacy and liberal-technocratic alignment grant Big Tech public credibility, policy tolerance, or soft insulation from stronger structural challenge?"
  - "Where did labor, contractor, moderation, logistics, or app-economy precarity enter the system, and how should those relations be represented without reducing the case to labor only?"
  - "What counterweights existed during the period, including privacy controversies, antitrust murmurs, interoperability concerns, and platform dependence risks, and why were they not yet decisive?"
  - "What changed materially and ideologically across the three slices from mobile lock-in to cloud-data scale to legitimacy-concentration alignment?"

schemarequirements:
  mustrepresent:
    - "Mobile operating systems, app stores, cloud infrastructure, advertising/data systems, and legitimacy structures as distinct but connected graph objects."
    - "Firm power through infrastructure, intermediation, acquisition, standards, and institutional tolerance rather than product success alone."
    - "Ideology, legitimacy, and technocratic governance as typed objects linked to institutions, offices, events, and claims."
    - "Counterweights as first-class typed nodes with explicit constraining or scrutinizing edges."
    - "Time-scoped entities and edges so slice transitions are graphable without narrative leakage."
  nodetypes:
    - "Firm"
    - "Platform"
    - "AppStore"
    - "CloudInfrastructure"
    - "DataAsset"
    - "UserPopulation"
    - "Institution"
    - "RegulatoryBody"
    - "Office"
    - "Event"
    - "Policy"
    - "Narrative"
    - "Norm"
    - "Counterweight"
    - "Claim"
    - "LaborPool"
    - "DeveloperEcosystem"
    - "MarketActor"
  edgetypes:
    - "intermediates"
    - "governsaccessTo"
    - "monetizes"
    - "extractsfrom"
    - "hosts"
    - "dependson"
    - "locksin"
    - "legitimizes"
    - "constrains"
    - "scrutinizes"
    - "scales"
    - "acquires"
    - "respondsTo"
  mustsupport:
    - "Cross-slice identity preservation for firms, platforms, institutions, and persistent narratives."
    - "Typed queries over app-store chokepoints, cloud centrality, and data-mediated monetization."
    - "Joint representation of material, institutional, ideological, and counterweight layers."
    - "Fixed-dimensional node projections for downstream GNN training and ablation."
    - "Evidence provenance attachment at node, edge, and claim level."
    - "Temporal masking so targets at a slice cutoff use only contemporaneously available evidence."
  antirequirements:
    - "Must forbid treating consolidation as just organic growth or superior products."
    - "Must forbid ignoring app stores and cloud infrastructure as structural chokepoints."
    - "Must forbid reducing legitimacy to generic popularity, vibes, or undifferentiated sentiment."
    - "Must forbid returning ideology as prose only without typed nodes, claims, and edges."
    - "Must forbid importing Trump-era backlash, moderation conflicts, or later AI narratives into 2009-2016 supervision."

