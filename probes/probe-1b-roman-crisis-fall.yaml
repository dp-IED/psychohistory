probe_id: roman_family_1B
name: Roman Crisis, Fragmentation, and Western Fall
version: 0.3
status: patched_candidate
format: probe_spec_v2
benchmark_pack: v0
compatibility_tier: v1-patched
ontology_delta_ref: ontology/ontology-delta-v1-persistence.yaml

summary:
  purpose: >-
    Evaluate whether the intermediate graph representation can model long-run
    imperial crisis, fragmentation, legitimacy breakdown, fiscal and military
    strain, contested reform, imperial extraction, center-periphery asymmetry,
    and uneven collapse without collapsing all explanation into a single
    military-decline or invasion story.
  rationale: >-
    This is a patched version of Roman Family 1B. It preserves compatibility
    with Roman Family 1A while upgrading the ontology so that imperial
    relationships, extraction from provinces, frontier incorporation,
    differential burden-sharing, and uneven regional outcomes are explicitly
    representable rather than being left implicit inside generic decline
    language.

scope:
  region: Mediterranean and adjacent frontier zones
  polity: Roman Empire, with focus on imperial crisis, fragmentation, reform, and western collapse
  temporal_window:
    start_year: 180
    end_year: 476
    label: Commodus to deposition of Romulus Augustulus
  recommended_slices:
    - slice_id: severan_precrisis
      start_year: 180
      end_year: 235
      label: Commodus to Severan instability
    - slice_id: third_century_crisis
      start_year: 235
      end_year: 284
      label: Crisis of the Third Century
    - slice_id: tetrarchic_recovery
      start_year: 284
      end_year: 395
      label: Diocletian to Theodosian settlement
    - slice_id: western_fragmentation
      start_year: 395
      end_year: 476
      label: Western imperial fragmentation and collapse
  exclusions:
    - Republican expansion logic unless used only as out-of-sample stress transfer from Roman 1A
    - Byzantine / Eastern Roman post-476 trajectories unless used only as comparative validation
    - Post-476 medieval successor polities unless used only as downstream labels

artifacts:
  human_authored:
    - probe_spec
  frozen_inputs:
    - slice_entity_lists
    - source_snapshots
    - target_tables
  machine_generated:
    - extracted_claims
    - linked_entities
    - instantiated_graphs
    - node_projection_tables
    - center_periphery_tables

grounded_sources:
  structural_backbone:
    - source: Seshat Global History Databank
      role: >-
        Long-run context for social complexity, governance, scale, warfare,
        religion, and inequality variables, especially for administrative
        capacity, macro-structural stress, and center-periphery comparison.
      required: true
  entity_spine:
    - source: Wikidata
      role: Stable IDs for emperors, offices, institutions, provinces, frontier groups, wars, reforms, and events.
      required: true
    - source: Wikipedia
      role: Narrative grounding, chronology, contested interpretations, and source expansion from entity pages.
      required: true
  optional_event_layer:
    - source: DBpedia or derivative historical KGs
      role: Supplemental linked-entity expansion where available.
      required: false

core_question:
  text: >-
    Can a single graph schema represent how Rome moved from imperial scale and
    partial stability into recurrent crisis, fragmented authority, contested
    reforms, uneven regional resilience, and western collapse by linking
    material pressures, institutional change, ideology, imperial extraction,
    and failed counterweights in a way that is queryable and GNN-consumable?

historical_subquestions:
  - What material and organizational stresses accumulated across the empire at each slice?
  - Which institutions failed, adapted, or were reconfigured in response to crisis?
  - Which narratives and norms legitimized emergency rule, restoration, reform, or withdrawal?
  - Which counterweights or stabilizers existed, and why were they weakened, captured, or unable to check breakdown?
  - How did center-periphery dynamics, imperial extraction, and frontier bargaining shape divergent regional outcomes?
  - Which shocks changed the crisis trajectory, and through what pathways?
  - What differs between the Third Century Crisis, tetrarchic recovery, and western collapse?

schema_requirements:
  must_represent:
    node_types:
      - Actor
      - Institution
      - Office
      - Empire
      - Province
      - FrontierRegion
      - FrontierPolity
      - MilitaryFormation
      - ReligiousInstitution
      - Resource
      - Event
      - Policy
      - Narrative
      - Norm
      - Counterweight
      - Shock
      - Claim
    edge_types:
      - secedes_from
      - fragments
      - administers
      - taxes
      - recruits
      - allies_with
      - grants_status_to
      - legitimizes
      - constrains
      - undermines
      - presupposes
      - contests
      - benefits
      - depends_on
      - transforms_into
      - responds_to
      - reforms
      - usurps
      - invades
      - federates_with
      - extracts_from
      - transfers_to_center
      - settles_within
      - buffers
      - disciplines
      - delegates_to
      - fails_to_check
  must_support:
    - time-scoped edges and nodes
    - uncertain or contested claims
    - many-to-many relations via relation nodes if needed
    - perspective-aware queries (e.g., emperors, senatorial elites, army, taxpayers, provincial subjects, bishops, federate groups, frontier peoples)
    - fixed-dimensional node projections for downstream GNN training
    - explicit center-periphery representation rather than center-only summaries
    - coexistence of extraction, protection, bargaining, and fragmentation in the same slice
  anti_requirements:
    - Do not reduce collapse to a single-cause barbarian invasion story.
    - Do not collapse ideology into untyped text blobs.
    - Do not represent provinces only as geography; they must be fiscal, military, and administrative units too.
    - Do not treat recovery and collapse as mutually exclusive; the schema must represent partial stabilization and uneven breakdown.
    - Do not explain imperial crisis from the metropolitan center alone while omitting provincial burdens, frontier bargaining, or asymmetric extraction.

  may_represent:
    node_types:
      - LineageClaim
      - InstitutionalLineage
      - InheritanceBundle
      - TransmissionChannel
      - LegacyAggregate
    edge_types:
      - inherits_from
      - transmits_through
      - supersedes_while_claiming_continuity
      - leaves_legacy_via

expected_graph_axes:
  material:
    - tax extraction stress
    - coinage and fiscal strain
    - manpower and recruitment pressure
    - logistics and frontier mobility
    - military fragmentation and loyalty shifts
  institutional:
    - imperial office and succession
    - army command structure
    - provincial governance
    - taxation and requisition
    - tetrarchic and later administrative reform
    - church-state and elite coordination structures
  ideological:
    - legitimacy of emperor as restorer or protector
    - emergency-rule and restoration narratives
    - Christianization and changing moral-political order
    - norms of military loyalty, civic obligation, and imperial unity
  counterweights:
    - senatorial and municipal elites
    - fiscal and logistical constraints
    - reform institutions
    - church networks
    - provincial resilience
    - rival commanders and frontier buffers
  imperial_periphery:
    - extraction from provinces to center
    - frontier incorporation and federate bargaining
    - uneven burden-sharing across regions
    - center-periphery divergence in resilience
    - peripheral military settlement and delegated violence

seed_entities:
  actors:
    - Roman Empire
    - Western Roman Empire
    - Eastern Roman Empire
    - Roman Senate
    - imperial army
    - Diocletian
    - Constantine the Great
    - Theodosius I
    - Stilicho
    - Alaric I
    - Odoacer
    - Goths
    - Vandals
    - Huns
    - provincial elites
    - bishops
  events:
    - assassination of Commodus
    - Crisis of the Third Century
    - capture of Valerian
    - secession of the Gallic Empire
    - Palmyrene Empire
    - Diocletianic reforms
    - Edict on Maximum Prices
    - Battle of the Milvian Bridge
    - Adrianople
    - crossing of the Rhine in 406
    - sack of Rome in 410
    - Vandal conquest of North Africa
    - deposition of Romulus Augustulus
  institutions:
    - principate
    - dominate
    - tetrarchy
    - provincial administration
    - taxation system
    - comitatenses
    - limitanei
    - Christian church
  places:
    - Rome
    - Constantinople
    - Gaul
    - Hispania
    - Italy
    - North Africa
    - Britain
    - Danube frontier
    - Rhine frontier

generic_target_interface:
  graph_level_targets:
    - capacity_score
    - integration_score
    - legitimacy_score
    - counterweight_strength_score
    - shock_response_score
    - fragmentation_score
    - center_periphery_strain_score
  slice_transition_targets:
    - fragmentation_delta
    - administrative_capacity_delta
    - elite_cohesion_delta
    - provincial_stability_delta
    - legitimacy_delta
    - extraction_imbalance_delta
  rule: All targets must be computable from evidence available at or before the slice cutoff.

probe_tasks:
  retrieval_tasks:
    - id: rt1
      prompt: Which institutions or reforms temporarily converted imperial crisis into renewed governability?
      expected_answer_shape:
        - Institution
        - Policy
        - Event
        - Claim
    - id: rt2
      prompt: Which norms or narratives legitimized emergency rule, restoration, or renewed imperial authority?
      expected_answer_shape:
        - Narrative
        - Norm
        - Actor
        - Claim
    - id: rt3
      prompt: What plausible counterweights to fragmentation existed, and why were they not decisive in the West?
      expected_answer_shape:
        - Counterweight
        - Actor
        - Institution
        - Edge path with constrains/undermines/fails_to_check semantics
    - id: rt4
      prompt: How did the Third Century Crisis differ structurally from the western collapse after 395?
      expected_answer_shape:
        - time-scoped subgraphs across at least two slices
    - id: rt5
      prompt: What role did federate arrangements and frontier groups play in both stabilization and fragmentation?
      expected_answer_shape:
        - Actor
        - Policy
        - Event
        - Edge path with allies_with/federates_with/undermines semantics
    - id: rt6
      prompt: Which provinces or frontier regions carried disproportionate extraction or military burden, and how did that affect imperial resilience?
      expected_answer_shape:
        - Province
        - FrontierRegion
        - Resource
        - Edge path with extracts_from/transfers_to_center/buffers semantics
  structural_tasks:
    - id: st1
      check: Can the IR keep the same entity identity across slices while allowing role changes, regime changes, and institutional transformation?
    - id: st2
      check: Can the IR represent both fast shocks and slow administrative erosion?
    - id: st3
      check: Can the IR encode contested interpretations without deleting minority claims?
    - id: st4
      check: Can the IR represent partial recovery without implying final success?
    - id: st5
      check: Can the IR represent asymmetric regional outcomes inside one imperial system rather than one empire-wide average?
  gnn_tasks:
    - id: gt1
      target: Predict next-slice fragmentation category from prior slice graph state.
    - id: gt2
      target: Predict whether a reform episode yields durable stabilization vs temporary reprieve.
    - id: gt3
      target: Predict whether a frontier shock results in localized disruption vs broader administrative breakdown.
    - id: gt4
      target: Predict whether high extraction imbalance is followed by lower provincial stability in the next slice.

labels_and_targets:
  supervised_targets:
    fragmentation_score:
      description: Degree of territorial, command, or administrative breakup in the next slice.
      source_priority:
        - Wikidata event chronology
        - Wikipedia chronology extraction
      leakage_rule: No post-slice evidence in feature construction.
    administrative_capacity_score:
      description: Degree to which imperial institutions retain durable governance, taxation, and military coordination.
      source_priority:
        - Seshat governance variables
        - Wikipedia evidence on taxation, administration, army organization, and reform
    elite_cohesion_proxy:
      description: Stability of elite cooperation around the governing settlement.
      source_priority:
        - article-derived relation counts
        - event chronology on civil conflict, usurpation, elite turnover, institutional rupture
    provincial_stability_proxy:
      description: Whether imperial territories remain governable without rapid secession, devastation, or capture.
      source_priority:
        - Wikipedia event chronology
        - article-derived unrest / revolt / secession signals
    legitimacy_proxy:
      description: Degree to which ruling authority is framed as rightful, restorative, divinely sanctioned, or accepted by major power centers.
      source_priority:
        - Wikipedia narrative evidence
        - article-derived claim and relation counts
    extraction_imbalance_proxy:
      description: Degree to which burdens of taxation, requisition, military settlement, or frontier defense are unevenly imposed across provinces and regions.
      source_priority:
        - Seshat macro variables where applicable
        - Wikipedia evidence on taxation, requisition, frontier burdens, and provincial loss
        - article-derived relation counts
  weak_labels:
    - Seshat complexity/governance variables
    - Wikidata event chronology
    - article-derived relation counts
  target_construction_rule: Freeze evidence by slice cutoff and emit one deterministic target record per slice.

evaluation:
  stage_1_validity:
    checks:
      - schema instantiates a graph for every slice
      - all required node and edge types are representable
      - all nodes are time-scoped or explicitly persistent
      - entity IDs resolve to stable references where possible
      - reforms and breakdown can coexist in the same slice without schema conflict
      - provincial and frontier burden pathways are representable without flattening into center-only summaries
  stage_2_grounding:
    metrics:
      - wikidata_entity_link_rate
      - wikipedia_citation_coverage
      - seshat_variable_attachment_rate
      - center_periphery_attachment_rate
  stage_3_retrieval:
    metrics:
      - answer_path_recall
      - ideological_node_recall
      - counterweight_node_recall
      - temporal_slice_precision
      - recovery_vs_fragmentation_disambiguation
      - imperial_path_recall
      - periphery_node_recall
      - origin_to_afterlife_path_recall
      - survival_through_transformation_recall
      - transmission_channel_recall
  stage_4_prediction:
    metrics:
      - held-out slice classification accuracy
      - calibration
      - robustness across precrisis vs crisis vs recovery vs collapse subperiods
      - gain_from_imperial_periphery_axis
  win_condition: >-
    A candidate schema wins only if it instantiates valid time-scoped graphs
    for all slices, grounds entities and structural variables to the required
    sources, retrieves material, institutional, ideological, counterweight,
    and imperial-periphery subgraphs, passes negative leakage tests,
    preserves fixed-dimensional projections for downstream GNN use, and shows
    non-trivial improvement from adding ideology, counterweights, and
    center-periphery structure, especially when distinguishing temporary
    recovery from durable stabilization and uneven regional breakdown.
  persistence_delta_v1:
    doc_ref: ontology/ontology-delta-v1-persistence.yaml
    ablation_addition: persistence_layer_ablation
    optional_win_evidence: >-
      Report whether stripping optional persistence types loses measurable
      retrieval or prediction on lineage or legacy tasks versus full v1-patched graph.

negative_tests:
  - id: nt1
    prompt: Explain Roman fall using only barbarian invasions as a terminal cause.
    expected_result: fail
    reason: prevents single-cause collapse narratives
  - id: nt2
    prompt: Return ideology as a summary paragraph without typed nodes.
    expected_result: fail
    reason: ideology must stay queryable
  - id: nt3
    prompt: Treat provinces only as places, not administrative-fiscal-military units.
    expected_result: fail
    reason: province representation must be administrative as well as geographic
  - id: nt4
    prompt: Infer post-476 outcomes while constructing pre-395 graph state.
    expected_result: fail
    reason: prevents temporal leakage from later collapse outcomes
  - id: nt5
    prompt: Explain imperial crisis from court politics alone without provincial extraction, frontier bargaining, or regional asymmetry.
    expected_result: fail
    reason: prevents center-only modeling

ablation_suite:
  - material_only
  - material_plus_institutions
  - material_plus_institutions_plus_ideology
  - full_model_with_counterweights
  - full_model_with_counterweights_plus_imperial_periphery
win_expectation:
  ideology_gain_required: true
  counterweight_gain_required: true
  recovery_modeling_required: true
  imperial_periphery_gain_required: true

splits:
  suggested_train:
    - severan_precrisis
    - third_century_crisis
  suggested_validation:
    - tetrarchic_recovery
  suggested_stress_test:
    - western_fragmentation
    - Apply the learned schema, without redesign, back to Roman 1A expansion as a reverse transfer test.

modern_bridge:
  role: historical schema-shaping probe
  purpose: tests crisis expressivity, temporal coherence, ideology retrieval, recovery modeling, counterweight failure representation, and explicit center-periphery asymmetry
  downstream_alignment:
    - share ontology with modern forecast probes
    - reuse generic_target_interface where possible
    - do not require direct market labels inside this probe
    - require explicit representability of imperial relations where relevant

failure_modes_to_watch:
  - Collapse explained only by invasions with no fiscal, institutional, legitimacy, or extraction layer.
  - Ideology represented as raw text with no queryable nodes.
  - Provinces treated as passive territories rather than active fiscal-military-administrative units.
  - Counterweights omitted because they ultimately failed.
  - Recovery episodes flattened into noise inside a generic decline narrative.
  - Role changes over time causing duplicate entities instead of stable identities.
  - Leakage from post-476 outcomes into earlier graph construction.
  - Center-periphery asymmetry omitted even when it is causally relevant.

autoresearch_objective_hint:
  optimize_for:
    - grounding quality
    - retrieval of ideology and counterweights
    - temporal coherence
    - representation of both recovery and fragmentation
    - representation of center-periphery asymmetry
    - GNN-usable fixed projection
  avoid:
    - overfitting to one Roman crisis subperiod
    - schemas that only reward terminal collapse signals
    - collapse of contested interpretations into a single consensus story
    - center-only narratives that erase imperial extraction and uneven burden

notes:
  - This is a family probe and should share ontology with Roman 1A (expansion/consolidation) while being scored independently.
  - Keep the file human-editable; add machine-generated enrichments in separate derived artifacts.
  - This patch is meant to improve compatibility with a broader benchmark suite that includes Global South and explicitly imperial probes.

golden_tasks:
  - id: roman_crisis_to_reform
    start_types: ["Shock"]
    required_edges: ["responds_to", "reforms"]
    target_types: ["Policy"]
    min_hops: 2
    must_cross_layers: ["counterweight", "institutional"]
  - id: roman_collapse_claim_contestation
    start_types: ["Claim"]
    required_edges: ["contests"]
    target_types: ["Claim"]
    min_hops: 1
    must_cross_layers: ["epistemic"]
  - id: roman_fragmentation_persistence
    start_types: ["LineageClaim"]
    required_edges: ["transmits_through"]
    target_types: ["LegacyAggregate"]
    min_hops: 1
    must_cross_layers: ["persistence"]

designated_ablations:
  - name: epistemic_off
    for_tasks: ["roman_collapse_claim_contestation"]
  - name: persistence_off
    for_tasks: ["roman_fragmentation_persistence"]

complexity_budget:
  max_node_types_used: 6
  max_edge_types_used: 4
  max_mean_supporting_path_len: 2.5
