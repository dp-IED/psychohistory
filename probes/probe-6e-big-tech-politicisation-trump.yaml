probeid: "6C-5"
family: "businessfamily6C"
name: "Big Tech Emergence, Platform Consolidation, and Political Reordering — Trump-Era Politicization and Backlash"
version: "0.1"
status: "candidate"
format: "probespecv2"
benchmark_pack: v0
compatibility_tier: v1-patched
ontology_delta_ref: ontology/ontology-delta-v1-persistence.yaml

summary:
  purpose: "Define a leakage-resistant benchmark probe for testing whether a shared graph IR can encode Big Tech's transition from liberal-technocratic legitimacy into open political contestation during 2017-2021, while remaining suitable for retrieval, explanation, and downstream adaptive GNN training."
  rationale: "This probe stresses platform governance, speech moderation, antitrust attention, nationalism, advertiser pressure, and platform-state tension as interacting structures rather than reducing the period to partisan rhetoric or generic event flow. It is intended to force typed representation of firms, platforms, regulators, coalitions, narratives, policies, and counterweights across tightly bounded slices."

scope:
  region: "Western / U.S. with global platform effects"
  polity_or_system: "Big Tech under content moderation conflict, populist backlash, nationalism, antitrust pressure, and platform-state tension"
  temporal_window: "2017 to 2021"
  startyear: 2017
  endyear: 2021
  label: "Moderation conflict, antitrust attention, nationalism, and backlash"
  recommendedslices:
    - sliceid: "6c5_populist_platform_tension"
      startyear: 2017
      endyear: 2018
      label: "Rising populist conflict and platform legitimacy stress"
    - sliceid: "6c5_antitrust_and_content_conflict"
      startyear: 2019
      endyear: 2020
      label: "Antitrust scrutiny, moderation disputes, and sovereignty narratives"
    - sliceid: "6c5_postelection_platform_crisis"
      startyear: 2021
      endyear: 2021
      label: "Election aftermath, deplatforming crisis, and platform-state tension"
  exclusions:
    - "Exclude frontier-AI model races, safety debates, and compute-concentration narratives whose primary causal salience belongs to 2022 and later."
    - "Exclude post-2022 war-tech convergence, defense-tech branding, battlefield software legitimacy, and cloud-security fusion."
    - "Exclude retrospective importation of 2022-2026 export-control, AI-security, or industrial-policy logic into 2017-2021."
    - "Do not treat later platform-AI integration as evidence for earlier moderation or political conflict mechanisms."
    - "Do not include post-2022 war shocks as explanatory drivers for 2017-2021 legitimacy or regulatory shifts."

artifacts:
  humanauthored:
    - "Probe definition, scope boundaries, slice design, and exclusions"
    - "Gold subquestions and failure prompts"
    - "Seed entity curation and ontology constraints"
    - "Target definitions, leakage rules, and evaluation criteria"
  machinegenerated:
    - "Time-scoped entity linking to Wikidata and Wikipedia"
    - "Event and claim extraction from GDELT, ICEWS, hearings, filings, and platform archives"
    - "Candidate graph expansions for narratives, norms, policies, and counterweights"
    - "Derived slice-level target features and transition deltas"
    - "Retriever-ready query packs and contrastive negative examples"

groundedsources:
  - source: "Wikidata"
    role: "Stable entity spine for firms, regulators, offices, hearings, and key events"
    required: true
  - source: "Wikipedia"
    role: "Human-readable event, institution, platform, and policy grounding"
    required: true
  - source: "SEC filings"
    role: "Firm disclosures, business-model dependence, risk framing, and concentration context"
    required: true
  - source: "GDELT"
    role: "Time-indexed media-event flow, salience shifts, and narrative pressure proxies"
    required: true
  - source: "Antitrust filings or congressional hearings"
    role: "Formal scrutiny, regulatory attention, elite signaling, and platform accountability episodes"
    required: true
  - source: "Platform policy archives"
    role: "Primary-source evidence for moderation rules, enforcement changes, and governance mechanics"
    required: true
  - source: "ICEWS"
    role: "Optional structured political interaction signals where useful for state-platform contention"
    required: false

corequestion: "Can a single graph schema represent how Big Tech moved from liberal-technocratic legitimacy into open political contestation through moderation conflict, antitrust pressure, populist backlash, and intensified platform-state tension in a way that remains queryable, time-scoped, and consumable by downstream GNNs?"

historical_or_analytical_subquestions:
  - "How should moderation governance be represented so that policy changes, enforcement actions, appeals, and deplatforming events are first-class graph structures rather than narrative residue?"
  - "How did political polarization alter platform legitimacy among users, elites, and media ecosystems across the three slices?"
  - "How did antitrust and regulatory attention interact with platform concentration and public controversy rather than operating as separate commentary streams?"
  - "Which nationalist, sovereignty, and censorship narratives attached to platforms, and how did those narratives differ by coalition and slice?"
  - "How did advertiser pressure, user mobilization, and direct or indirect state pressure constrain or redirect firm behavior?"
  - "What counterweights and internal contradictions limited platform choices, including courts, federalism, internal employee dissent, civil-society critique, and business-model dependence?"
  - "Did elite realignment around Big Tech produce durable coalition shifts, or did it mainly intensify rhetorical contestation without dissolving platform dependence?"
  - "What structurally changed between 2017-2018, 2019-2020, and 2021, and which changes reflect governance mechanics rather than surface discourse?"

schemarequirements:
  mustrepresent:
    - "Platform governance as typed policy and enforcement structure"
    - "Distinct firms, platforms, regulators, legislative actors, executive actors, user populations, advertisers, and political coalitions"
    - "Narratives and norms as separate nodes from claims, policies, and events"
    - "Counterweights as explicit constraints rather than optional annotations"
    - "Material business dependence and political backlash in the same graph without collapsing either into text"
    - "Time-scoped legitimacy, contestation, and regulatory pressure across slices"
  nodetypes:
    - "Firm"
    - "Platform"
    - "RegulatoryBody"
    - "LegislativeBody"
    - "ExecutiveOffice"
    - "UserPopulation"
    - "Advertiser"
    - "DataAsset"
    - "Event"
    - "Policy"
    - "Narrative"
    - "Norm"
    - "Counterweight"
    - "Claim"
    - "PoliticalCoalition"
    - "MediaNarrative"
    - "LaborPool"
  edgetypes:
    - "moderates"
    - "deplatforms"
    - "scrutinizes"
    - "regulates"
    - "contests"
    - "legitimizes"
    - "delegitimizes"
    - "dependson"
    - "monetizes"
    - "polarizes"
    - "alignswith"
    - "respondsTo"
    - "constrains"
  mustsupport:
    - "Stable identities for firms, regulators, policies, and coalitions across slices"
    - "Coexistence of business concentration and political backlash in the same graph state"
    - "Typed retrieval over moderation events, antitrust events, and legitimacy narratives"
    - "Fixed-dimensional node projection for downstream GNN training"
    - "Pre-cutoff graph snapshots for leakage-safe supervision"
    - "Querying for failed counterweights, not only successful drivers"
    - "Contradictory signals such as elite endorsement alongside public delegitimation"
  antirequirements:
    - "Must forbid reducing the period to partisan rhetoric alone"
    - "Must forbid ignoring platform governance mechanics"
    - "Must forbid ignoring advertiser and regulatory pressure"
    - "Must forbid returning ideology as prose only"
    - "Must forbid importing post-2022 AI-security logic backward"
  mayrepresent:
    nodetypes:
      - "LineageClaim"
      - "InstitutionalLineage"
      - "InheritanceBundle"
      - "TransmissionChannel"
      - "LegacyAggregate"
    edgetypes:
      - "inherits_from"
      - "transmits_through"
      - "supersedes_while_claiming_continuity"
      - "leaves_legacy_via"

expectedgraphaxes:
  material: "Revenue dependence on advertising, user attention, market concentration, and traffic intermediation."
  institutional: "FTC, DOJ, Congress, White House and agency relationships, hearing structures, and platform policy apparatus."
  ideological: "Free speech, safety, openness, anti-elite backlash, censorship claims, nationalism, and technocratic legitimacy."
  counterweights: "Courts, federalism, civil-society criticism, employee dissent, advertiser exits, and reputational blowback."
  asymmetryandexternalconstraint: "Global platform reach, uneven regulatory capacity, election shocks, and dependence on legacy legal frameworks."
  firms: "Meta/Facebook, Google/YouTube, Twitter, and Amazon where cross-platform dynamics or cloud/market power are relevant."
  investors: "Capital-market expectations and governance pressures where they shape tolerance for moderation, concentration, or political risk."
  procurement: "Only where state contracting or hosting relationships materially shape platform-state tension; not as a default driver."
  standards: "Speech rules, enforcement rules, platform governance protocols, and quasi-public norms around acceptable online conduct."
  platforms: "Feeds, recommender systems, ad systems, account governance, and deplatforming pathways."
  labor: "Trust-and-safety workforces, contractors, engineering orgs, and internal dissent."
  regulatorychannels: "Hearings, investigations, lawsuits, agency inquiries, executive signaling, and policy archive changes."

