generictargetinterface:
  graphleveltargets:
    - "legitimacypolarizationscore"
    - "moderationstressscore"
    - "regulatorypressurescore"
    - "concentrationscore"
    - "counterweightstrengthscore"
    - "platformstateconflictscore"
  slicetransitiontargets:
    - "legitimacypolarizationdelta"
    - "moderationstressdelta"
    - "regulatorypressuredelta"
    - "counterweightdeltа"
    - "platformstateconflictdelta"
    - "governanceescalationdelta"

probetasks:
  retrievaltasks:
    - "Retrieve the moderation policies, enforcement events, and governance actors most relevant to each slice."
    - "Retrieve which political coalitions and media narratives most strongly delegitimized or defended major platforms in each slice."
    - "Retrieve the main antitrust and congressional scrutiny events and link them to specific firms, platforms, and claims."
    - "Retrieve advertiser, user, and state pressures that constrained platform behavior, distinguishing direct from indirect pressure."
    - "Retrieve the strongest counterweights to platform power and explain why they were partial, delayed, or inconsistent."
    - "Retrieve deplatforming-related events and connect them to prior governance rules rather than treating them as isolated shocks."
  structuraltasks:
    - "Construct a slice-level graph that separates Firm, Platform, Policy, Narrative, and PoliticalCoalition nodes."
    - "Infer whether delegitimization pathways are primarily driven by governance events, media narratives, or regulatory scrutiny."
    - "Detect cross-slice persistence of firm concentration even as legitimacy polarizes."
    - "Identify minimal causal subgraphs linking moderation conflict to platform-state tension."
    - "Map where advertiser pressure and regulatory pressure reinforce each other versus where they diverge."
  gnntasks:
    - "Predict next-slice moderationstressscore from pre-cutoff graph state."
    - "Predict next-slice regulatorypressurescore from combined concentration, narrative, and scrutiny structure."
    - "Classify whether a platform-state conflict transition is likely to intensify, stabilize, or diffuse in the next slice."
    - "Estimate whether adding counterweight nodes improves prediction and retrieval performance relative to material-only baselines."

labelsandtargets:
  legitimacypolarizationscore:
    description: "Degree to which platform legitimacy is split across coalitions, media narratives, and institutional actors rather than remaining broadly technocratic."
    sourcepriority:
      - "GDELT"
      - "Wikipedia"
      - "Congressional hearings"
      - "Platform policy archives"
    leakagerule: "Use only evidence timestamped at or before the slice cutoff; do not use later reinterpretations of earlier events."
    targetconstructionrule: "Combine normalized counts of delegitimizing versus legitimizing claims across major coalitions, weighted by institutional salience and cross-platform persistence."
  moderationstressscore:
    description: "Intensity of governance strain visible in policy revisions, enforcement controversy, appeals, public criticism, and high-salience moderation events."
    sourcepriority:
      - "Platform policy archives"
      - "Wikipedia"
      - "GDELT"
    leakagerule: "Do not use post-slice enforcement outcomes or later policy regimes to label earlier slices."
    targetconstructionrule: "Aggregate policy change frequency, high-salience moderation incidents, deplatforming events, and claim conflict around safety versus free speech."
  regulatorypressurescore:
    description: "Strength of formal and quasi-formal pressure from agencies, hearings, investigations, and antitrust pathways."
    sourcepriority:
      - "Antitrust filings"
      - "Congressional hearings"
      - "DOJ"
      - "FTC"
      - "Wikipedia"
    leakagerule: "Only count scrutiny visible by the slice cutoff; exclude later-filed cases or retroactive summaries."
    targetconstructionrule: "Score the presence, intensity, and diversity of scrutiny channels, with higher weight for formal investigation and repeated bipartisan attention."
  concentrationscore:
    description: "Extent to which a small set of firms and platforms dominate attention, advertising, and governance chokepoints relevant to the probe."
    sourcepriority:
      - "SEC filings"
      - "Wikipedia"
      - "Antitrust materials"
    leakagerule: "Do not infer concentration from later AI or cloud-security dominance outside the probe window."
    targetconstructionrule: "Use firm/platform centrality, advertiser dependence, cross-platform integration, and cited antitrust concentration indicators available by slice."
  counterweightstrengthscore:
    description: "Relative strength of institutions and pressures capable of constraining platform power or moderating political backlash."
    sourcepriority:
      - "Congressional hearings"
      - "Court or policy records when linked via Wikipedia"
      - "GDELT"
      - "Platform archives"
    leakagerule: "Do not score counterweights by later successful reforms or later crises outside the slice."
    targetconstructionrule: "Estimate the number, diversity, and realized constraining effect of courts, federalism, advertisers, civil society, and employee dissent."
  platformstateconflictscore:
    description: "Intensity of direct or indirect conflict between platforms and state actors over governance, speech, legitimacy, and enforcement."
    sourcepriority:
      - "Wikipedia"
      - "GDELT"
      - "Congressional hearings"
      - "Platform policy archives"
      - "ICEWS"
    leakagerule: "Restrict labels to conflict signals available before the slice cutoff; exclude later national-security reinterpretations."
    targetconstructionrule: "Combine executive and legislative contestation, public threats or pressure, platform responses, and high-salience deplatforming or misinformation conflicts."

evaluation:
  stage1validity:
    - "Check that every graph snapshot is buildable from pre-cutoff evidence only."
    - "Check that required node and edge types are instantiated in all slices."
    - "Check that platform governance is represented as structure, not free-text summary."
    - "Check that major firms retain stable identity across slices."
  stage2grounding:
    - "Measure percentage of salient entities linked to stable Wikidata or clearly grounded archive records."
    - "Measure policy grounding coverage against platform policy archives and hearing records."
    - "Measure event grounding coverage against Wikipedia and GDELT alignment."
    - "Penalize unsupported narrative or claim nodes."
  stage3retrieval:
    - "Score whether retrieval returns typed subgraphs for moderation, antitrust, legitimacy, and counterweights."
    - "Measure answerability of slice-specific questions without collapsing into prose-only ideology."
    - "Test contrastive retrieval between similar firms and similar events across slices."
    - "Require explanation paths that connect business concentration to political backlash via intermediate structures."
    - "Optional v1: origin_to_afterlife_path_recall for platform governance norms and coalition realignments."
    - "Optional v1: survival_through_transformation_recall when firms or policies retain identity across slices under new legitimacy frames."
    - "Optional v1: transmission_channel_recall for media, parties, and advertiser pathways."
  stage4prediction:
    - "Evaluate next-slice target prediction using Brier score, calibration, ranking quality, and directional change accuracy."
    - "Compare ablations to confirm gains from ideology, platform governance, and regulatory channels."
    - "Stress-test on held-out prompts designed to confuse rhetoric-only models."
    - "Reward models that preserve forecast skill without sacrificing grounding."
  wincondition: "The probe passes when a single schema remains temporally valid, grounds core entities and policies, retrieves moderation and counterweight structure accurately, and materially improves held-out target prediction over material-only and prose-ideology baselines."
  persistence_delta_v1:
    doc_ref: "ontology/ontology-delta-v1-persistence.yaml"
    ablation_addition: "persistence_layer_ablation"
    optional_win_evidence: "Report whether stripping optional persistence types loses measurable retrieval or prediction on lineage or legacy tasks versus full v1-patched graph."

negativetests:
  - "Explain the era only as partisan culture war."
  - "Ignore moderation and governance mechanics."
  - "Treat regulators only as commentary."
  - "Return ideology as prose only."
  - "Import post-2022 AI-security convergence into 2017-2021."
  - "Model deplatforming as isolated events with no prior policy structure."
  - "Treat advertiser pressure as irrelevant noise rather than a causal constraint."

ablationsuite:
  - "materialonly"
  - "materialplusinstitutions"
  - "materialplusinstitutionsplusideology"
  - "materialplusinstitutionsplusplatformgovernance"
  - "materialplusinstitutionsplusregulatorychannels"
  - "fullmodelwithcounterweights"

splits:
  suggestedtrain:
    - "Train on entity linking, policy extraction, and target construction using 2017-2018 and 2019-2020 slices."
    - "Use within-slice masking over firms, coalitions, and policy nodes to test reconstruction."
  suggestedvalidation:
    - "Validate on held-out questions and partial-graph retrieval from the 2019-2020 slice."
    - "Use pre-2021 cutoff snapshots for transition prediction into the 2021 slice."
  suggestedstresstest:
    - "Stress-test on the 2021 slice with deplatforming crisis prompts, coalition ambiguity, and high narrative conflict."
    - "Include adversarial prompts that try to collapse antitrust, legitimacy, and moderation into one undifferentiated rhetoric channel."

bridgerole:
  modernbridge: true
  purpose: "Serve as the business-politics bridge between Obama-era platform consolidation and post-2022 AI-platform-security convergence without allowing leakage from later periods."
  downstreamalignment: "Aligns with adjacent Big Tech probes by preserving transferable ontology for platform governance, concentration, legitimacy, regulation, and backlash while staying compatible with adaptive GNN forecasting tasks."
  failuremodestowatch:
    - "Rhetoric-only explanations that omit platform governance structure"
    - "Overfitting to one firm, especially Twitter, at the expense of platform-system representation"
    - "Treating antitrust and moderation as unrelated channels"
    - "Using later AI-security frames to explain earlier state-platform conflict"
    - "Encoding narratives but not counterweights"
  autoresearchobjectivehint: "Search for graph designs that maximize temporal validity, grounding coverage, ideology retrieval, counterweight sensitivity, and next-slice target prediction while penalizing prose-only explanations and future leakage."
  notes:
    - "This probe must separate political backlash from underlying business-model concentration."
    - "The graph should make legitimacy conflict visible without erasing durable structural dependence on major platforms."
    - "Counterweights should be typed even when they fail, fragment, or constrain only partially."
    - "All entities should be explicitly time-scoped or marked persistent to support slice-stable GNN embeddings."