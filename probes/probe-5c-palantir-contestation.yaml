probeid: "6B-3"
parentprobe: "6B"
name: "Palantir Border Security Politicization and Legitimacy Contestation"
version: "0.1"
status: candidate
format: probespecv2
benchmark_pack: v0
compatibility_tier: v0-legacy

summary:
  purpose: "Evaluate whether a transferable graph schema can represent Palantir's 2017 to 2021 trajectory through border-security politics, military contracting expansion, direct-listing transition, reputational conflict, and intensified counterweights."
  rationale: "This subprobe isolates the politicization grammar of the parent 6B case so the IR can be tested on contested legitimacy, differentiated state customers, public controversy, and procurement growth under political polarization."

scope:
  region: "Western / U.S. with selective external extension where evidenced"
  polity: "Palantir as a politicized firm-state-security platform during border-security and public-market transition"
  temporalwindow:
    startyear: 2017
    endyear: 2021
    label: "Trump-era border/security politics, military contracting expansion, and legitimacy contestation"
  recommendedslices:
    - sliceid: "6b3_border_security_politicization"
      startyear: 2017
      endyear: 2021
      label: "Politicized security demand, reputational conflict, and differentiated state embedding"
  exclusions:
    - "Do not explain the period only as generic political controversy."
    - "Do not collapse ICE, defense customers, and procurement offices into one generic government actor."
    - "Do not omit counterweights such as civil-liberties critique, procurement scrutiny, and reputational backlash."
    - "Do not import 2022 to 2026 AI-war-tech legitimacy."
    - "Do not treat direct listing as a purely financial event detached from legitimacy structure."

artifacts:
  humanauthored:
    - "Canonical subprobe boundary for 2017 to 2021"
    - "Ontology commitments for controversy, counterweights, procurement, and customer differentiation"
    - "Target definitions for reputational polarization and controversy deltas"
    - "Negative tests and ablations"
  machinegenerated:
    - "Entity linking for agencies, products, contracts, and counterweight actors"
    - "Narrative extraction from media coverage and public-company materials"
    - "Procurement-path enrichment from contract records"
    - "Fixed-dimensional node projections for downstream GNN use"

groundedsources:
  - source: "Wikidata"
    role: "Canonical IDs and continuity across the Palantir family of probes"
    required: true
  - source: "Wikipedia"
    role: "Chronology, controversies, public-company milestones, and institution relationships"
    required: true
  - source: "GDELT"
    role: "Narrative dynamics, politicization, public controversy, and reputational contestation"
    required: true
  - source: "ICEWS"
    role: "Optional structured political interaction signals relevant to public-sector and political events"
    required: false
  - source: "SEC filings / annual reports / investor letters"
    role: "Direct listing, customer concentration, risk disclosures, and market identity claims"
    required: true
  - source: "U.S. federal procurement or contract databases"
    role: "Military and public-sector contract pathways and continuity"
    required: true

corequestion: "Can a single graph schema represent how Palantir's growth during 2017 to 2021 depended simultaneously on procurement expansion, politicized border-security demand, differentiated institutional embedding, and increasingly organized counterweights in a way that is queryable and GNN-consumable?"

subquestions:
  - "Which institutions drove Palantir's growth during this period, and how did their roles differ?"
  - "How should ICE and border-related work be represented distinctly from defense and other public-sector relationships?"
  - "Which narratives legitimized Palantir as necessary, patriotic, efficient, or strategically useful during this period?"
  - "Which counterweights, including civil-liberties critique, media scrutiny, procurement concern, and reputational backlash, constrained or contested growth?"
  - "How did direct listing and public-company identity interact with existing state-demand structures?"
  - "What structural differences separate institutional embedding from reputational polarization?"
  - "How can the graph distinguish conflict over legitimacy from simple contract expansion?"
  - "Which within-slice changes show intensification or diversification of controversy?"

schemarequirements:
  mustrepresent:
    nodetypes:
      - "Actor"
      - "Firm"
      - "Institution"
      - "Office"
      - "ProcurementChannel"
      - "Contract"
      - "PlatformProduct"
      - "Event"
      - "Policy"
      - "Narrative"
      - "Norm"
      - "Counterweight"
      - "Shock"
      - "Claim"
      - "SecurityApparatus"
      - "RegulatoryBody"
      - "MarketActor"
      - "MediaNarrative"
    edgetypes:
      - "contractswith"
      - "procuresfrom"
      - "embedsin"
      - "legitimizes"
      - "delegitimizes"
      - "constrains"
      - "contests"
      - "scrutinizes"
      - "regulates"
      - "marketsas"
      - "alignswith"
      - "dependson"
      - "brandsthrough"
      - "respondsTo"
      - "integrateswith"
  mustsupport:
    - "Typed differentiation between ICE, defense, intelligence, and other state customers."
    - "Separate representation of legitimacy, delegitimization, and counterweight structures."
    - "Explicit contract objects and procurement pathways."
    - "Public-market identity relations linked to but distinct from state-demand relations."
    - "Time-scoped narrative and controversy modeling."
    - "Fixed-dimensional node projections and provenance traces for downstream GNN use."
  antirequirements:
    - "Do not omit counterweights."
    - "Do not flatten controversy into a sentiment summary."
    - "Do not collapse state customers into one node."
    - "Do not model direct listing only as finance news."
    - "Do not import later war-tech legitimacy."

