generictargetinterface:
  graphleveltargets:
    - target: "reputationalpolarizationscore"
      description: "Degree of split between legitimizing and delegitimizing narratives."
      computableat: "slice cutoff only"
    - target: "controversyintensityscore"
      description: "Strength and diversity of active controversy and scrutiny."
      computableat: "slice cutoff only"
    - target: "stateembeddingscore"
      description: "Depth of embedding across differentiated state institutions."
      computableat: "slice cutoff only"
    - target: "procurementdependencyscore"
      description: "Degree of dependence on public-sector procurement pathways."
      computableat: "slice cutoff only"
    - target: "counterweightstrengthscore"
      description: "Strength of organized constraints and oppositional structures."
      computableat: "slice cutoff only"
  slicetransitiontargets:
    - target: "controversydelta"
      description: "Within-slice change in controversy intensity and diversity."
    - target: "polarizationdelta"
      description: "Within-slice change in reputational polarization."
    - target: "marketidentitydelta"
      description: "Within-slice shift in public-company identity and exposure."

probetasks:
  retrievaltasks:
    - "Which institutions and procurement channels drove Palantir's growth during this period?"
    - "Which narratives legitimized or delegitimized Palantir in the border-security context?"
    - "What counterweights constrained growth, and why were they not decisive?"
    - "How did direct listing change the structure of legitimacy and scrutiny?"
  structuraltasks:
    - "Retrieve all counterweight paths constraining a given customer relationship."
    - "Keep ICE, defense, and procurement offices as distinct typed objects."
    - "Represent direct listing as linked to but distinct from procurement and controversy structures."
    - "Separate media narrative from institutional embedding."
  gnntasks:
    - "Predict controversyintensityscore from differentiated customer, narrative, and counterweight features."
    - "Predict reputationalpolarizationscore from legitimizing and delegitimizing graph structure."
    - "Classify whether graph change is driven more by contract expansion or controversy intensification."

labelsandtargets:
  reputationalpolarizationscore:
    description: "Degree of split between positive security narratives and negative surveillance or politicization narratives."
    sourcepriority:
      - "GDELT"
      - "Wikipedia"
      - "SEC filings / annual reports / investor letters"
    leakagerule: "Use only narratives documented within 2017 to 2021."
    targetconstructionrule: "Compute divergence between legitimizing and delegitimizing narrative clusters weighted by recurrence and prominence."
  controversyintensityscore:
    description: "Strength and diversity of public controversy, scrutiny, and criticism."
    sourcepriority:
      - "GDELT"
      - "Wikipedia"
      - "ICEWS"
    leakagerule: "Use only pre-2022 controversy evidence."
    targetconstructionrule: "Score number, diversity, and centrality of controversy and counterweight nodes."
  stateembeddingscore:
    description: "Depth of institutional embedding across differentiated state customers."
    sourcepriority:
      - "U.S. federal procurement or contract databases"
      - "Wikipedia"
      - "SEC filings / annual reports / investor letters"
    leakagerule: "Do not infer embedding from notoriety alone."
    targetconstructionrule: "Aggregate explicit customer breadth, continuity, and product integration evidence."
  procurementdependencyscore:
    description: "Degree of growth dependence on public-sector procurement pathways."
    sourcepriority:
      - "SEC filings / annual reports / investor letters"
      - "U.S. federal procurement or contract databases"
    leakagerule: "Use contemporaneous customer concentration only."
    targetconstructionrule: "Map contract concentration and centrality into a bounded score."
  counterweightstrengthscore:
    description: "Strength of organized constraints active in the slice."
    sourcepriority:
      - "GDELT"
      - "Wikipedia"
      - "SEC filings / annual reports / investor letters"
    leakagerule: "Count only constraints documented before 2022."
    targetconstructionrule: "Score persistence, authority, and diversity of constraining edges and actors."

evaluation:
  stage1validitychecks:
    - "Verify one slice covering 2017 through 2021."
    - "Verify differentiated state institutions remain separate."
    - "Verify counterweights and delegitimizing narratives are typed objects."
    - "Verify direct-listing relations are linked to market identity but not confused with procurement."
  stage2groundingmetrics:
    - "Entity-link precision for institutions, products, and market actors"
    - "Contract and procurement grounding coverage"
    - "Narrative temporal-grounding compliance"
  stage3retrievalmetrics:
    - "Counterweight retrieval recall"
    - "Customer differentiation accuracy"
    - "Controversy-path fidelity"
    - "Separation accuracy for market identity versus institutional embedding"
  stage4predictionmetrics:
    - "Graph-level target accuracy for controversyintensityscore and reputationalpolarizationscore"
    - "Within-slice delta accuracy for controversydelta and marketidentitydelta"
    - "Ablation gain from adding counterweights over procurement-only baseline"
  wincondition: "The schema wins if it can represent differentiated state demand, politicized legitimacy, and organized counterweights without flattening controversy into sentiment or the state into one node."

negativetests:
  - "Explain this period only as generic political controversy."
  - "Treat ICE and DoD as one customer."
  - "Return criticism as an untyped paragraph."
  - "Ignore counterweights and output only security-demand growth."
  - "Model direct listing only as a finance milestone with no legitimacy effects."

ablationsuite:
  - "materialonly"
  - "materialplusinstitutions"
  - "materialplusinstitutionsplusprocurement"
  - "materialplusinstitutionsplusideology"
  - "fullmodelwithcounterweights"

splits:
  suggestedtrain:
    - "6b3_border_security_politicization"
  suggestedvalidation:
    - "heldout_counterweight_and_narrative_subset"
  suggestedstresstest:
    - "transfer_to_6B-4"

bridgerole:
  modernbridge: "Politicized business-state-security probe"
  purpose: "Bridge normalized institutional embedding and later war-tech mainstreaming by forcing controversy, counterweights, and public-market identity into the same ontology."
  downstreamalignment:
    - "Aligns with 6B-2 on procurement and agency continuity"
    - "Aligns with 6B-4 on market identity and external-legitimacy pathways"
  failuremodestowatch:
    - "State homogenization"
    - "Counterweight omission"
    - "Narrative blobification"
    - "Controversy reduced to sentiment"
  autoresearchobjectivehint: "Prefer schemas that improve retrieval and prediction when counterweights, differentiated institutions, and reputational structures are modeled explicitly."
  notes:
    - "This child probe should reward controversy structure rather than generic scandal summaries."