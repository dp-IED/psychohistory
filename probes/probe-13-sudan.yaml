id: probe-8b-sudan-war-fragmented-sovereignty-regionalized-armed-competition
title: Sudan War, Fragmented Sovereignty, and Regionalized Armed Competition
status: proposed
family: wars
tags:
  - wars
  - politics
  - ideological_trends
  - african
  - contemporary
  - fragmented_sovereignty
  - regionalization
  - external_constraint

summary: >
  Tests whether the graph IR can represent military factionalism, regional
  patrons, urban warfare, extraction, displacement, and state-collapse pathways
  without flattening the conflict into a generic civil-war node.

temporal:
  start: "2019-01-01"
  end: "2026-12-31"
  slice_granularity: conflict_phase
  cutoff_rule: "Use only information available within each slice."

scope:
  regions:
    - Sudan
    - Khartoum
    - Darfur
    - border and patron networks in the wider region
  focus: >
    How military factions, external patrons, extraction channels, urban warfare,
    humanitarian collapse, and fragmented authority interact in a contemporary
    state-fragmentation conflict.

core_question: >
  How does competition between armed centers of power transform a political
  transition into fragmented sovereignty, regionalized armed competition, and
  state-collapse risk, and what counterweights fail to stabilize the system?

grounding:
  primary_entity_spine:
    - Wikidata / Wikipedia entities for factions, commanders, ministries, mediation bodies, cities, regions, and major conflict events
  event_streams:
    - ACLED
    - ICEWS
    - GDELT
  forecast_or_backtest_hooks:
    - time-sliced conflict and escalation targets
  note: >
    Contemporary Global South war probe stressing elite fragmentation,
    asymmetry, external patrons, and humanitarian structure.

probe_type: contemporary_fragmented_sovereignty

schema_requirements:
  must_represent_node_types:
    - Actor
    - Event
    - Institution
    - ExternalPower
    - ExternalConstraint
    - MilitaryFormation
    - ArmedGroup
    - SecurityForce
    - SecurityApparatus
    - Policy
    - Narrative
    - Norm
    - Claim
    - Counterweight
    - Region
    - Infrastructure
    - HumanitarianPopulation
    - AidChannel
    - InternationalOrganization
    - ExtractionChannel
    - Resource
    - Shock
    - TransmissionChannel
    - LegacyAggregate
  may_represent_node_types:
    - Coalition
    - Office
    - Province
    - LocalElite
    - TransitCorridor
    - Commodity
  must_represent_edges:
    - fragments
    - backs
    - supports
    - constrains
    - mobilizes
    - contests
    - legitimizes
    - delegitimizes
    - polarizes
    - governs
    - loots
    - extractsfrom
    - sanctions
    - pressures
    - mediates
    - negotiateswith
    - undermines
    - displaces
    - respondsto
    - reconfigures
    - transmitsthrough
    - leaveslegacyvia
  required_cross_scale_properties:
    - "Must include military factions, regional patrons, extraction channels, urban warfare, and humanitarian displacement."
    - "Must model fragmented authority rather than assuming a unitary state actor."
    - "Must connect domestic armed competition to external patronage and state-collapse pathways."

expected_graph_axes:
  - fragmented sovereignty and rival command structures
  - regional patrons and external mediation
  - urban warfare and territorial fragmentation
  - extraction, looting, and war finance
  - displacement and humanitarian constraint
  - legitimacy competition and transitional politics
  - collapse pathways and reconstitution claims

causal_layers:
  structural_drivers:
    - Longstanding coercive fragmentation inside the state
    - Weak civilian authority over armed institutions
    - Regionalized patronage and external security interests
    - Economic fragility and extractive incentives that reward armed autonomy
  conjunctural_mechanisms:
    - Breakdown of transitional bargaining between armed centers
    - Urban warfare reshaping authority, displacement, and governance capacity
    - External backing and mediation altering factional endurance
    - Extraction and looting networks financing continued armed competition
  trigger_candidates:
    - "Breakdown of transitional military-political settlement"
    - "Escalation into open fighting between rival armed centers"
    - "Regional patron or mediation shifts that change conflict geometry"

ideological_layer_requirements:
  dominant_episteme_questions:
    - What assumptions made military stewardship, coercive guardianship, or managed transition appear plausible?
    - What narratives framed rival armed actors as protectors, restorers, or necessary stabilizers?
  legitimating_apparatus_questions:
    - Which security institutions, media narratives, foreign patrons, and diplomatic forums validated or normalized armed authority?
  suppressed_counterweight_questions:
    - Which civilian transition blocs, unions, neighborhood committees, mediation structures, or constitutional alternatives existed but were weakened?
    - By what institutional, coercive, or rhetorical mechanism were they displaced?
  ideological_rupture_rule:
    - "Choose one datable collapse or legitimacy-failure point per slice."
  contested_claims_rule:
    - "Do not settle whether factional rivalry, external patronage, extraction finance, weak transition design, or regional inequality was primary."

must_include_contested_claims:
  - "Factional rivalry as primary driver vs failed transition architecture as primary driver"
  - "External patrons as decisive vs domestic coercive fragmentation as decisive"
  - "War-finance and extraction as sustaining cause vs urban military balance as sustaining cause"
  - "Civilian counterweight failure due mainly to repression vs institutional exclusion"
  - "State collapse as contingent outcome vs structurally overdetermined pathway"

probe_tasks:
  retrieval_questions:
    - "Can the graph distinguish rival armed centers instead of one state node?"
    - "Can it retrieve a path from external patronage to conflict endurance?"
    - "Can it represent extraction and looting as typed war-finance structure?"
    - "Can it surface the civilian counterweights that existed before fragmentation deepened?"
    - "Can it represent humanitarian displacement and urban warfare separately?"
  traversal_tests:
    - "Find a path from transition breakdown to fragmented sovereignty."
    - "Find a path from regional patronage to factional endurance."
    - "Find a path from extraction channel to war-finance persistence."
    - "Find a path from civilian counterweight weakening to collapse risk."
  gnn_tasks:
    - "Predict conflict-intensity score."
    - "Predict fragmentation score."
    - "Predict external-constraint score."
    - "Predict displacement-pressure score."

negative_tests:
  - "Fail if the case is reduced to a two-man rivalry only."
  - "Fail if civilian actors disappear."
  - "Fail if extraction and looting are absent from war persistence."
  - "Fail if regional patrons are background context only."
  - "Fail if humanitarian structure is paragraph text rather than typed nodes and edges."
  - "Fail if the graph assumes a unitary sovereign state throughout."

ablations:
  - name: no_external_power_nodes
    expectation: "Should weaken patronage and mediation paths."
  - name: no_extraction_structure
    expectation: "Should weaken war-finance persistence paths."
  - name: no_counterweight_layer
    expectation: "Should erase civilian transition alternatives."
  - name: no_humanitarian_structure
    expectation: "Should flatten displacement and urban-collapse dynamics."

fixture_hints:
  target_node_count: "30-44"
  expected_highest_centrality:
    - fragmented sovereignty
    - rival armed command structures
    - regional patronage
    - extraction and war finance
    - humanitarian displacement
  expected_high_contention:
    - domestic-vs-external causation
    - transition-design failure thesis
    - extraction-finance causation
    - civilian-counterweight suppression thesis
  parsimony_exception: false

sources_to_consult:
  - ACLED methodology and Sudan coverage
  - ICEWS/GDELT event records
  - scholarship on fragmented sovereignty, militia politics, war finance, and regional patronage
  - major timelines for transition breakdown, mediation, and displacement