id: probe-7a-protestant-reformation-print-publics-confessional-state-formation
title: Protestant Reformation, Print Publics, and Confessional State Formation
status: proposed
family: cultural_movements
tags:
  - cultural_movements
  - ideological_trends
  - western
  - early_modern
  - persistence
  - religion
  - state_formation

summary: >
  Tests whether the graph IR can represent doctrinal rupture, media diffusion,
  institutional fragmentation, confessional discipline, and long-run legacy
  transmission without collapsing them into one timeless "Protestantism" node.

temporal:
  start: "1450-01-01"
  end: "1700-12-31"
  slice_granularity: half-century
  cutoff_rule: "Use only information available within each slice."

scope:
  regions:
    - Holy Roman Empire
    - Swiss Confederation
    - England
    - France
    - Low Countries
    - Scandinavia
  focus: >
    Religious rupture as a driver of political reconfiguration, literacy change,
    media diffusion, and confessional institution-building.

core_question: >
  How did a contest over scriptural authority and church mediation become a
  durable restructuring of governance, discipline, public communication, and
  long-run social inheritance across Europe?

grounding:
  primary_entity_spine:
    - Wikidata / Wikipedia entities for reformers, rulers, churches, cities, wars, diets, edicts, confessions
  structural_backbone:
    - Seshat-style institutional context where available
  event_streams:
    - time-sliced historical event extraction from encyclopedic and archival sources
  note: >
    This is a representation-first historical probe, not a forecast-first case.

probe_type: conjunctural_with_persistence_legs

schema_requirements:
  must_represent_node_types:
    - ReligiousInstitution
    - Institution
    - Narrative
    - Norm
    - Claim
    - Event
    - Policy
    - Office
    - Party
    - Counterweight
    - MediaOutlet
    - TransmissionChannel
    - InstitutionalLineage
    - InheritanceBundle
    - LegacyAggregate
    - LineageClaim
    - Region
    - Actor
    - MassOrganization
    - University
  may_represent_node_types:
    - Province
    - ConstitutionalBody
    - Coalition
    - Resource
    - Shock
    - SocialMovement
  must_represent_edges:
    - contests
    - legitimizes
    - delegitimizes
    - constrains
    - presupposes
    - mobilizes
    - regulates
    - fragments
    - reconfigures
    - inheritsfrom
    - transmitsthrough
    - leaveslegacyvia
    - sacralizes
    - undermines
    - supports
    - alignswith
  required_cross_scale_properties:
    - "At least one origin node, one transmission mechanism, and one later carrier for every claimed legacy."
    - "At least one persistence path that shows transformation rather than simple survival."
    - "At least one rival inheritance path."

expected_graph_axes:
  - doctrinal authority: scripture, clergy, sacrament, mediation
  - media diffusion: printing, vernacular texts, pamphlet circulation
  - political adoption: princely protection, urban reform, crown alignment
  - institutional fragmentation: break with Rome, territorial churches, confessional blocs
  - discipline and social regulation: schooling, catechism, moral order
  - counter-reformation response: Catholic reform, repression, accommodation
  - persistence: literacy, conscience, church governance, civic discipline, secularized legacy

causal_layers:
  structural_drivers:
    - Late medieval church centralization and accumulated clerical grievance
    - Growth of literate urban strata and universities
    - Expanding print infrastructure and vernacular textual circulation
    - Political incentives for rulers to reduce external ecclesiastical authority
  conjunctural_mechanisms:
    - Polemical pamphlet wars and translation into vernacular publics
    - Territorial rulers using reform to consolidate autonomy and property
    - Confessional competition driving bureaucratic and educational buildup
    - Religious violence and settlement forcing institutional boundary-making
  trigger_candidates:
    - "1517 theses controversy as public doctrinal rupture"
    - "1521 Worms-style imperial confrontation as legitimacy test"
    - "1555 settlement moments as institutionalization threshold"

ideological_layer_requirements:
  dominant_episteme_questions:
    - What assumptions made papal mediation and sacramental hierarchy appear natural?
    - What made direct scriptural authority newly plausible?
  legitimating_apparatus_questions:
    - Which churches, universities, princes, printers, and urban councils authorized each settlement?
  suppressed_counterweight_questions:
    - Which conciliar, humanist, peasant, radical, or heterodox alternatives existed but were marginalized?
    - By what mechanism were they excluded rather than merely ignored?
  ideological_rupture_rule:
    - "Choose one datable rupture node for the probe slice being emphasized."
  contested_claims_rule:
    - "Do not settle whether theology, print, princely state-building, class conflict, or media diffusion was primary."

must_include_contested_claims:
  - "Print technology as primary driver vs enabling accelerator"
  - "Princely state-building thesis vs genuine doctrinal causation"
  - "Popular religious radicalism vs elite-led confessionalization"
  - "Economic/property incentives vs conscience/authority rupture"
  - "Reformation legacy as persistent religious inheritance vs secularized institutional afterlife"

probe_tasks:
  retrieval_questions:
    - "Can the graph show which authority claims were naturalized before rupture?"
    - "Can it retrieve a path from print diffusion to confessional state formation?"
    - "Can it distinguish Lutheran, Calvinist, Anglican, Radical, and Catholic reform trajectories?"
    - "Can it trace later legacy without using one immortal ideology node?"
    - "Can it show where a value survives strongly, weakly, or only symbolically?"
  traversal_tests:
    - "Find an origin -> transmission -> carrier chain for a long-run Reformation legacy."
    - "Find a contested path where the same outcome has both doctrinal and political explanations."
    - "Find a suppressed alternative that lost to both Protestant and Catholic consolidation."

negative_tests:
  - "Fail if Protestantism is modeled as one undifferentiated node."
  - "Fail if print is treated as sufficient cause."
  - "Fail if peasants/radicals/anabaptists disappear entirely."
  - "Fail if later legacy is asserted without transmission mechanisms."
  - "Fail if confessional state formation is reduced to theology alone."
  - "Fail if all persistence is direct survival rather than transformation or secularization."

ablations:
  - name: no_persistence_nodes
    expectation: "Should lose ability to model long-run legacy claims."
  - name: no_media_layer
    expectation: "Should weaken print-public diffusion paths."
  - name: no_counterweight_nodes
    expectation: "Should collapse radical and conciliar alternatives."
  - name: no_ideological_layer
    expectation: "Should over-materialize church/state conflict."

fixture_hints:
  target_node_count: "28-42"
  expected_highest_centrality:
    - vernacular scripture authority
    - print diffusion network
    - princely confessional adoption
    - Roman church legitimacy
    - confessional state formation
  expected_high_contention:
    - print-causation thesis
    - secularized legacy thesis
    - radical reformation as suppressed alternative
    - confessionalization thesis
  parsimony_exception: false

sources_to_consult:
  - Brad S. Gregory, The Unintended Reformation
  - Diarmaid MacCulloch, The Reformation
  - Euan Cameron, The European Reformation
  - Elizabeth Eisenstein, The Printing Press as an Agent of Change
  - Heinz Schilling, Religion, Political Culture and the Emergence of Early Modern Society
  - Wolfgang Reinhard, confessionalization literature
  - Quentin Skinner, early modern political thought context