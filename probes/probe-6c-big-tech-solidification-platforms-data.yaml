probetasks:
  retrievaltasks:
    - "Retrieve the firm, platform, infrastructure, and data-asset nodes that explain Google search scaling in 1998-2003."
    - "Retrieve the logistics and supply-chain subgraph that explains why Amazon scale was not only a website effect."
    - "Retrieve the social-graph and user-population pathways that explain Facebook attention capture in 2004-2006."
    - "Retrieve the ad-tech subgraph linking advertisers, tracking, user data, and monetization in 2007-2008."
    - "Retrieve narratives and norms that legitimize openness, convenience, personalization, and frictionless scale."
    - "Retrieve counterweights and regulatory channels that appear before fully developed later antitrust politics."
  structuraltasks:
    - "Construct a cross-slice graph preserving entity identity for firms, platforms, institutions, and recurring data assets."
    - "Infer which edges explain platform lock-in versus ordinary firm growth."
    - "Separate logistics integration edges from ad-market monetization edges even when they support the same firm."
    - "Detect whether user populations are modeled as active data sources rather than passive background context."
    - "Identify which acquisitions or integrations materially change platform dependence or extraction intensity."
  gnntasks:
    - "Predict slice-level concentrationscore from material, platform, and acquisition structure."
    - "Predict platformdependencyscore using user capture, network effects, and intermediation pathways."
    - "Predict dataextractiveintensityscore from tracking, ad-market, and data-asset subgraphs."
    - "Predict regulatoryattentionproxy from the interaction of concentration, privacy controversy, and institutional response signals."

labelsandtargets:
  concentrationscore:
    description: "Degree to which platform power is concentrated in a small set of firms and intermediating platforms within a slice."
    sourcepriority:
      - "SEC filings"
      - "Business histories"
      - "Wikipedia"
      - "Antitrust or regulatory records"
    leakagerule: "Use only concentration evidence visible by the slice cutoff; do not use later monopoly judgments to label earlier slices."
    targetconstructionrule: >-
      Normalize a composite of market-centrality indicators, acquisition concentration,
      platform intermediation breadth, and recurring mention of dominant-firm control
      in contemporaneous primary or near-contemporaneous secondary sources.
  platformdependencyscore:
    description: "Degree to which users, sellers, advertisers, or complementors depend on a small number of platforms for access or visibility."
    sourcepriority:
      - "SEC filings"
      - "Business histories"
      - "Wikipedia"
    leakagerule: "Exclude app-store dependence, smartphone ecosystem dependence, and later creator-platform dependence."
    targetconstructionrule: >-
      Aggregate evidence of lock-in, intermediation, seller or advertiser reliance,
      search visibility dependence, and social-network switching costs into a 0 to 1 score.
  dataextractiveintensityscore:
    description: "Intensity with which a slice links user behavior, tracking, profiling, or query activity to monetization and control."
    sourcepriority:
      - "SEC filings"
      - "Regulatory records"
      - "Business histories"
      - "GDELT"
    leakagerule: "Do not impute post-2010 surveillance-capitalism debates or AI-training data logics backward into this period."
    targetconstructionrule: >-
      Combine counts and strengths of tracks, extractsfrom, captures, and monetizes edges
      with contemporaneous discussion of targeting, behavioral data use, and ad-market integration.
  logisticsintegrationscore:
    description: "Degree to which fulfillment, warehousing, seller integration, and distribution infrastructure are internalized or tightly coordinated by the platform firm."
    sourcepriority:
      - "SEC filings"
      - "Business histories"
      - "Wikipedia"
    leakagerule: "Use only logistics evidence available in or before the relevant slice; do not assume later AWS or post-2008 infrastructure dominance."
    targetconstructionrule: >-
      Score the density and centrality of Infrastructure and SupplyChainNode connections,
      especially where platform scale depends on fulfillment coordination rather than demand alone.
  legitimacyscore:
    description: "Strength of narratives and norms that portray platform expansion as desirable, efficient, open, innovative, or consumer-friendly."
    sourcepriority:
      - "SEC filings"
      - "Wikipedia"
      - "Business histories"
      - "GDELT"
    leakagerule: "Do not use later backlash narratives to lower legitimacy labels in earlier slices unless contemporaneously visible."
    targetconstructionrule: >-
      Estimate from the prevalence and centrality of legitimizing Narrative and Norm nodes,
      weighted by linkage to firms, platforms, institutions, and market expansion events.
  counterweightstrengthscore:
    description: "Strength of privacy, antitrust, labor, interoperability, or technical counterweights that could restrain platform power within the slice."
    sourcepriority:
      - "Regulatory records"
      - "GDELT"
      - "Wikipedia"
      - "Business histories"
    leakagerule: "Do not elevate counterweights using later successful litigation, later policy reforms, or later public opinion shifts."
    targetconstructionrule: >-
      Score the number, diversity, and graph centrality of Counterweight nodes and constrains edges,
      then discount for weak institutional uptake or low connectivity to decision centers.
  regulatoryattentionproxy:
    description: "Proxy for the degree of visible institutional scrutiny directed at platform concentration, privacy issues, or ad-market practices."
    sourcepriority:
      - "Regulatory records"
      - "GDELT"
      - "Wikipedia"
    leakagerule: "Proxy must rely on contemporaneous hearings, investigations, statements, or media-salient scrutiny prior to the cutoff."
    targetconstructionrule: >-
      Construct from counts and strengths of regulates and respondsTo edges involving RegulatoryBody nodes,
      plus event-level evidence of hearings, investigations, or major public scrutiny.

evaluation:
  stage1validity:
    checks:
      - "Graph contains all required nodetypes and edgetypes when the evidence demands them."
      - "All slice graphs are time-valid and use only pre-cutoff evidence."
      - "Cross-slice identity is preserved for persistent firms, platforms, institutions, and major data assets."
      - "Ideology and counterweights appear as typed nodes rather than paragraph text."
      - "User populations, logistics, and ad markets are not dropped from any slice where they are materially relevant."
  stage2grounding:
    metrics:
      - "Stable entity-link rate to Wikidata or explicitly scoped local identifiers."
      - "Source-backed edge justification coverage."
      - "Slice-timestamp consistency."
      - "Primary-source coverage for firm structure and business-model claims."
      - "Secondary-source triangulation for narrative, controversy, and platform-order interpretation."
  stage3retrieval:
    metrics:
      - "Functional retrieval accuracy on retrieval tasks."
      - "Multi-hop path usefulness for explaining platform rise, dependence, and extraction."
      - "Counterweight retrieval completeness."
      - "Low hallucination rate for ideology, regulation, and logistics paths."
      - "Ability to distinguish material, institutional, ideological, and counterweight subgraphs."
  stage4prediction:
    metrics:
      - "Predictive performance on concentrationscore, platformdependencyscore, dataextractiveintensityscore, and regulatoryattentionproxy."
      - "Ablation gain from adding platforms, data extraction, and counterweights beyond material-only baselines."
      - "Cross-slice generalization from early scale-up to ad-tech consolidation."
      - "Robustness under seed-entity masking and partial-source dropout."
  wincondition: >-
    The probe is a win if the same schema remains structurally valid across all three slices,
    retrieves grounded subgraphs for ranking, logistics, ad-tech, ideology, and counterweights,
    and materially improves target prediction when platform and data-extraction structure are added
    beyond material-only or institution-only ablations.

negativetests:
  - "Explain platform rise only as superior product design."
  - "Ignore data extraction and ad-tech."
  - "Treat users only as passive background."
  - "Return ideology as prose only."
  - "Import smartphone or Obama-era state relations into this period."
  - "Model Amazon as e-commerce demand without fulfillment or logistics infrastructure."
  - "Treat search ranking as a black box and omit ranking infrastructure."
  - "Collapse privacy concerns and antitrust precursors into generic public sentiment."

