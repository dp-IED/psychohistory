bridgerole:
  modernbridge: "Bridges early internet commercialization probes to later Big Tech consolidation and backlash probes."
  purpose: >-
    Establish the common ontology for platform intermediation, data extraction,
    weak early counterweights, and infrastructure-backed market power before
    smartphone lock-in and later overt political conflict dominate the story.
  downstreamalignment:
    - "Aligns with 6C-2 by inheriting commercialization, standards, and venture structure."
    - "Aligns with 6C-4 by providing the pre-smartphone platform and ad-tech substrate."
    - "Aligns with broader business probes by preserving ontology for firms, platforms, labor, regulatory channels, and legitimacy."
    - "Supports downstream adaptive GNN tasks on concentration, dependence, extraction, and regulatory attention transitions."
  failuremodestowatch:
    - "Overfitting to Google-only search narratives."
    - "Flattening Amazon logistics into generic e-commerce growth."
    - "Treating Facebook as pure social trend rather than graph-structured network effects."
    - "Conflating data extraction with monetization without explicit user-data pathways."
    - "Reading later political backlash into a period where contestation is weaker and differently structured."
  autoresearchobjectivehint: >-
    Reward schemas that improve prediction and retrieval when platform structure,
    user capture, logistics, and data extraction are explicitly represented, and
    penalize schemas that perform well only by compressing ideology or counterweights
    into untyped text blobs.
  notes:
    - "This probe should remain portable across adjacent Big Tech subprobes."
    - "Entity persistence and anti-leakage rules matter more than exhaustive detail."
    - "The schema should make fixed-dimensional node projections possible while preserving time-scoped causal interpretability."