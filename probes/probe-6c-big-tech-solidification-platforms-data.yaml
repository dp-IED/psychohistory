probeid: "6C-3"
family: "businessfamily6C"
name: "Big Tech Emergence, Platform Consolidation, and Political Reordering — Platform Rise and Data Extraction"
version: "0.1"
status: "candidate"
format: "probespecv2"
benchmark_pack: v0
compatibility_tier: v0-legacy

summary:
  purpose: >-
    Evaluate whether a transferable graph IR can encode the rise of platform firms
    in search, e-commerce, social networking, and advertising between 1998 and 2008
    as a single queryable and GNN-consumable system rather than as separate product stories.
  rationale: >-
    This probe stresses whether the schema can jointly represent ranking systems,
    logistics, user capture, advertising intermediation, data extraction, ideology,
    and weak early counterweights during the formative period in which platform firms
    became materially powerful before full-scale political contestation and before
    smartphone-era lock-in or later AI narratives dominate the frame.

scope:
  region: "Western / U.S. with global platform spillover"
  polity: "Search, e-commerce, social networking, ad-tech, and data extraction during the rise of platform firms"
  temporalwindow: "1998 to 2008"
  startyear: 1998
  endyear: 2008
  label: "Google, Amazon, social networking, ad markets, and surveillance-commercial infrastructure"
  recommendedslices:
    - sliceid: "6c3_search_and_ecommerce_scale"
      startyear: 1998
      endyear: 2003
      label: "Search and e-commerce scale-up"
    - sliceid: "6c3_social_platform_takeoff"
      startyear: 2004
      endyear: 2006
      label: "Social networking takeoff and attention capture"
    - sliceid: "6c3_adtech_and_data_consolidation"
      startyear: 2007
      endyear: 2008
      label: "Advertising infrastructure, tracking expansion, and platform consolidation"
  exclusions:
    - "Do not import smartphone, app-store, or mobile OS lock-in dynamics that become central after 2008."
    - "Do not use Obama-era state-platform alignment or Trump-era backlash as explanatory primitives inside this probe."
    - "Do not backfill cloud hyperscaler dominance, app-distribution choke points, or creator-economy logics from later periods."
    - "Do not import frontier-AI, LLM, recommender-safety, or compute-chokepoint narratives from the 2010s and 2020s."
    - "Do not treat later platform moderation controversies as if they already structured the 1998-2008 period."

artifacts:
  humanauthored:
    - "Canonical probe text, scope boundaries, and slice definitions."
    - "Human-maintained ontology expectations for platforms, data extraction, logistics, ideology, and counterweights."
    - "Human-authored functional queries for retrieval, structural validation, and anti-leakage checks."
    - "Curated seed entity lists and slice-level inclusion or exclusion notes."
  machinegenerated:
    - "Time-scoped graph instantiations from grounded sources."
    - "Entity-linking candidates and cross-slice identity resolution proposals."
    - "Node and edge feature projections for downstream GNN training."
    - "Slice-transition target estimates computed from evidence available at or before each cutoff."
    - "Ablation outputs separating material, institutional, ideological, platform, and counterweight layers."

groundedsources:
  - source: "Wikidata"
    role: "Stable entity identifiers for firms, products, acquisitions, institutions, people, and major events."
    required: true
  - source: "Wikipedia"
    role: "Narrative and event backbone for timeline reconstruction, firm histories, products, controversies, and institutional context."
    required: true
  - source: "SEC filings"
    role: "Primary evidence for business model descriptions, risk factors, revenue structure, logistics investment, acquisitions, and market framing."
    required: true
  - source: "Antitrust or regulatory records"
    role: "Evidence for early scrutiny, privacy concerns, competition attention, and institutional response channels."
    required: false
  - source: "GDELT"
    role: "Time-indexed event and media-salience stream for controversies, expansion, acquisitions, and regulatory attention proxies."
    required: false
  - source: "Business histories"
    role: "Secondary synthesis for platform strategy, logistics build-out, search ranking, ad-market development, and cross-border scaling."
    required: true

corequestion: >-
  Can a single graph schema represent how search, e-commerce, social platforms,
  ad-tech, data extraction, and network effects produced a new platform order that
  was materially powerful before it was fully politically contested?

historicalanalyticalsubquestions:
  - "How should the graph represent search and ranking infrastructure as a causal system connecting query volume, relevance claims, data collection, and advertiser monetization?"
  - "How should the graph encode e-commerce logistics, fulfillment, inventory coordination, seller intermediation, and the material advantages of scale?"
  - "How can ad-tech and user-data extraction be modeled explicitly rather than hidden inside generic growth or engagement metrics?"
  - "How should social graphs, identity networks, and attention capture be represented as mechanisms of lock-in and cross-user network effects?"
  - "Which narratives and norms of openness, convenience, personalization, free services, and frictionless scale legitimized expanding platform power?"
  - "What counterweights existed in the form of privacy concerns, antitrust precursors, interoperability limits, technical dependence, or labor strain, and why were they weak or delayed?"
  - "How did platform firms expand beyond the U.S. through cross-border user growth, market entry, infrastructure extension, and advertiser reach?"
  - "What differs structurally across the three slices, and which node or edge types must remain stable so the same schema works from search scale-up through ad-tech consolidation?"

schemarequirements:
  mustrepresent:
    - "Search ranking as explicit infrastructure rather than as untyped firm capability."
    - "E-commerce logistics and fulfillment as material graph structure, not background operations."
    - "User populations as active sources of data, attention, and network effects."
    - "Advertising markets as intermediating systems linking firms, users, data assets, and revenue extraction."
    - "Ideology, legitimacy, and normative framing as typed nodes connected to firms, platforms, and institutions."
    - "Counterweights as explicit constraints, critiques, dependencies, or weak brakes rather than narrative leftovers."
    - "Cross-slice persistence of firms, platforms, data assets, and institutions with time-scoped state changes."
  nodetypes:
    - "Firm"
    - "Platform"
    - "AdMarket"
    - "DataAsset"
    - "UserPopulation"
    - "Infrastructure"
    - "Investor"
    - "Institution"
    - "RegulatoryBody"
    - "Event"
    - "Policy"
    - "Narrative"
    - "Norm"
    - "Counterweight"
    - "Claim"
    - "LaborPool"
    - "MarketActor"
    - "SupplyChainNode"
  edgetypes:
    - "captures"
    - "monetizes"
    - "ranks"
    - "intermediates"
    - "extractsfrom"
    - "tracks"
    - "scales"
    - "acquires"
    - "locksin"
    - "legitimizes"
    - "constrains"
    - "dependson"
    - "regulates"
    - "respondsTo"
  mustsupport:
    - "Time-scoped nodes and edges with slice-aware persistence."
    - "Fixed-dimensional feature projection for all required nodetypes."
    - "Multi-hop retrieval over material, institutional, ideological, and counterweight paths."
    - "Cross-slice comparison of concentration, dependence, extraction intensity, and regulatory attention."
    - "Typed distinctions between user capture, data extraction, monetization, and legitimacy."
    - "Queryability over acquisitions, expansion pathways, and infrastructure dependencies."
  antirequirements:
    - "Do not reduce the story to product innovation alone."
    - "Do not collapse data extraction into generic growth."
    - "Do not ignore logistics and infrastructure."
    - "Do not return ideology as prose only."
    - "Do not import smartphone-app-store logic into 1998-2008."

