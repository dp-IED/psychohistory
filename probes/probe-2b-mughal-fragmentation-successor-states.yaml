probe_id: south_asia_family_2B
name: Mughal Fragmentation, Successor States, and External Encroachment
version: 0.1
status: candidate
format: probe_spec_v2
benchmark_pack: v0
compatibility_tier: v0-legacy

summary:
  purpose: >-
    Evaluate whether the intermediate graph representation can model imperial
    fragmentation, declining center-periphery coherence, successor-state
    formation, elite realignment, fiscal-military strain, legitimacy erosion,
    and growing external encroachment in eighteenth-century South Asia without
    collapsing the process into a single decline story or retroactively reading
    full colonial rule into earlier phases.
  rationale: >-
    This probe is the direct family counterpart to Mughal Expansion and
    Imperial Integration. It tests whether the same schema that captures
    conquest and consolidation can also represent disaggregation, reassembly,
    bargaining under weak sovereignty, layered authority, and the transition
    from imperial order to competitive successor-state and externally pressured
    systems.

scope:
  region: South Asia
  polity: Mughal Empire, successor states, and encroaching external powers
  temporal_window:
    start_year: 1707
    end_year: 1818
    label: Death of Aurangzeb to defeat of the Marathas and consolidation of Company supremacy in key regions
  recommended_slices:
    - slice_id: post_aurangzeb_fragmentation
      start_year: 1707
      end_year: 1739
      label: Succession conflict, provincial assertion, and weakening imperial integration
    - slice_id: successor_state_competition
      start_year: 1740
      end_year: 1765
      label: Maratha expansion, successor-state consolidation, and fiscal-military competition
    - slice_id: external_encroachment_and_reordering
      start_year: 1765
      end_year: 1818
      label: East India Company ascendancy, treaty networks, and reordered sovereignty
  exclusions:
    - Full mature British Raj except as out-of-sample continuation labels
    - Purely nationalist retrospective narratives unless used only as contrastive annotations
    - Treating eighteenth-century South Asia as simple chaos with no durable institutional adaptation

artifacts:
  human_authored:
    - probe_spec
  frozen_inputs:
    - slice_entity_lists
    - source_snapshots
    - target_tables
  machine_generated:
    - extracted_claims
    - linked_entities
    - instantiated_graphs
    - node_projection_tables

grounded_sources:
  structural_backbone:
    - source: Seshat Global History Databank
      role: >-
        Long-run context for governance, scale, warfare, religion, inequality,
        and state capacity variables across South Asian polities and relevant
        comparison classes.
      required: true
  entity_spine:
    - source: Wikidata
      role: Stable IDs for actors, successor states, institutions, offices, provinces, wars, treaties, and events.
      required: true
    - source: Wikipedia
      role: Narrative grounding, event descriptions, chronology, and source expansion from entity pages.
      required: true
  optional_event_layer:
    - source: DBpedia or derivative historical knowledge graphs
      role: Supplemental linked-entity expansion where available.
      required: false

core_question:
  text: >-
    Can a single graph schema represent how Mughal imperial fragmentation gave
    rise to successor states, negotiated sovereignties, and expanding external
    encroachment by linking material strain, institutions, ideology,
    counterweights, and external actors in a way that is queryable and
    GNN-consumable?

historical_subquestions:
  - What material and organizational breakdowns weakened imperial integration at each slice?
  - Which institutions persisted, adapted, or were repurposed by successor states?
  - Which narratives and norms continued to legitimize sovereignty, and which new legitimacy claims emerged?
  - Which counterweights to fragmentation or external domination existed, and why were they not decisive?
  - Which shocks accelerated fragmentation, external intervention, or regional consolidation, and through what pathways?
  - What differs between post-Aurangzeb fragmentation, successor-state competition, and Company-led reordering?

schema_requirements:
  must_represent:
    node_types:
      - Actor
      - Institution
      - Office
      - Province
      - MilitaryFormation
      - Resource
      - Event
      - Policy
      - Narrative
      - Norm
      - Counterweight
      - Shock
      - Claim
    edge_types:
      - conquers
      - administers
      - taxes
      - recruits
      - allies_with
      - grants_status_to
      - legitimizes
      - constrains
      - undermines
      - presupposes
      - contests
      - benefits
      - depends_on
      - transforms_into
      - responds_to
  must_support:
    - time-scoped edges and nodes
    - uncertain or contested claims
    - many-to-many relations via relation nodes if needed
    - perspective-aware queries (e.g., Mughal court, successor-state elites, zamindars, merchant financiers, Company officials, peasant cultivators, frontier military entrepreneurs)
    - fixed-dimensional node projections for downstream GNN training
    - external actors represented as causal participants, not only contextual notes
  anti_requirements:
    - Do not collapse the eighteenth century into undifferentiated decline or anarchy.
    - Do not hard-code fully developed colonial-state logic into early fragmentation slices.
    - Do not collapse ideology into untyped text blobs.
    - Do not represent provinces or successor states only as geography; they must be administrative, fiscal, and military-political units too.

expected_graph_axes:
  material:
    - agrarian revenue strain
    - jagir assignment instability
    - military financing and cavalry/artillery maintenance
    - merchant credit and revenue farming
    - trade routes, ports, and bullion flows
  institutional:
    - weakened imperial court and emperorship
    - successor-state administrations
    - revenue rights and jagirdari reconfiguration
    - treaty systems and indirect rule arrangements
    - East India Company commercial-military apparatus
  ideological:
    - residual Mughal sovereignty and imperial legitimacy
    - successor-state claims to order and protection
    - courtly prestige and rank norms
    - narratives of restoration, justice, and rightful authority
    - civilizational, dynastic, and religious legitimacy contests
  counterweights:
    - provincial governors and regional elites
    - Maratha confederacy and rival military-fiscal formations
    - zamindars and landed intermediaries
    - merchant-financier constraints and bargaining power
    - local resistance and peasant unrest
    - rival external powers and treaty balancing

seed_entities:
  actors:
    - Bahadur Shah I
    - Mughal Empire
    - Nizam of Hyderabad
    - Nawab of Bengal
    - Nawab of Awadh
    - Maratha Confederacy
    - Mysore
    - Sikh Confederacy
    - East India Company
    - zamindars
    - merchant bankers
  events:
    - death of Aurangzeb
    - invasion of Nader Shah
    - Battle of Plassey
    - Battle of Buxar
    - Treaty of Allahabad
    - Anglo-Mysore Wars
    - Anglo-Maratha Wars
    - decline of Mughal central authority
  institutions:
    - Mughal emperorship
    - imperial court
    - jagirdari system
    - subah administration
    - diwani rights
    - East India Company army
    - treaty system
  places:
    - Delhi
    - Bengal
    - Awadh
    - Hyderabad
    - Mysore
    - Punjab
    - Deccan
    - Calcutta
    - South Asia

generic_target_interface:
  graph_level_targets:
    - capacity_score
    - integration_score
    - legitimacy_score
    - counterweight_strength_score
    - shock_response_score
  slice_transition_targets:
    - fragmentation_delta
    - integration_delta
    - elite_cohesion_delta
    - regional_stability_delta
    - external_encroachment_delta
  rule: All targets must be computable from evidence available at or before the slice cutoff.

probe_tasks:
  retrieval_tasks:
    - id: rt1
      prompt: Which institutions persisted or were repurposed as Mughal authority fragmented into successor-state rule?
      expected_answer_shape:
        - Institution
        - Policy
        - Province
        - Event
    - id: rt2
      prompt: Which norms or narratives sustained sovereignty claims or justified new successor-state authority?
      expected_answer_shape:
        - Narrative
        - Norm
        - Actor
        - Claim
    - id: rt3
      prompt: What plausible counterweights to fragmentation or external encroachment existed, and why were they not decisive?
      expected_answer_shape:
        - Counterweight
        - Actor
        - Institution
        - Edge path with constrains/undermines/bargains_with/coopts semantics
    - id: rt4
      prompt: How did post-Aurangzeb fragmentation differ structurally from later Company-led territorial and treaty reordering?
      expected_answer_shape:
        - time-scoped subgraphs across at least two slices
  structural_tasks:
    - id: st1
      check: Can the IR keep the same entity identity across slices while allowing role changes, succession shifts, and institutional repurposing?
    - id: st2
      check: Can the IR represent both acute shocks and slow sovereignty fragmentation?
    - id: st3
      check: Can the IR encode contested interpretations without deleting minority claims?
    - id: st4
      check: Can the IR represent external encroachment as an interacting causal structure rather than a single terminal event?
  gnn_tasks:
    - id: gt1
      target: Predict next-slice fragmentation category from prior slice graph state.
    - id: gt2
      target: Predict whether a regional power consolidates durable successor-state rule versus temporary military gain.
    - id: gt3
      target: Predict whether external commercial-military actors gain durable administrative leverage in the next slice.

labels_and_targets:
  supervised_targets:
    fragmentation_rate:
      description: Degree of decline in central imperial coherence and increase in autonomous regional authority during the next slice.
      source_priority:
        - Wikidata event chronology
        - Wikipedia chronology extraction
      leakage_rule: No post-slice evidence in feature construction.
    administrative_repurposing_score:
      description: Degree to which prior imperial institutions are reused, transformed, or hollowed out by successor polities.
      source_priority:
        - Seshat governance variables
        - Wikipedia evidence on provincial administration, fiscal control, and office continuity
    elite_realignment_proxy:
      description: Stability or instability of elite cooperation around successor settlements.
      source_priority:
        - article-derived relation counts
        - event chronology on succession conflict, alliance shifts, treaty bargaining, and noble turnover
    regional_stability_proxy:
      description: Whether territories remain governable under successor states without immediate re-fragmentation.
      source_priority:
        - Wikipedia event chronology
        - article-derived unrest, rebellion, and extraction-friction signals
    external_encroachment_score:
      description: Degree to which external actors obtain durable military, fiscal, treaty, or administrative leverage.
      source_priority:
        - treaty chronology
        - battle chronology
        - article-derived relation counts on revenue rights, military alliance, and territorial administration
  weak_labels:
    - Seshat complexity/governance variables
    - Wikidata event chronology
    - article-derived relation counts
  target_construction_rule: Freeze evidence by slice cutoff and emit one deterministic target record per slice.

evaluation:
  stage_1_validity:
    checks:
      - schema instantiates a graph for every slice
      - all required node and edge types are representable
      - all nodes are time-scoped or explicitly persistent
      - entity IDs resolve to stable references where possible
  stage_2_grounding:
    metrics:
      - wikidata_entity_link_rate
      - wikipedia_citation_coverage
      - seshat_variable_attachment_rate
  stage_3_retrieval:
    metrics:
      - answer_path_recall
      - ideological_node_recall
      - counterweight_node_recall
      - external_actor_path_recall
      - temporal_slice_precision
  stage_4_prediction:
    metrics:
      - held-out slice classification accuracy
      - calibration
      - robustness across fragmentation versus external-encroachment subperiods
  win_condition: >-
    A candidate schema wins only if it instantiates valid time-scoped graphs
    for all slices, grounds entities and structural variables to the required
    sources, retrieves material, institutional, ideological, counterweight,
    and external-actor subgraphs, passes negative leakage tests, preserves
    fixed-dimensional projections for downstream GNN use, and shows non-trivial
    improvement from adding ideology, counterweights, and external encroachment
    structure in the ablation suite.

negative_tests:
  - id: nt1
    prompt: Explain fragmentation solely as inevitable Mughal decline with no successor-state adaptation.
    expected_result: fail
    reason: prevents collapse into a one-directional decline story
  - id: nt2
    prompt: Explain external encroachment using fully developed colonial rule from the start of the probe.
    expected_result: fail
    reason: prevents leakage of later colonial-state mechanics into earlier slices
  - id: nt3
    prompt: Return ideology as a summary paragraph without typed nodes.
    expected_result: fail
    reason: ideology must stay queryable
  - id: nt4
    prompt: Treat provinces and successor states only as places, not administrative-fiscal-military units.
    expected_result: fail
    reason: regional units must be political and fiscal objects, not only geography

ablation_suite:
  - material_only
  - material_plus_institutions
  - material_plus_institutions_plus_ideology
  - full_model_with_counterweights
  - full_model_with_external_encroachment
win_expectation:
  ideology_gain_required: true
  counterweight_gain_required: true
  external_encroachment_gain_required: true

splits:
  suggested_train:
    - post_aurangzeb_fragmentation
    - successor_state_competition
  suggested_validation:
    - external_encroachment_and_reordering
  suggested_stress_test:
    - Apply the learned schema, without redesign, to a nineteenth-century anti-colonial restructuring probe as a separate family member.

modern_bridge:
  role: historical schema-shaping probe
  purpose: tests long-run expressivity, temporal coherence, ideology retrieval, counterweight representation, and explicit modeling of external encroachment in a major Global South transition case
  downstream_alignment:
    - share ontology with Mughal 2A, Roman probes, and later modern forecast probes
    - reuse generic_target_interface where possible
    - do not require direct market labels inside this probe

failure_modes_to_watch:
  - Fragmentation explained only by dynastic succession events with no fiscal or institutional layer.
  - Ideology represented as raw text with no queryable nodes.
  - Successor states treated as temporary noise rather than structured polities.
  - External encroachment modeled as an exogenous bolt from the blue rather than a gradually embedded process.
  - Counterweights omitted because they did not ultimately prevent reordering.
  - Role changes over time causing duplicate entities instead of stable identities.
  - Leakage from later consolidated colonial rule into earlier slice graph construction.

autoresearch_objective_hint:
  optimize_for:
    - grounding quality
    - retrieval of ideology, counterweights, and external actors
    - temporal coherence
    - GNN-usable fixed projection
  avoid:
    - overfitting to one eighteenth-century subperiod
    - schemas that only reward terminal winners
    - collapse of contested interpretations into a single consensus story
    - treating external encroachment as background context instead of graph structure

notes:
  - This probe should share ontology with Mughal 2A while being scored independently.
  - Keep the file human-editable; add machine-generated enrichments in separate derived artifacts.
  - A later companion probe can focus on anti-colonial reconstitution and ideological mass politics without contaminating this fragmentation probe.
