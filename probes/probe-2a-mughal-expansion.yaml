probe_id: south_asia_family_2A
name: Mughal Expansion and Imperial Integration
version: 0.1
status: candidate
format: probe_spec_v2
benchmark_pack: v0
compatibility_tier: v0-legacy

summary:
  purpose: >-
    Evaluate whether the intermediate graph representation can model long-run
    imperial expansion, elite integration, administrative consolidation,
    legitimacy under success, religious-political ordering, agrarian revenue
    extraction, and changing frontier dynamics in early modern South Asia
    without leaking in later colonial-era assumptions.
  rationale: >-
    This probe is designed as a Global South analogue to the Roman expansion
    probe: not as a literal historical equivalent, but as a large-scale,
    region-defining imperial formation case that tests whether the schema can
    represent state-building, ideology, plural elite incorporation,
    center-periphery bargaining, and long-horizon integration across a vast and
    heterogeneous civilizational space.

scope:
  region: South Asia
  polity: Mughal Empire and adjacent frontier zones
  temporal_window:
    start_year: 1526
    end_year: 1707
    label: First Battle of Panipat to death of Aurangzeb
  recommended_slices:
    - slice_id: conquest_and_foundation
      start_year: 1526
      end_year: 1556
      label: Babur to early Akbar, conquest and dynastic stabilization
    - slice_id: akbarian_integration
      start_year: 1556
      end_year: 1605
      label: Akbarian consolidation, administrative integration, and imperial legitimacy formation
    - slice_id: mature_imperial_order
      start_year: 1605
      end_year: 1707
      label: Jahangir to Aurangzeb, mature imperial order and frontier overextension pressures
  exclusions:
    - Post-1707 fragmentation except as out-of-sample validation labels
    - British colonial rule and Company-state consolidation inside core graph construction
    - Retrospective nationalist or colonial explanations unless used only as contrastive annotations

artifacts:
  human_authored:
    - probe_spec
  frozen_inputs:
    - slice_entity_lists
    - source_snapshots
    - target_tables
  machine_generated:
    - extracted_claims
    - linked_entities
    - instantiated_graphs
    - node_projection_tables

grounded_sources:
  structural_backbone:
    - source: Seshat Global History Databank
      role: >-
        Long-run context for social complexity, governance, scale, warfare,
        religion, inequality, and state capacity variables across South Asian
        polities and comparison classes.
      required: true
  entity_spine:
    - source: Wikidata
      role: Stable IDs for actors, institutions, offices, provinces, regions, wars, dynasties, and events.
      required: true
    - source: Wikipedia
      role: Narrative grounding, event descriptions, chronology, and source expansion from entity pages.
      required: true
  optional_event_layer:
    - source: DBpedia or derivative historical knowledge graphs
      role: Supplemental linked-entity expansion where available.
      required: false

core_question:
  text: >-
    Can a single graph schema represent how the Mughal Empire expanded,
    integrated, and governed across early modern South Asia by linking material
    capacity, institutions, ideology, plural elite incorporation, and
    counterweights in a way that is queryable and GNN-consumable?

historical_subquestions:
  - What material and organizational capacities enabled Mughal expansion at each slice?
  - Which institutions converted conquest into durable imperial governance?
  - Which narratives and norms legitimized imperial rule, elite cooperation, and plural incorporation?
  - Which counterweights or constraints existed, and how were they absorbed, bypassed, bargained with, or only partially neutralized?
  - Which shocks changed the expansion trajectory, and through what pathways?
  - What differs between conquest-and-foundation, Akbarian integration, and the mature imperial order?

schema_requirements:
  must_represent:
    node_types:
      - Actor
      - Institution
      - Office
      - Province
      - MilitaryFormation
      - Resource
      - Event
      - Policy
      - Narrative
      - Norm
      - Counterweight
      - Shock
      - Claim
    edge_types:
      - conquers
      - administers
      - taxes
      - recruits
      - allies_with
      - grants_status_to
      - legitimizes
      - constrains
      - undermines
      - presupposes
      - contests
      - benefits
      - depends_on
      - transforms_into
      - responds_to
  must_support:
    - time-scoped edges and nodes
    - uncertain or contested claims
    - many-to-many relations via relation nodes if needed
    - perspective-aware queries (e.g., imperial court, Rajput elites, zamindars, frontier polities, peasant cultivators, Deccan powers)
    - fixed-dimensional node projections for downstream GNN training
  anti_requirements:
    - Do not hard-code later British colonial logic into the Mughal expansion probe.
    - Do not collapse ideology into untyped text blobs.
    - Do not represent provinces or subahs only as geography; they must be administrative and fiscal units too.

expected_graph_axes:
  material:
    - cavalry, artillery, and military organization
    - agrarian revenue extraction
    - land assessment and fiscal administration
    - roads, riverine movement, and logistics
    - trade routes, ports, and circulation of bullion
  institutional:
    - emperorship and imperial household
    - mansabdari system
    - jagirdari assignment and revenue rights
    - subahs and provincial administration
    - court patronage and imperial bureaucracy
  ideological:
    - dynastic legitimacy and sovereignty
    - imperial universalism and order
    - sulh-i kul and plural incorporation
    - courtly prestige, rank, and honor norms
    - narratives of justice, restoration, and frontier pacification
  counterweights:
    - Rajput bargaining power
    - zamindari and local landed resistance
    - regional sultanates and successor polities
    - Deccan military-fiscal rivals
    - fiscal strain and overextension pressures
    - sectarian conflict and legitimacy contestation

seed_entities:
  actors:
    - Babur
    - Humayun
    - Akbar
    - Jahangir
    - Shah Jahan
    - Aurangzeb
    - Mughal Empire
    - Rajputs
    - Marathas
    - zamindars
    - Mughal nobility
  events:
    - First Battle of Panipat
    - Second Battle of Panipat
    - Mughal conquest of Gujarat
    - Mughal conquest of Bengal
    - Akbar's administrative reforms
    - Mughal-Rajput alliances
    - Mughal campaigns in the Deccan
    - annexation of the Deccan sultanates
  institutions:
    - mansabdari system
    - jagirdari system
    - subah
    - imperial court
    - revenue administration
    - imperial army
  places:
    - Delhi
    - Agra
    - Lahore
    - Bengal
    - Gujarat
    - Punjab
    - Rajputana
    - Deccan
    - Kabul
    - South Asia

generic_target_interface:
  graph_level_targets:
    - capacity_score
    - integration_score
    - legitimacy_score
    - counterweight_strength_score
    - shock_response_score
  slice_transition_targets:
    - expansion_delta
    - integration_delta
    - elite_cohesion_delta
    - provincial_stability_delta
  rule: All targets must be computable from evidence available at or before the slice cutoff.

probe_tasks:
  retrieval_tasks:
    - id: rt1
      prompt: What institutions turned military conquest into durable provincial and fiscal control?
      expected_answer_shape:
        - Institution
        - Policy
        - Province
        - Event
    - id: rt2
      prompt: Which norms or narratives made Mughal expansion and elite cooperation politically desirable or legitimate?
      expected_answer_shape:
        - Narrative
        - Norm
        - Actor
        - Claim
    - id: rt3
      prompt: What plausible counterweights to Mughal expansion existed, and why were they not decisive?
      expected_answer_shape:
        - Counterweight
        - Actor
        - Institution
        - Edge path with constrains/undermines/absorbs/bargains_with semantics
    - id: rt4
      prompt: How did conquest-and-foundation mechanisms differ from Akbarian integration and the mature imperial order?
      expected_answer_shape:
        - time-scoped subgraphs across at least two slices
  structural_tasks:
    - id: st1
      check: Can the IR keep the same entity identity across slices while allowing role changes?
    - id: st2
      check: Can the IR represent both conquest events and slow institutional consolidation?
    - id: st3
      check: Can the IR encode contested interpretations without deleting minority claims?
  gnn_tasks:
    - id: gt1
      target: Predict next-slice territorial or administrative expansion category from prior slice graph state.
    - id: gt2
      target: Predict whether a frontier campaign produces durable integration versus temporary gain.

labels_and_targets:
  supervised_targets:
    territorial_expansion_rate:
      description: Net change in controlled territory or formally administered frontier zone during next slice.
      source_priority:
        - Wikidata event chronology
        - Wikipedia chronology extraction
      leakage_rule: No post-slice evidence in feature construction.
    administrative_integration_score:
      description: Degree to which conquest is converted into durable governance.
      source_priority:
        - Seshat governance variables
        - Wikipedia evidence on provincial administration, taxation, legal incorporation, and rank assignment
    elite_cohesion_proxy:
      description: Stability of elite cooperation around the imperial settlement.
      source_priority:
        - article-derived relation counts
        - event chronology on succession conflict, noble revolt, factional rupture, and bargaining outcomes
    provincial_stability_proxy:
      description: Whether incorporated territories remain governable without immediate re-fragmentation.
      source_priority:
        - Wikipedia event chronology
        - article-derived unrest, rebellion, and extraction-friction signals
  weak_labels:
    - Seshat complexity/governance variables
    - Wikidata event chronology
    - article-derived relation counts
  target_construction_rule: Freeze evidence by slice cutoff and emit one deterministic target record per slice.

evaluation:
  stage_1_validity:
    checks:
      - schema instantiates a graph for every slice
      - all required node and edge types are representable
      - all nodes are time-scoped or explicitly persistent
      - entity IDs resolve to stable references where possible
  stage_2_grounding:
    metrics:
      - wikidata_entity_link_rate
      - wikipedia_citation_coverage
      - seshat_variable_attachment_rate
  stage_3_retrieval:
    metrics:
      - answer_path_recall
      - ideological_node_recall
      - counterweight_node_recall
      - temporal_slice_precision
  stage_4_prediction:
    metrics:
      - held-out slice classification accuracy
      - calibration
      - robustness across conquest versus mature imperial subperiods
  win_condition: >-
    A candidate schema wins only if it instantiates valid time-scoped graphs
    for all slices, grounds entities and structural variables to the required
    sources, retrieves material, institutional, ideological, and counterweight
    subgraphs, passes negative leakage tests, preserves fixed-dimensional
    projections for downstream GNN use, and shows non-trivial improvement from
    adding ideology and counterweights in the ablation suite.

negative_tests:
  - id: nt1
    prompt: Explain Mughal expansion using only post-1707 decline or colonial logic.
    expected_result: fail
    reason: prevents leakage from later fragmentation and colonial-era mechanics
  - id: nt2
    prompt: Return ideology as a summary paragraph without typed nodes.
    expected_result: fail
    reason: ideology must stay queryable
  - id: nt3
    prompt: Treat provinces or subahs only as places, not administrative-fiscal units.
    expected_result: fail
    reason: province representation must be administrative as well as geographic

ablation_suite:
  - material_only
  - material_plus_institutions
  - material_plus_institutions_plus_ideology
  - full_model_with_counterweights
win_expectation:
  ideology_gain_required: true
  counterweight_gain_required: true

splits:
  suggested_train:
    - conquest_and_foundation
    - akbarian_integration
  suggested_validation:
    - mature_imperial_order
  suggested_stress_test:
    - Apply the learned schema, without redesign, to a later Mughal crisis/fragmentation probe as a separate family member.

modern_bridge:
  role: historical schema-shaping probe
  purpose: tests long-run expressivity, temporal coherence, ideology retrieval, and counterweight representation in a major Global South imperial formation case
  downstream_alignment:
    - share ontology with Roman probes and later modern forecast probes
    - reuse generic_target_interface where possible
    - do not require direct market labels inside this probe

failure_modes_to_watch:
  - Expansion explained only by military events with no institutional layer.
  - Ideology represented as raw text with no queryable nodes.
  - Provinces treated as passive territories rather than active administrative units.
  - Counterweights omitted because they did not ultimately stop expansion.
  - Role changes over time causing duplicate entities instead of stable identities.
  - Leakage from later decline or colonial rule into expansion-era graph construction.
  - Plural incorporation flattened into a single civilizational story with no elite bargaining.

autoresearch_objective_hint:
  optimize_for:
    - grounding quality
    - retrieval of ideology and counterweights
    - temporal coherence
    - GNN-usable fixed projection
  avoid:
    - overfitting to one Mughal subperiod
    - schemas that only reward dominant successful actors
    - collapse of contested interpretations into a single consensus story
    - retrofitting colonial explanations into precolonial imperial dynamics

notes:
  - This probe should share ontology with the Roman family where possible while adding South Asian institutional and ideological specificity.
  - Keep the file human-editable; add machine-generated enrichments in separate derived artifacts.
  - A later companion probe can cover Mughal fragmentation, successor states, and colonial encroachment without contaminating this expansion probe.
