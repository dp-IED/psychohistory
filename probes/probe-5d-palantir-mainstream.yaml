probeid: "6B-4"
parentprobe: "6B"
name: "Palantir AI-War-Tech Mainstreaming and Public-Market Defense Identity"
version: "0.1"
status: candidate
format: probespecv2
benchmark_pack: v0
compatibility_tier: v1-patched
ontology_delta_ref: ontology/ontology-delta-v1-persistence.yaml

summary:
  purpose: "Evaluate whether a transferable graph schema can represent Palantir's 2022 to 2026 transition into AI-war-tech mainstreaming through Ukraine-linked legitimacy, AIP repositioning, allied-security extension, product-stack reframing, and public-market defense-tech identity."
  rationale: "This subprobe isolates the shock-to-legitimacy grammar of the parent 6B case so the IR can be tested on war-tech branding, AI repositioning, geopolitical demand multipliers, and the distinction between institutional embedding and public narrative amplification."

scope:
  region: "Western / U.S. with allied-state and war-tech extensions"
  polity: "Palantir as a public-market defense-tech and AI-war-tech platform"
  temporalwindow:
    startyear: 2022
    endyear: 2026
    label: "Ukraine branding, AI-war-tech legitimacy, public-market identity, and defense-tech mainstreaming"
  recommendedslices:
    - sliceid: "6b4_ai_wartech_mainstreaming"
      startyear: 2022
      endyear: 2026
      label: "Conflict-linked legitimacy, AI repositioning, and public-market defense identity"
  exclusions:
    - "Do not read Ukraine-era legitimacy backward into earlier Palantir slices."
    - "Do not confuse media branding with actual institutional embedding."
    - "Do not collapse AIP, Gotham, Foundry, and Apollo into one product node."
    - "Do not substitute broad geopolitical commentary for explicit product, contract, and institution structure."
    - "Do not omit allied-state extension or public-market identity."

artifacts:
  humanauthored:
    - "Canonical subprobe boundary for 2022 to 2026"
    - "Ontology commitments for shock-to-legitimacy structure, AI repositioning, and allied-state extension"
    - "Target definitions for war-tech legitimacy and market-position deltas"
    - "Negative tests and ablations"
  machinegenerated:
    - "Entity linking for institutions, products, markets, and allied actors"
    - "Narrative extraction for war-tech, AI, sovereignty, and defense framing"
    - "Contract and institutional-path enrichment from public procurement evidence"
    - "Fixed-dimensional node projections for downstream GNN use"

groundedsources:
  - source: "Wikidata"
    role: "Canonical IDs for products, firms, actors, and institutions"
    required: true
  - source: "Wikipedia"
    role: "Chronology, product launches, public milestones, and institutional relationships"
    required: true
  - source: "GDELT"
    role: "Conflict-linked narrative dynamics, war-tech branding, and legitimacy amplification"
    required: true
  - source: "ICEWS"
    role: "Optional structured interaction signals around conflict, alliances, and state-facing activity"
    required: false
  - source: "SEC filings / annual reports / investor letters"
    role: "Public-market identity, customer concentration, AI repositioning, and management claims"
    required: true
  - source: "U.S. federal procurement or contract databases"
    role: "Contract pathways and customer structure where public evidence exists"
    required: true
  - source: "Polymarket or similar forecast market"
    role: "Optional downstream benchmarking alignment for war-tech or defense-related expectation questions"
    required: false

corequestion: "Can a single graph schema represent how external conflict, AI repositioning, allied-security demand, public-market identity, and product-stack differentiation together legitimated Palantir as defense or AI-war-tech infrastructure in a way that is queryable, temporally disciplined, and GNN-consumable?"

subquestions:
  - "Which conflict-linked events and narratives most strongly increased Palantir's war-tech legitimacy?"
  - "How should Ukraine-linked branding be represented distinctly from actual institutional embedding and contracts?"
  - "Which products, including AIP and legacy platforms, changed Palantir's market-facing identity in this slice?"
  - "Which agencies or allied public-sector institutions deepened the firm's defense-tech positioning?"
  - "What narratives around sovereignty, defense, AI, and strategic necessity legitimized the firm?"
  - "Which counterweights, including skepticism, scrutiny, concentration risk, or branding-embedding mismatch, remained active?"
  - "How can the graph distinguish geopolitical demand amplification from simple media attention?"
  - "What within-slice changes show transition from defense contractor image to broader AI-war-tech platform identity?"

schemarequirements:
  mustrepresent:
    nodetypes:
      - "Actor"
      - "Firm"
      - "Institution"
      - "Office"
      - "ProcurementChannel"
      - "Contract"
      - "PlatformProduct"
      - "Event"
      - "Policy"
      - "Narrative"
      - "Norm"
      - "Counterweight"
      - "Shock"
      - "Claim"
      - "ExternalPower"
      - "SecurityApparatus"
      - "MilitaryFormation"
      - "MarketActor"
      - "MediaNarrative"
    edgetypes:
      - "contractswith"
      - "procuresfrom"
      - "embedsin"
      - "brandsthrough"
      - "marketsas"
      - "legitimizes"
      - "delegitimizes"
      - "respondsTo"
      - "alignswith"
      - "dependson"
      - "integrateswith"
      - "constrains"
      - "contests"
      - "scrutinizes"
      - "scales"
  mustsupport:
    - "Explicit distinction between institutional embedding and public war-tech branding."
    - "Separate product nodes for Gotham, Foundry, Apollo, and AIP."
    - "Typed shock nodes for conflict and geopolitical events."
    - "Graphable allied-state extension and public-market identity relations."
    - "Time-scoped representation of AI repositioning and defense-tech mainstreaming."
    - "Fixed-dimensional node projections and evidence provenance for downstream GNN use."
  antirequirements:
    - "Do not read later legitimacy backward."
    - "Do not collapse products into one blob."
    - "Do not confuse branding with actual adoption."
    - "Do not flatten conflict-linked legitimacy into generic media salience."
    - "Do not omit counterweights."
  mayrepresent:
    nodetypes:
      - "LineageClaim"
      - "InstitutionalLineage"
      - "InheritanceBundle"
      - "TransmissionChannel"
      - "LegacyAggregate"
    edgetypes:
      - "inherits_from"
      - "transmits_through"
      - "supersedes_while_claiming_continuity"
      - "leaves_legacy_via"

