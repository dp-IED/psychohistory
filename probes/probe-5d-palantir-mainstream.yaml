generictargetinterface:
  graphleveltargets:
    - target: "wartechlegitimacyscore"
      description: "Extent to which conflict-linked use, branding, and institutional relations legitimate the firm as war-tech infrastructure."
      computableat: "slice cutoff only"
    - target: "marketpositioningscore"
      description: "Degree to which the firm is positioned as a defense-tech or AI platform actor."
      computableat: "slice cutoff only"
    - target: "stateembeddingscore"
      description: "Depth of embedding across defense and allied public-sector institutions."
      computableat: "slice cutoff only"
    - target: "productstackcoherencescore"
      description: "Degree of visible coherence and differentiation across Palantir's product stack."
      computableat: "slice cutoff only"
    - target: "counterweightstrengthscore"
      description: "Strength of active constraints, skepticism, and scrutiny."
      computableat: "slice cutoff only"
  slicetransitiontargets:
    - target: "wartechdelta"
      description: "Within-slice increase in conflict-linked legitimacy."
    - target: "marketpositiondelta"
      description: "Within-slice shift toward AI-war-tech and defense-platform identity."
    - target: "productstackdelta"
      description: "Within-slice change in visible product-stack framing and integration."

probetasks:
  retrievaltasks:
    - "Through which products, contracts, institutions, and events did Palantir acquire war-tech legitimacy in this slice?"
    - "Which narratives linked Ukraine and AI to Palantir's defense-tech positioning?"
    - "What counterweights constrained or contested war-tech mainstreaming?"
    - "Which institutional relations reflect actual embedding rather than brand amplification?"
  structuraltasks:
    - "Separate conflict-linked shock nodes from contracts and narrative effects."
    - "Keep AIP, Gotham, Foundry, and Apollo as distinct products with separate relations."
    - "Represent allied-state extension as distinct from domestic U.S. embedding."
    - "Retrieve paths that connect shocks to products to institutions to legitimacy outcomes."
  gnntasks:
    - "Predict wartechlegitimacyscore from shock, product, institution, and narrative features."
    - "Predict whether marketpositiondelta exceeds productstackdelta within the slice."
    - "Classify whether graph change is driven more by actual embedding or by branded legitimacy amplification."

labelsandtargets:
  wartechlegitimacyscore:
    description: "Degree to which Palantir is legitimated as war-tech or defense infrastructure."
    sourcepriority:
      - "GDELT"
      - "SEC filings / annual reports / investor letters"
      - "Wikipedia"
      - "ICEWS"
    leakagerule: "Use only evidence documented between 2022 and the evaluation cutoff."
    targetconstructionrule: "Score conflict-linked product visibility, defense framing, institutional ties, and legitimizing narratives up to the cutoff."
  marketpositioningscore:
    description: "Strength of defense-tech and AI-platform public-market positioning."
    sourcepriority:
      - "SEC filings / annual reports / investor letters"
      - "GDELT"
      - "Wikipedia"
    leakagerule: "Use only contemporaneous market-facing claims and public narrative."
    targetconstructionrule: "Combine product, market-actor, and narrative relations into a bounded score."
  stateembeddingscore:
    description: "Depth of embeddedness across defense and allied public-sector institutions."
    sourcepriority:
      - "U.S. federal procurement or contract databases"
      - "Wikipedia"
      - "ICEWS"
    leakagerule: "Require explicit institutional ties; do not infer from branding alone."
    targetconstructionrule: "Aggregate agency diversity, continuity, and integration evidence."
  productstackcoherencescore:
    description: "Degree of differentiated but connected product-stack structure."
    sourcepriority:
      - "SEC filings / annual reports / investor letters"
      - "Wikipedia"
      - "Wikidata"
    leakagerule: "Do not retroactively assign later significance to products absent in the cutoff state."
    targetconstructionrule: "Score distinct product nodes, integration edges, and coherent platform framing."
  counterweightstrengthscore:
    description: "Strength of skepticism, scrutiny, and structural constraints active in the slice."
    sourcepriority:
      - "GDELT"
      - "Wikipedia"
      - "SEC filings / annual reports / investor letters"
    leakagerule: "Count only active pre-cutoff counterweights."
    targetconstructionrule: "Score the number, diversity, and centrality of constraining actors, claims, and narratives."

evaluation:
  stage1validitychecks:
    - "Verify one slice covering 2022 through 2026."
    - "Verify products remain distinct typed objects."
    - "Verify branding and embedding are not collapsed."
    - "Verify conflict-linked shocks are represented as typed nodes."
  stage2groundingmetrics:
    - "Entity-link precision for products, institutions, and market actors"
    - "Grounding coverage for product and institutional claims"
    - "Temporal grounding compliance for conflict-linked events and narratives"
  stage3retrievalmetrics:
    - "Shock-to-legitimacy path retrieval accuracy"
    - "Product differentiation fidelity"
    - "Branding-versus-embedding separation accuracy"
    - "Counterweight retrieval recall"
    - "Optional v1: origin_to_afterlife_path_recall from founding-era commitments to current defense-tech identity."
    - "Optional v1: survival_through_transformation_recall for product and market-facing identity shifts."
    - "Optional v1: transmission_channel_recall for procurement, media, and allied-state pathways."
  stage4predictionmetrics:
    - "Graph-level target accuracy for wartechlegitimacyscore and marketpositioningscore"
    - "Within-slice delta accuracy for wartechdelta and marketpositiondelta"
    - "Ablation gain from adding shock and ideology structure over procurement-only baseline"
  wincondition: "The schema wins if it distinguishes conflict-linked legitimacy, product differentiation, institutional embedding, and public-market defense identity while avoiding backward leakage and branding-only shortcuts."
  persistence_delta_v1:
    doc_ref: "ontology/ontology-delta-v1-persistence.yaml"
    ablation_addition: "persistence_layer_ablation"
    optional_win_evidence: "Report whether stripping optional persistence types loses measurable retrieval or prediction on shock-to-legacy or market-identity pathway tasks versus full v1-patched graph."

negativetests:
  - "Read Ukraine-era legitimacy backward into the founding period."
  - "Collapse AIP, Gotham, Foundry, and Apollo into one product."
  - "Treat branding as equivalent to institutional adoption."
  - "Return AI-war-tech legitimacy as a paragraph without typed nodes."
  - "Ignore active skepticism and scrutiny."

ablationsuite:
  - "materialonly"
  - "materialplusinstitutions"
  - "materialplusinstitutionsplusprocurement"
  - "materialplusinstitutionsplusideology"
  - "materialplusinstitutionsplusideologyplusshockstructure"
  - "fullmodelwithcounterweights"

splits:
  suggestedtrain:
    - "6b4_ai_wartech_mainstreaming"
  suggestedvalidation:
    - "heldout_shock_and_product_subset"
  suggestedstresstest:
    - "transfer_to_semiconductor_or_other_wartech_probe"

bridgerole:
  modernbridge: "AI-war-tech business-state fusion probe"
  purpose: "Bridge Palantir's parent case to broader defense-tech, AI-platform, and war-linked legitimacy probes through shared shock, product, and institutional ontology."
  downstreamalignment:
    - "Aligns with 6B-3 on public-market identity and controversy structure"
    - "Aligns with semiconductor and defense-tech probes through strategic dependency and state demand"
    - "Aligns with war probes through typed shocks and external-legitimacy pathways"
  failuremodestowatch:
    - "Branding-embedding collapse"
    - "Product blobification"
    - "Backward leakage"
    - "Conflict salience substituted for institutional structure"
  autoresearchobjectivehint: "Prefer schemas that improve retrieval and prediction when shocks, products, legitimacy, and institutional embedding are all modeled as first-class graph structure."
  notes:
    - "This child probe is especially useful as a stress test for shock-to-legitimacy modeling."