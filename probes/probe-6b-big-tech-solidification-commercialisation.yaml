  constraints:
    - "All targets must be computable from evidence available at or before the slice cutoff."
    - "No target may encode post-1998 outcomes as labels for earlier slices."
    - "Targets should be recoverable from graph structure plus grounded evidence, not free-text intuition."

probetasks:
  retrievaltasks:
    - "Identify which investors, syndicates, and financing channels most strongly supported firm formation and scaling in each slice."
    - "Retrieve the standards, interfaces, and compatibility struggles that structured competition within PC and software markets."
    - "Map the distribution channels through which hardware, operating systems, and software products reached consumers and enterprise buyers."
    - "Retrieve policies, deregulation moves, or antitrust-relevant institutional decisions that altered commercialization conditions."
    - "Identify the narratives and norms that legitimized startup culture, deregulation, and market openness."
    - "Retrieve early signs of concentration, dependency, or lock-in visible before the mature platform era."
  structuraltasks:
    - "Construct a typed subgraph linking firms, investors, standards, and distribution channels for each slice."
    - "Detect whether a firm's scaling path depends more on investor structure, distribution control, or standard adoption."
    - "Infer which nodes function as lock-in hubs versus diffuse complements."
    - "Differentiate ecosystem competition from direct firm-versus-firm competition."
    - "Link labor-pool circulation to firm founding, scaling, and investor access."
  gnntasks:
    - "Predict slice-level concentrationscore from graph structure and grounded claims."
    - "Predict which firms or standards become central lock-in points in the next slice without using future-only evidence."
    - "Classify whether a slice is primarily hobbyist-commercial, scale-commercial, or early-internet-commercial based on graph topology."
    - "Estimate transition deltas in venture dependence and legitimacy when standards, investors, or ideology layers are ablated."

labelsandtargets:
  concentrationscore:
    description: "Degree to which market power and ecosystem control are concentrated in a limited set of firms, standards, or channels within a slice."
    sourcepriority:
      - "SEC filings"
      - "business histories"
      - "Wikipedia"
      - "Wikidata"
      - "U.S. policy or antitrust sources"
    leakagerule: "Use only contemporaneous market-structure evidence from the slice; do not infer concentration from later dominance outcomes."
    targetconstructionrule: "Aggregate normalized indicators of market share centrality, acquisition-linked centralization, distribution gatekeeping, and dependency hub score."
  standardslockinscore:
    description: "Strength of dependency on standards, interfaces, or compatibility layers that increase switching costs and ecosystem inertia."
    sourcepriority:
      - "business histories"
      - "Wikipedia"
      - "SEC filings"
      - "Wikidata"
      - "U.S. policy or antitrust sources"
    leakagerule: "Only standards known, adopted, or contested by the slice cutoff may contribute."
    targetconstructionrule: "Combine counts and weights for standard adoption edges, locksin edges, complement dependency, and interoperability asymmetry."
  venturedependencyscore:
    description: "Extent to which commercialization and firm scaling depend on venture-capital financing, investor reputation, and financing networks."
    sourcepriority:
      - "business histories"
      - "SEC filings"
      - "Wikipedia"
      - "Wikidata"
    leakagerule: "Do not use later financing rounds, exits, or retrospective prestige to score earlier slices."
    targetconstructionrule: "Measure ratio and centrality of investsin edges, investor syndication density, financing-event importance, and investor-linked scaling pathways."
  commercializationintensityscore:
    description: "Overall intensity of conversion from technical capability into marketable products, revenue channels, and scaled distribution."
    sourcepriority:
      - "business histories"
      - "SEC filings"
      - "Wikipedia"
      - "Wikidata"
    leakagerule: "Use only evidence of products, channels, adoption, and scaling available inside the slice."
    targetconstructionrule: "Blend counts of launch and scaling events, distribution breadth, product diffusion, revenue-oriented narratives, and market-actor uptake."
  legitimacyscore:
    description: "Strength of narratives and norms that make commercialization appear desirable, modern, efficient, or socially beneficial."
    sourcepriority:
      - "business histories"
      - "Wikipedia"
      - "U.S. policy or antitrust sources"
      - "GDELT"
    leakagerule: "Exclude later retrospective mythmaking when it cannot be grounded in slice-contemporaneous discourse."
    targetconstructionrule: "Combine legitimizing narrative density, positive claim support, institutional endorsement, and low effective counterweight centrality."
  laborelitecirculationscore:
    description: "Intensity of labor and elite-network circulation linking universities, firms, founders, executives, and investors."
    sourcepriority:
      - "Wikidata"
      - "business histories"
      - "Wikipedia"
      - "SEC filings"
    leakagerule: "Only personnel links evidenced within or prior to the slice may be used."
    targetconstructionrule: "Measure recruitsfrom edge density, shared-elite path centrality, repeat-founder/investor overlap, and university-to-firm spillover connectivity."

evaluation:
  stage1validity:
    - "Check that all required node and edge types appear when the source evidence supports them."
    - "Check that each slice preserves temporal coherence and excludes post-cutoff entities or relations."
    - "Check that ideology, standards, investors, and distribution channels are represented as typed structure rather than prose-only residue."
    - "Check entity persistence and alias resolution across slices."
  stage2grounding:
    - "Assess source coverage across firms, investors, standards, policies, and narratives."
    - "Measure citation-level support density for graph edges and claims in the construction pipeline."
    - "Score agreement between independently grounded sources for major entities and events."
    - "Penalize unsupported lock-in or concentration claims."
  stage3retrieval:
    - "Evaluate precision and recall for investor-firm, firm-standard, and firm-distribution retrieval."
    - "Evaluate retrieval of ideology and counterweight structure, not only material business facts."
    - "Test slice-specific retrieval under ambiguity, especially for standards battles and early internet business formation."
    - "Measure cross-slice retrieval consistency for persistent entities."
  stage4prediction:
    - "Compare GNN performance on graph-level and slice-transition targets against text-only and material-only baselines."
    - "Run ablation tests for investors, standards, and ideology layers to verify causal contribution."
    - "Measure robustness under held-out seed entities and partial-source regimes."
    - "Inspect calibration and error concentration around commercialization-to-internet transition years."
  wincondition: >
    The probe is successful if the full typed graph materially outperforms weaker baselines on retrieval and
    prediction, especially when explaining commercialization intensity, standards lock-in, and venture
    dependence without temporal leakage.

negativetests:
  - "Explain Silicon Valley commercialization only as founder brilliance."
  - "Treat VC as background finance rather than causal structure."
  - "Ignore standards and interface control."
  - "Return ideology only as prose."
  - "Import smartphone-era platform rules into 1980-1998."
  - "Collapse distribution channels into generic market growth."
  - "Treat Microsoft, Apple, and IBM as isolated biographies rather than ecosystem participants."

ablationsuite:
  materialonly:
    description: "Use firms, products, events, and markets only; omit institutions, ideology, investors, and counterweights."
  materialplusinstitutions:
    description: "Add institutions, offices, and policies, but omit ideology, standards-specific lock-in modeling, and investor structure."
  materialplusinstitutionsplusideology:
    description: "Add narratives, norms, claims, and legitimacy relations to test value of ideological structure."
  materialplusinstitutionsplusstandards:
    description: "Add standards, compatibility, and lock-in relations while withholding investor structure."
  materialplusinstitutionsplusinvestors:
    description: "Add investor structure and financing pathways while withholding standards-specific lock-in modeling."
  fullmodelwithcounterweights:
    description: "Use the complete schema including standards, investors, ideology, labor circulation, and counterweights."

splits:
  suggestedtrain:
    - "Primary training on 6c2_pc_and_hobbyist_transition and early portions of 6c2_venture_software_scaling"
    - "Allow cross-validation on subgraphs centered on PCs, operating systems, and VC-firm formation"
  suggestedvalidation:
    - "Late 6c2_venture_software_scaling holdout focused on software scaling, distribution expansion, and standards contests"
    - "Evaluate transition prediction into early internet business without using 1994+ evidence during training"
  suggestedstresstest:
    - "6c2_early_internet_business as out-of-phase commercialization stress test"
    - "Held-out entities such as Netscape or browser-war subgraphs"
    - "Anti-leakage stress test with explicit removal of post-1998 references and mature-platform terminology"

bridgerole:
  historicalbridge: >
    Connects the Cold War and semiconductor substrate of 6C-1 to the later platform and data-extractive probes
    by modeling how commercialization architecture emerged before mature platform dominance.
  purpose: >
    Serve as the key transition probe for testing whether the IR can move from research-state origins to
    investor-driven software and internet markets without losing typed causal structure.
  downstreamalignment:
    - "Aligns directly with 6C-1 as antecedent substrate and 6C-3 as successor platform-rise probe"
    - "Provides transferable ontology for semiconductors, software ecosystems, venture networks, and standards lock-in"
    - "Supports downstream adaptive GNN tasks around concentration, dependency, and legitimacy formation"
  failuremodestowatch:
    - "Founder-centric oversimplification"
    - "Missing investor-network causality"
    - "Underspecified standards and interface battles"
    - "Conflation of ideology with summary text"
    - "Backward leakage from post-2000 platform dominance"
    - "Loss of distribution-channel structure"
  autoresearchobjectivehint: >
    Search for schema variants that maximize performance gains from explicitly typed investors, standards, and
    ideological legitimacy layers relative to material-only graphs.
  notes:
    - "Keep commercialization distinct from prehistory and from later platform consolidation."
    - "Treat technical breakthroughs, financing structure, and distribution power as separate but connected mechanisms."
    - "Represent all entities as time-scoped or explicitly persistent to support leakage-resistant graph learning."