probeid: "6C-2"
family: "businessfamily6C"
name: "Big Tech Emergence, Platform Consolidation, and Political Reordering — Silicon Valley Commercialization"
version: "0.1"
status: "candidate"
format: "probespecv2"
benchmark_pack: v0
compatibility_tier: v0-legacy

summary:
  purpose: >
    Benchmark whether a single transferable graph intermediate representation can encode the commercialization
    phase of Silicon Valley as an interaction among personal computing, venture capital, software firms,
    standards contests, deregulation, labor circulation, and early internet market formation, while remaining
    queryable for retrieval and consumable by downstream adaptive GNN systems.
  rationale: >
    This probe covers the bridge period in which computing moved from research- and hardware-centered origins
    into scalable commercial ecosystems. It is valuable because later platform dominance was not created by one
    firm or one invention alone, but by a layered commercial architecture that combined finance, software
    standards, distribution channels, entrepreneurial ideology, labor networks, and permissive policy
    environments. The probe is therefore designed to stress whether the IR can preserve typed distinctions
    between material business structure, institutional support, ideological legitimation, and early lock-in
    mechanisms without leaking post-2000 platform outcomes backward.

scope:
  region: "Western / U.S."
  polity: "The commercialization phase of Silicon Valley through PCs, venture capital, software firms, deregulation, and early internet business formation"
  temporalwindow:
    startyear: 1975
    endyear: 1998
    label: "1975 to 1998"
  recommendedslices:
    - sliceid: "6c2_pc_and_hobbyist_transition"
      startyear: 1975
      endyear: 1983
      label: "PCs, hobbyist computing, and entrepreneurial transition"
    - sliceid: "6c2_venture_software_scaling"
      startyear: 1984
      endyear: 1993
      label: "Venture capital, software firm scaling, and commercialization of computing"
    - sliceid: "6c2_early_internet_business"
      startyear: 1994
      endyear: 1998
      label: "Browser era, internet commercialization, and pre-platform consolidation"
  exclusions:
    - "Do not import smartphone, app-store, cloud, or social-media platform logic from after 1998."
    - "Do not treat post-2000 monopoly outcomes as already resolved during the 1980s."
    - "Do not collapse semiconductor or Cold War prehistory from 6C-1 into this probe except as prior context nodes."
    - "Do not include Obama-era or Trump-era state-platform conflicts."
    - "Do not model mature data-extractive ad-tech as the dominant business architecture for the full window."

artifacts:
  humanauthored:
    - "Canonical probe metadata, slice boundaries, exclusions, and anti-leakage rules"
    - "Core question and historical subquestions"
    - "Required node and edge ontology"
    - "Seed entities and negative test prompts"
    - "Supervised target definitions and evaluation criteria"
  machinegenerated:
    - "Entity resolution and alias expansion across firms, investors, standards, and markets"
    - "Candidate event extraction from source corpora"
    - "Typed claim graphs for ideology, policy, and commercialization narratives"
    - "Cross-slice continuity links for persistent entities and evolving market structures"
    - "Feature projections for downstream GNN training and slice-transition prediction"

groundedsources:
  - source: "Wikidata"
    role: "Canonical identifiers, entity disambiguation, organizational relationships, and temporal anchoring"
    required: "always"
  - source: "Wikipedia"
    role: "High-coverage historical summaries for firms, products, standards battles, investor firms, and major events"
    required: "always"
  - source: "SEC filings"
    role: "Grounding for public-company structure, market positioning, product lines, acquisitions, and risk framing when relevant"
    required: "conditional"
  - source: "Business histories"
    role: "Narrative and analytical grounding for venture capital formation, distribution channels, software commercialization, and ideology"
    required: "always"
  - source: "GDELT"
    role: "Optional retrospective media-salience layer for late-window events and public narrative shifts"
    required: "optional"
  - source: "U.S. policy or antitrust sources"
    role: "Grounding for deregulation, antitrust memory, standards policy, and institutional permissiveness"
    required: "conditional"

corequestion: >
  Can a single graph schema represent how venture capital, software firms, personal computers, early internet
  markets, standards battles, and deregulation together created the commercial architecture that later enabled
  Big Tech platform dominance, while preserving typed distinctions among firms, investors, institutions,
  ideologies, and lock-in mechanisms?

historicaloranalyticalsubquestions:
  - "How did venture capital formation, syndication, and reputation networks shape which computing firms scaled and which did not?"
  - "How did PC hardware-software market structure evolve from hobbyist and kit-oriented markets into branded, business, and mass-distribution ecosystems?"
  - "Which standards, interfaces, operating systems, and compatibility layers became pivotal choke points for commercialization and lock-in?"
  - "How did deregulation, antitrust memory, procurement choices, and broader U.S. policy environments enable or constrain commercialization?"
  - "How did narratives of disruption, entrepreneurship, meritocracy, openness, and market-led innovation legitimize rapid commercialization?"
  - "How did labor circulation among universities, firms, founders, executives, and investors create elite networks that accelerated scaling?"
  - "What early signs of concentration, dependency, or ecosystem lock-in were visible before the fully mature platform era?"
  - "What changed across the three slices in the relative importance of hardware, software, financing, standards, and internet-market formation?"

schemarequirements:
  mustrepresent:
    - "Venture capital as causal structure rather than background financing"
    - "Hardware-software complementarities and ecosystem dependence"
    - "Standards, interfaces, compatibility, and distribution as first-class graph objects"
    - "Deregulation and policy permissiveness as typed institutional context"
    - "Commercial ideology and legitimacy narratives as discrete nodes and claims"
    - "Labor circulation and elite-network reproduction across firms and investors"
    - "Early concentration, switching costs, and lock-in signals"
    - "Cross-slice persistence and transformation of firms, technologies, and markets"
  nodetypes:
    required:
      - "Actor"
      - "Firm"
      - "Investor"
      - "Institution"
      - "Office"
      - "Technology"
      - "Standard"
      - "PlatformComponent"
      - "DistributionChannel"
      - "Event"
      - "Policy"
      - "Narrative"
      - "Norm"
      - "Counterweight"
      - "Shock"
      - "Claim"
      - "LaborPool"
      - "MarketActor"
  edgetypes:
    required:
      - "founds"
      - "investsin"
      - "distributesthrough"
      - "standardizes"
      - "locksin"
      - "competeswith"
      - "acquires"
      - "legitimizes"
      - "constrains"
      - "recruitsfrom"
      - "dependson"
      - "scales"
      - "diffusesinto"
      - "respondsTo"
  mustsupport:
    - "Time-scoped nodes and edges, with explicit persistence flags for enduring entities"
    - "Typed claims linking narratives and norms to firms, policies, and markets"
    - "Slice-local graphs plus slice-transition graphs"
    - "Many-to-many investor-firm and firm-standard relationships"
    - "Multiple simultaneous distribution channels for the same technology or firm"
    - "Explicit uncertainty or evidence weighting for weakly grounded claims"
    - "Fixed-dimensional node projection compatibility for downstream GNN use"
    - "Negative evidence handling when expected links or standards are absent"
  antirequirements:
    - "Do not reduce commercialization to a few charismatic founders."
    - "Do not ignore venture capital structure."
    - "Do not ignore standards wars and lock-in."
    - "Do not collapse ideology into untyped text."
    - "Do not import post-2000 platform monopoly into the 1980s."

expectedgraphaxes:
  material: "Hardware production, software products, capital flows, product launches, acquisitions, and market expansion."
  institutional: "Firms, venture partnerships, stock markets, standards bodies, regulatory offices, and procurement-related institutions."
  ideological: "Entrepreneurship, disruption, openness, deregulation, meritocracy, and market-led innovation."
  counterweights: "Antitrust memory, technical bottlenecks, fragmentation, labor displacement concern, incumbent resistance, and policy scrutiny."
  asymmetryandexternalconstraint: "Capital concentration, distribution gatekeeping, standards dependence, macro-financial cycles, and regulatory permissiveness."
  firms: "PC manufacturers, chip firms, software firms, browser firms, enterprise vendors, and emerging internet businesses."
  investors: "VC partnerships, angel networks, IPO channels, and public-market financing environments."
  procurement: "Corporate IT purchasing, educational procurement, enterprise adoption channels, and indirect state demand where relevant."
  standards: "Operating systems, interfaces, compatibility layers, file formats, networking protocols, and de facto ecosystem standards."
  platforms: "Operating systems, browser stacks, PC ecosystems, development environments, and early online service layers."
  labor: "Engineers, programmers, managers, founders, university spillovers, and executive-investor circulation."
  regulatorychannels: "Deregulation climate, antitrust memory, financial-market rules, telecommunications policy, and standards governance."

