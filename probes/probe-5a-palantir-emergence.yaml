generictargetinterface:
  graphleveltargets:
    - target: "foundingnetworkstrengthscore"
      description: "Strength and diversity of graph-represented founder, investor, and access-network structure by the slice cutoff."
      computableat: "slice cutoff only"
    - target: "institutionalaccessscore"
      description: "Degree of demonstrated access to intelligence or public-sector institutions by the cutoff."
      computableat: "slice cutoff only"
    - target: "securitylegibilityscore"
      description: "Extent to which the firm is legible as a security or anti-fraud platform rather than a generic startup."
      computableat: "slice cutoff only"
    - target: "counterweightstrengthscore"
      description: "Strength of constraints or frictions active in the founding period."
      computableat: "slice cutoff only"
  slicetransitiontargets:
    - target: "accessdeepeningdelta"
      description: "Change from early-founding network relations to later-in-slice institutional access relations."
    - target: "legibilitydelta"
      description: "Change in security-platform legibility across the slice."
    - target: "networktoinstitutiondelta"
      description: "Shift from elite-network structure toward explicit institutional embedding."

probetasks:
  retrievaltasks:
    - "Which founder and investor networks most directly shaped Palantir's early emergence?"
    - "Which specific institutions made the firm legible as a security platform in this slice?"
    - "Which narratives legitimized Palantir's anti-fraud and security positioning?"
    - "What constraints prevented early access from automatically becoming broad institutional scale?"
  structuraltasks:
    - "Construct a typed path from founder nodes to investor nodes to intelligence institutions."
    - "Separate product identity from narrative legitimacy and from institutional relationships."
    - "Represent access, embedding, and contract as distinct but connected relation types."
    - "Preserve stable identity for actors and institutions for reuse in later 6B child probes."
  gnntasks:
    - "Predict institutionalaccessscore from founder-network, investor, and narrative features."
    - "Predict whether accessdeepeningdelta is positive within the slice."
    - "Classify whether graph growth is driven more by founder-network structure or institution-facing legitimacy."

labelsandtargets:
  foundingnetworkstrengthscore:
    description: "Strength of founder-investor-access network structure."
    sourcepriority:
      - "Wikidata"
      - "Wikipedia"
      - "SEC filings / annual reports / investor letters"
    leakagerule: "Use only relationships evidenced by or before 2008."
    targetconstructionrule: "Combine normalized counts and weighted centrality for founder, investor, and early access relations into a bounded score."
  institutionalaccessscore:
    description: "Depth of evidenced access to intelligence or public-sector institutions."
    sourcepriority:
      - "Wikipedia"
      - "Wikidata"
      - "U.S. federal procurement or contract databases"
      - "ICEWS"
    leakagerule: "Require explicit pre-2009 evidence; no inference from later prominence."
    targetconstructionrule: "Aggregate institution-linked relations, access pathways, and public evidence of early embedding."
  securitylegibilityscore:
    description: "Degree to which Palantir is represented as a security or anti-fraud platform."
    sourcepriority:
      - "Wikipedia"
      - "GDELT"
      - "SEC filings / annual reports / investor letters"
    leakagerule: "Exclude descriptions that rely on later war-tech or AI framing."
    targetconstructionrule: "Score product, narrative, and institution-facing claims that position the firm as security-relevant."
  counterweightstrengthscore:
    description: "Strength of founding-period constraints and frictions."
    sourcepriority:
      - "GDELT"
      - "Wikipedia"
      - "SEC filings / annual reports / investor letters"
    leakagerule: "Use only constraints documented within the slice."
    targetconstructionrule: "Score the number, persistence, and authority of constraining nodes and edges active by 2008."
  accessdeepeningdelta:
    description: "Within-slice increase in institutional access depth."
    sourcepriority:
      - "Wikipedia"
      - "Wikidata"
      - "U.S. federal procurement or contract databases"
    leakagerule: "Compute only from early versus late subperiod evidence inside 2003 to 2008."
    targetconstructionrule: "Difference access-related bounded features between early and late subwindows."

evaluation:
  stage1validitychecks:
    - "Verify one slice covering 2003 through 2008."
    - "Verify founders, investors, institutions, products, and narratives are distinct typed objects."
    - "Verify state-facing access is represented via specific institutions rather than a generic government node."
    - "Verify time-scoped provenance for all major relations."
  stage2groundingmetrics:
    - "Entity-link precision and recall against Wikidata and Wikipedia identities"
    - "Coverage of early-access claims against public evidence"
    - "Cross-entity disambiguation quality for founders, investors, and institutions"
  stage3retrievalmetrics:
    - "Accuracy of founder-to-institution path retrieval"
    - "Security-legibility retrieval fidelity"
    - "Counterweight retrieval recall"
    - "Separation accuracy for product versus narrative versus institutional objects"
  stage4predictionmetrics:
    - "Graph-level target accuracy for foundingnetworkstrengthscore and institutionalaccessscore"
    - "Within-slice delta prediction accuracy for accessdeepeningdelta"
    - "Ablation gain from adding ideology and investor structure over material-only baseline"
  wincondition: "The schema wins if it preserves typed founder, investor, institution, product, and narrative structure; retrieves early access pathways with high fidelity; and improves prediction when founder-network and ideology layers are included."

negativetests:
  - "Explain Palantir only as Peter Thiel's ideology."
  - "Return anti-fraud and security framing as an untyped paragraph."
  - "Treat In-Q-Tel and CIA as one generic state customer."
  - "Infer broad institutional embedding from later reputation."
  - "Collapse Gotham, firm identity, and investor backing into one generic startup node."

ablationsuite:
  - "materialonly"
  - "materialplusinstitutions"
  - "materialplusinstitutionsplusideology"
  - "materialplusinstitutionsplusinvestornetwork"
  - "fullmodelwithcounterweights"

splits:
  suggestedtrain:
    - "6b1_founding_intelligence_embedding"
  suggestedvalidation:
    - "heldout_entity_and_relation_subset"
  suggestedstresstest:
    - "transfer_to_6B-2"

bridgerole:
  modernbridge: "Founding-stage business-state fusion probe"
  purpose: "Bridge generic startup graphs and later defense-tech probes by forcing early access, elite networks, and intelligence-legibility into a reusable ontology."
  downstreamalignment:
    - "Aligns with 6B-2 through stable actor, institution, and product identities"
    - "Aligns with Big Tech and semiconductor probes through investor and elite-network structure"
  failuremodestowatch:
    - "Founder-biography collapse"
    - "State homogenization"
    - "Narrative blobification"
    - "Backward leakage from later legitimacy"
  autoresearchobjectivehint: "Prefer schemas that separately model founder-network access, institutional legibility, and early ideology while preserving portability to later Palantir slices."
  notes:
    - "This file is intentionally narrow and should be used as a child probe under 6B."
    - "The subprobe should reward access modeling without confusing access with later-scale embedding."