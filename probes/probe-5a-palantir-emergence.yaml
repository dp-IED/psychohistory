probeid: "6B-1"
parentprobe: "6B"
name: "Palantir Founding, PayPal Network, and Intelligence Embedding"
version: "0.1"
status: candidate
format: probespecv2
benchmark_pack: v0
compatibility_tier: v0-legacy

summary:
  purpose: "Evaluate whether a transferable graph schema can represent Palantir's emergence between 2003 and 2008 through founder networks, early venture backing, intelligence relationships, anti-fraud positioning, and product legibility as a security platform rather than a generic software startup."
  rationale: "This subprobe isolates the founding grammar of the parent 6B case so autoresearch can learn whether the IR captures founder-network access, early state demand, identity formation, and first-legitimacy pathways before later procurement scale, politicization, or war-tech branding are introduced."

scope:
  region: "Western / U.S."
  polity: "Palantir as an emergent firm-state-security platform at founding stage"
  temporalwindow:
    startyear: 2003
    endyear: 2008
    label: "Founding, PayPal network, intelligence relationships, anti-fraud/security pitch"
  recommendedslices:
    - sliceid: "6b1_founding_intelligence_embedding"
      startyear: 2003
      endyear: 2008
      label: "Founding, elite networks, early intelligence access, and security-platform legibility"
  exclusions:
    - "Do not model Palantir as a generic startup detached from intelligence or public-sector pathways."
    - "Do not reduce the case to Peter Thiel or founder biography alone."
    - "Do not import later defense-tech or Ukraine-era legitimacy into this period."
    - "Do not flatten In-Q-Tel, CIA, founders, and firm identity into a single undifferentiated elite-network node."
    - "Do not substitute general Silicon Valley history for slice-specific public evidence."

artifacts:
  humanauthored:
    - "Canonical subprobe boundary for 2003 to 2008"
    - "Core ontology commitments for founder networks, investors, institutions, products, narratives, and early contracts"
    - "Seed entities and retrieval tasks"
    - "Leakage rules and target construction rules"
    - "Negative tests and ablations"
  machinegenerated:
    - "Entity linking to Wikidata and Wikipedia identities"
    - "Temporal alias resolution for founders, investors, institutions, and products"
    - "Event extraction from GDELT and ICEWS into typed Event and Shock nodes"
    - "Candidate procurement and early-customer pathway enrichment from public contract traces"
    - "Narrative and claim extraction from public reporting and investor materials"
    - "Fixed-dimensional node projections for downstream GNN use"

groundedsources:
  - source: "Wikidata"
    role: "Canonical entity IDs for actors, firms, institutions, and products"
    required: true
  - source: "Wikipedia"
    role: "Chronology, founding history, public controversies, and institutional relationships"
    required: true
  - source: "GDELT"
    role: "Time-stamped media and narrative dynamics around founding, security positioning, and institutional visibility"
    required: true
  - source: "ICEWS"
    role: "Optional structured security and political interaction signals relevant to early institutional embedding"
    required: false
  - source: "SEC filings / annual reports / investor letters"
    role: "Later public-company disclosures that reference early origins, strategic identity, and customer dependence, but only when used without backward leakage"
    required: true
  - source: "U.S. federal procurement or contract databases"
    role: "Publicly visible early contract or award pathway evidence where available"
    required: true
  - source: "Polymarket or similar forecast market"
    role: "Not required for core subprobe grounding; optional only for downstream benchmarking alignment"
    required: false

corequestion: "Can a single graph schema represent how Palantir emerged through founder networks, early venture capital, intelligence relationships, anti-fraud/security ideology, and first institutional access in a way that is queryable, temporally disciplined, and consumable by downstream GNNs?"

subquestions:
  - "Which founder, investor, and PayPal-diaspora relationships were structurally important to Palantir's early emergence?"
  - "How did early backing and capital identity shape Palantir's ability to pursue long-cycle state-facing opportunities?"
  - "Which specific intelligence relationships made the firm legible as a security platform rather than a generic enterprise software company?"
  - "How should early products or product claims be represented separately from institutions, procurement pathways, and narratives?"
  - "Which narratives around anti-fraud, security, and institutional trust legitimized Palantir's early positioning?"
  - "What counterweights or constraints, including limited public visibility, long procurement cycles, and reputational ambiguity, shaped this period?"
  - "Which early events changed access, legitimacy, or product legibility within the slice?"
  - "What graph structures distinguish elite-network access from actual institutional embedding?"

schemarequirements:
  mustrepresent:
    nodetypes:
      - "Actor"
      - "Firm"
      - "Investor"
      - "Institution"
      - "Office"
      - "ProcurementChannel"
      - "Contract"
      - "PlatformProduct"
      - "Event"
      - "Policy"
      - "Narrative"
      - "Norm"
      - "Counterweight"
      - "Shock"
      - "Claim"
      - "SecurityApparatus"
      - "RegulatoryBody"
      - "MediaNarrative"
    edgetypes:
      - "founds"
      - "funds"
      - "investsin"
      - "embedsin"
      - "contractswith"
      - "procuresfrom"
      - "legitimizes"
      - "delegitimizes"
      - "constrains"
      - "dependson"
      - "alignswith"
      - "contests"
      - "marketsas"
      - "respondsTo"
      - "scrutinizes"
      - "recruitsfrom"
      - "spinsoutfrom"
  mustsupport:
    - "Time-scoped nodes and edges for founders, investors, institutions, narratives, products, and contracts."
    - "Separate typed objects for founder networks, institutions, product claims, and ideology."
    - "Explicit distinction between access pathways and realized institutional embedding."
    - "Graphable representation of early customer or procurement pathways when public evidence exists."
    - "Cross-slice identity preservation with parent 6B for actors, institutions, and products."
    - "Evidence-level provenance sufficient to reconstruct graph state by 2008 cutoff."
    - "Fixed-dimensional node projections for downstream GNN use."
  antirequirements:
    - "Do not reduce the slice to founder biography."
    - "Do not flatten ideology into text blobs."
    - "Do not treat the state as one generic node."
    - "Do not project later defense-tech identity backward."
    - "Do not collapse products, institutions, and narratives into one firm halo."

