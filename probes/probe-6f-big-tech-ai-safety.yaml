probeid: "6C-6"
name: "Big Tech Emergence, Platform Consolidation, and Political Reordering — AI/Platform-Security Convergence"
family: "businessfamily6C"
version: "0.1"
status: "candidate"
format: "probespecv2"
benchmark_pack: v0
compatibility_tier: v0-legacy

summary:
  purpose: >-
    Evaluate whether a single graph intermediate representation can encode the
    late-stage transition of Big Tech from consumer-platform dominance toward
    frontier-AI, cloud, compute, industrial-policy, and security-state
    relevance in a form that supports retrieval, explanation, and downstream
    adaptive GNN forecasting.
  rationale: >-
    The 2022 to 2026 period concentrates frontier-model races, hyperscaler
    dependence, chip and energy bottlenecks, export-control logic, antitrust
    concerns, safety and sovereignty narratives, and emerging defense or public
    sector procurement pathways into one tightly coupled business-political
    system. A strong probe must force the schema to keep material bottlenecks,
    institutions, ideology, counterweights, and state-security alignment as
    distinct typed structures rather than flattening them into generic firm
    stories.

scope:
  region: "Western / U.S. with global compute and alliance spillover"
  polity: "Frontier AI, cloud concentration, compute chokepoints, industrial policy, and defense-tech convergence"
  temporalwindow: "2022 to 2026"
  startyear: 2022
  endyear: 2026
  label: "Frontier models, cloud concentration, compute chokepoints, and state-tech convergence"
  recommendedslices:
    - sliceid: "6c6_frontier_model_acceleration"
      startyear: 2022
      endyear: 2023
      label: "Frontier-model race and cloud dependence"
    - sliceid: "6c6_compute_and_policy_chokepoints"
      startyear: 2024
      endyear: 2025
      label: "Compute concentration, industrial policy, and export-control relevance"
    - sliceid: "6c6_state_security_convergence"
      startyear: 2026
      endyear: 2026
      label: "AI, defense-tech convergence, and platform-security legitimacy"
  exclusions:
    - "Do not backfill smartphone, app-store, ad-tech, or Obama-era platform-consolidation mechanisms unless they remain causally active inside 2022 to 2026 evidence."
    - "Do not import Trump-era moderation conflict as the primary explanation for this probe unless directly connected to frontier-AI governance, compute, or security alignment."
    - "Do not reduce the case to pre-2022 consumer-platform monopoly history; earlier platform eras may appear only as inherited context nodes with explicit temporal boundaries."
    - "Do not leak post-slice procurement, policy, valuation, safety, or geopolitical outcomes backward into earlier slices."
    - "Do not treat earlier Silicon Valley founder mythology as substitute explanation for compute concentration, export-control logic, or defense integration in this period."

artifacts:
  humanauthored:
    - "Probe framing, slice design, leakage policy, ontology constraints, evaluation criteria, and task definitions."
    - "Canonical node and edge type requirements for cross-probe transfer."
    - "Target definitions, ablation plan, and split guidance."
  machinegenerated:
    - "Entity linking to Wikidata and Wikipedia pages."
    - "Event extraction from GDELT and ICEWS into time-scoped Event nodes."
    - "Auto-derived policy and filing references from SEC, export-control, industrial-policy, antitrust, and model-governance documents."
    - "Candidate claim, narrative, and counterweight nodes with provenance and confidence."
    - "Graph-ready slice snapshots, transition deltas, and fixed-dimensional node projections."

grounded_sources:
  - source: "Wikidata"
    role: "Entity grounding, aliases, organizational continuity, and canonical IDs."
    required: true
  - source: "Wikipedia"
    role: "High-level chronology, institutional context, and cross-checkable summaries."
    required: true
  - source: "SEC filings"
    role: "Risk factors, capital dependence, cloud commitments, revenue concentration, and strategic disclosures for public firms."
    required: true
  - source: "GDELT"
    role: "Media-event salience, narrative diffusion, and cross-border political attention."
    required: true
  - source: "ICEWS"
    role: "Structured political-event context where state interaction or security signaling is relevant."
    required: true
  - source: "Policy papers"
    role: "AI safety, sovereignty, competitiveness, and industrial-policy framing."
    required: true
  - source: "Antitrust materials"
    role: "Concentration, platform power, and cloud or distribution concerns."
    required: true
  - source: "Export-control documents"
    role: "Chip restrictions, compute-access asymmetries, and external-constraint logic."
    required: true
  - source: "Industrial-policy documents"
    role: "Subsidy, manufacturing, and national-capacity programs affecting compute and chip supply."
    required: true
  - source: "Polymarket or similar forecast market"
    role: "Optional forecasting targets or public expectation signals when clearly relevant to AI policy or firm trajectories."
    required: false

core_question: >-
  Can a single graph schema represent how frontier AI, cloud infrastructure
  concentration, compute dependence, industrial policy, export-control logic,
  and defense-tech alignment reshaped Big Tech from consumer-platform dominance
  toward explicit strategic-state relevance in a way that remains queryable,
  temporally disciplined, and GNN-consumable?

historical_or_analytical_subquestions:
  - "How should the graph represent frontier model production as a joint function of model labs, cloud hosts, compute resources, investor backing, and deployment channels rather than as standalone product release events?"
  - "Which firms and labs became structurally dependent on hyperscaler cloud infrastructure, and how did that dependence differ across the 2022 to 2023, 2024 to 2025, and 2026 slices?"
  - "How do chip supply nodes, GPU access, fabrication bottlenecks, networking equipment, data-center buildout, and energy constraints combine into a material chokepoint layer?"
  - "How should export controls, subsidy programs, antitrust actions, and industrial-policy initiatives be modeled as distinct policies with different constraint pathways rather than generic regulation?"
  - "Which narratives and norms around safety, alignment, existential risk, national competitiveness, AI sovereignty, and openness legitimized or contested concentration and closure?"
  - "What counterweights mattered most, including concentration critique, open-model alternatives, labor and copyright conflict, antitrust pressure, and regulatory uncertainty, and why were they only partially constraining?"
  - "How did defense, intelligence, homeland-security, or public-sector procurement and partnership pathways alter legitimacy, market positioning, or state alignment by 2026?"
  - "Which causal structures persist across all three slices, and which structures change sharply enough that slice-transition modeling should outperform a flat single-period graph?"

schema_requirements:
  mustrepresent:
    - "Frontier-model production as a relation among labs, compute resources, cloud hosts, investors, policies, and claims."
    - "Cloud concentration and compute access as first-class material structures."
    - "Chip and supply-chain chokepoints as explicit nodes and edges, not background assumptions."
    - "Industrial policy, export controls, and antitrust pressure as distinct institutional channels."
    - "Ideology, narratives, and norms as typed objects linked to legitimization, securitization, and constraint."
    - "Defense and security integration, including procurement and organizational alignment, when evidenced."
    - "Counterweights and open-model alternatives as active graph structure."
    - "Time-scoped persistence and slice transitions suitable for downstream message passing."
  nodetypes:
    - "Firm"
    - "ModelLab"
    - "CloudInfrastructure"
    - "ComputeResource"
    - "ChipSupplyNode"
    - "RegulatoryBody"
    - "ExecutiveOffice"
    - "MilitaryFormation"
    - "SecurityApparatus"
    - "Event"
    - "Policy"
    - "Narrative"
    - "Norm"
    - "Counterweight"
    - "Claim"
    - "UserPopulation"
    - "LaborPool"
    - "Investor"
    - "ExternalPower"
  edgetypes:
    - "trainson"
    - "dependson"
    - "hosts"
    - "supplies"
    - "restrictsexportTo"
    - "legitimizes"
    - "securitizes"
    - "procuresfrom"
    - "alignswith"
    - "constrains"
    - "regulates"
    - "competeswith"
    - "integrateswith"
    - "respondsTo"
  mustsupport:
    - "Slice-specific subgraphs with persistent entity identity across time."
    - "Typed paths from compute bottlenecks to strategic-state relevance."
    - "Separate retrieval of material, institutional, ideological, and counterweight evidence."
    - "Fixed-dimensional node projection for downstream adaptive GNN training."
    - "Source provenance, confidence, and temporal validity on machine-generated enrichments."
    - "Graph-level targets and slice-transition targets computable with evidence available at or before cutoff."
  antirequirements:
    - "Must forbid reducing AI convergence to product hype only."
    - "Must forbid ignoring cloud concentration and compute dependence."
    - "Must forbid ignoring state and defense integration."
    - "Must forbid returning ideology as prose only."
    - "Must forbid flattening export controls and industrial policy into generic regulation."
    - "Must forbid treating all frontier labs as independent from cloud hosts and compute suppliers."
    - "Must forbid leaking 2026 legitimacy or procurement effects backward into 2022 to 2023."
    - "Must forbid collapsing counterweights into undifferentiated skepticism."

expected_graph_axes:
  material: "Compute resources, accelerator supply, chips, data centers, energy availability, networking capacity, and frontier models."
  institutional: "Model labs, hyperscalers, regulators, executive offices, standards bodies, defense actors, and security apparatuses."
  ideological: "Safety, alignment, existential risk, sovereignty, competitiveness, openness, closed-model control, and techno-sovereignty."
  counterweights: "Concentration critique, labor and copyright conflict, antitrust pressure, open-model challenge, safety-regulation demands, and infrastructure bottlenecks."
  asymmetryandexternalconstraint: "Chip chokepoints, export controls, alliance dependence, fabrication geography, and unequal compute access."
  firms: "Platform firms, hyperscalers, chip firms, frontier labs, and enterprise integrators."
  investors: "Strategic investors, venture funds, public markets, and corporate capital relationships relevant to compute and lab scaling."
  procurement: "Defense, intelligence, homeland-security, and public-sector AI procurement or pilot channels where evidenced."
  standards: "Safety frameworks, model-evaluation regimes, reporting standards, and governance templates for advanced models."
  platforms: "Cloud platforms, API ecosystems, distribution layers, and enterprise deployment channels."
  labor: "Researchers, data workers, contractors, legal-rights claimants, and talent pools constrained by firm concentration."
  regulatorychannels: "Export-control regimes, industrial-policy programs, antitrust review, agency guidance, executive action, and procurement compliance."

