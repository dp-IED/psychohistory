probe_tasks:
  retrievaltasks:
    - "Identify which frontier labs rely on which cloud infrastructures and compute resources in each slice."
    - "Retrieve the chip, supply, energy, and data-center bottlenecks that most constrain model scaling."
    - "Surface the policies and offices most responsible for export-control, industrial-policy, and antitrust pressure."
    - "Extract the narratives and norms that justify concentration, closure, or securitization."
    - "Retrieve counterweights, including open-model alternatives, labor and copyright conflict, antitrust critique, and regulatory uncertainty."
    - "Identify defense, intelligence, or public-sector procurement and integration pathways that change legitimacy by slice."
  structuraltasks:
    - "Build a typed path from ModelLab to strategic-state relevance through CloudInfrastructure, ComputeResource, Policy, and SecurityApparatus."
    - "Disambiguate whether a policy acts mainly through export restriction, subsidy, competition pressure, or procurement legitimation."
    - "Separate firm competition edges from dependency edges when the same firms both partner and compete."
    - "Represent ideology as linked Narrative, Norm, and Claim nodes rather than free text."
    - "Preserve persistent entities across slices while changing their local neighborhoods and edge weights."
  gnntasks:
    - "Predict graph-level computeconcentrationscore at each slice cutoff."
    - "Predict statesecurityalignmentscore for the next slice using only prior-slice evidence."
    - "Classify whether counterweights meaningfully reduce or merely contest modelplatformintegrationscore."
    - "Forecast which slice transition most increases legitimacy through securitization rather than product adoption."

labels_and_targets:
  computeconcentrationscore:
    description: "Degree to which frontier-model development depends on a narrow set of compute suppliers, accelerator lines, and cloud hosts."
    sourcepriority:
      - "SEC filings"
      - "export-control documents"
      - "industrial-policy documents"
      - "Wikidata"
      - "Wikipedia"
    leakagerule: "Use only evidence available at or before the slice cutoff; do not infer concentration from later market outcomes."
    targetconstructionrule: >-
      Combine concentration of relevant ComputeResource and CloudInfrastructure
      nodes, dependency edge weights, and supply chokepoint centrality into a
      normalized slice-level score.
  clouddependencyscore:
    description: "Extent to which major labs and platform firms require hyperscaler cloud infrastructure for training, hosting, or deployment."
    sourcepriority:
      - "SEC filings"
      - "Wikipedia"
      - "Wikidata"
      - "policy papers"
    leakagerule: "Do not use later partnership renewals or disclosed contracts to score earlier slices."
    targetconstructionrule: >-
      Measure the share and centrality of trainson, hosts, and dependson edges
      linking ModelLab and Firm nodes to CloudInfrastructure nodes at cutoff.
  statesecurityalignmentscore:
    description: "Strength of alignment between frontier-AI actors and defense, intelligence, homeland-security, or strategic-state institutions."
    sourcepriority:
      - "policy papers"
      - "SEC filings"
      - "GDELT"
      - "ICEWS"
      - "Wikipedia"
    leakagerule: "Only count alignment evidenced by contemporaneous procurement, integration, rhetoric, or policy engagement."
    targetconstructionrule: >-
      Aggregate securitizes, procuresfrom, alignswith, and integrateswith edges
      between private actors and MilitaryFormation, SecurityApparatus, or
      ExecutiveOffice nodes, weighted by institutional significance.
  industrialpolicypressurescore:
    description: "Intensity of policy pressure created by subsidy programs, manufacturing incentives, localization efforts, and export-control logic."
    sourcepriority:
      - "industrial-policy documents"
      - "export-control documents"
      - "policy papers"
      - "GDELT"
    leakagerule: "Exclude policies announced or operationalized after the relevant slice cutoff."
    targetconstructionrule: >-
      Sum active Policy-node pressures on Firm, ChipSupplyNode, and
      ComputeResource subgraphs, distinguishing restrictive from enabling policy
      channels before normalization.
  legitimacyscore:
    description: "Overall legitimacy of concentrated frontier-AI and cloud actors across public, policy, and strategic-state narratives."
    sourcepriority:
      - "GDELT"
      - "policy papers"
      - "SEC filings"
      - "Wikipedia"
      - "ICEWS"
    leakagerule: "Do not infer legitimacy from later valuation, contracts, or post-cutoff narrative reversals."
    targetconstructionrule: >-
      Balance legitimizes versus constrains and contested Claim-node pathways,
      with separate contributions from safety, competitiveness, sovereignty, and
      security narratives.
  counterweightstrengthscore:
    description: "Relative strength of antitrust, open-model, labor, copyright, safety-regulation, and concentration-risk counterweights."
    sourcepriority:
      - "antitrust materials"
      - "policy papers"
      - "GDELT"
      - "Wikipedia"
    leakagerule: "Score only counterweights visible and activated by the cutoff date."
    targetconstructionrule: >-
      Combine number, centrality, diversity, and persistence of Counterweight
      nodes and constrains edges against dominant firm, lab, and platform
      clusters.
  modelplatformintegrationscore:
    description: "Degree to which frontier models are structurally integrated into large cloud and platform ecosystems rather than standing alone."
    sourcepriority:
      - "SEC filings"
      - "Wikipedia"
      - "Wikidata"
      - "policy papers"
    leakagerule: "Do not use downstream ecosystem dominance that materializes only after the slice."
    targetconstructionrule: >-
      Estimate the density and importance of hosts, dependson, trainson, and
      integrateswith edges connecting ModelLab, Firm, CloudInfrastructure, and
      UserPopulation nodes.

evaluation:
  stage1validity:
    - "Check that all required node and edge types appear in at least one slice."
    - "Check that every slice has explicit temporal boundaries and no post-cutoff evidence leakage."
    - "Check that ideology, policy, and counterweights are typed nodes rather than residual prose blobs."
    - "Check that cloud and compute dependence are explicit graph structure."
  stage2grounding:
    - "Entity-grounding precision against Wikidata and source-backed aliases."
    - "Source-provenance coverage for policy, firm, and event nodes."
    - "Temporal grounding quality for slice assignment and persistence."
    - "Counterweight and narrative recall from grounded documents and event data."
  stage3retrieval:
    - "Path retrieval accuracy from model labs to compute chokepoints."
    - "Policy-channel retrieval accuracy distinguishing export controls, antitrust, subsidy, and procurement."
    - "Narrative retrieval quality for safety, sovereignty, openness, and competitiveness."
    - "Cross-slice retrieval consistency for persistent firms and institutions."
  stage4prediction:
    - "Out-of-slice prediction of graph-level targets using only prior evidence."
    - "Ablation sensitivity showing gains when compute, ideology, and state-security layers are added."
    - "Calibration on slice-transition deltas rather than only static labels."
    - "Comparative performance against flatter actor-event or prose-only baselines."
  wincondition: >-
    The probe is successful when a shared schema can recover the material,
    institutional, ideological, and counterweight structure of the 2022 to 2026
    AI/platform-security transition, preserve temporal discipline across slices,
    and improve downstream target prediction relative to reduced or flattened
    graph variants.

negative_tests:
  - "Explain the AI era only as product excitement."
  - "Ignore cloud concentration and compute chokepoints."
  - "Treat export controls as generic regulation."
  - "Return ideology as prose only."
  - "Omit defense and national-security integration."
  - "Model frontier labs without chip, cloud, or data-center dependence."
  - "Treat open models, labor conflict, and antitrust as irrelevant side notes."

ablation_suite:
  materialonly:
    description: "Only compute, chips, models, data centers, and supply nodes."
  materialplusinstitutions:
    description: "Add labs, cloud providers, regulators, executive offices, and security institutions."
  materialplusinstitutionsplusideology:
    description: "Add narratives, norms, and claims around safety, sovereignty, competitiveness, and openness."
  materialplusinstitutionspluscompute:
    description: "Emphasize explicit compute and cloud dependence with chokepoint topology."
  materialplusinstitutionsplusstatesecurity:
    description: "Add procurement, securitization, and strategic-state alignment channels."
  fullmodelwithcounterweights:
    description: "Full schema including material, institutional, ideological, asymmetry, and counterweight layers."

splits:
  suggestedtrain:
    - "6c6_frontier_model_acceleration"
    - "Partial instances from 6c6_compute_and_policy_chokepoints with strict cutoff masking"
  suggestedvalidation:
    - "Held-out cases from 6c6_compute_and_policy_chokepoints"
  suggestedstresstest:
    - "6c6_state_security_convergence"
    - "Counterfactual masking of ideology or compute layers"
    - "Leakage-resistance tests with pre-2022-only context nodes"

bridge_role:
  modernbridge: true
  purpose: >-
    Serve as the modern bridge between earlier Big Tech platform-consolidation
    probes and adjacent semiconductor, Palantir, industrial-policy, and war-tech
    probes by forcing a shared ontology for compute dependence, strategic-state
    relevance, and legitimacy.
  downstreamalignment: >-
    Align with downstream adaptive GNN objectives for retrieval-augmented
    forecasting, slice-transition prediction, and explanation of how material
    chokepoints and ideology reshape firm-state structure.
  failuremodestowatch:
    - "Schema explains everything through branding and ignores compute materiality."
    - "Schema models firms and the state but omits procurement and security channels."
    - "Schema captures policies as text but not as graphable constraints."
    - "Schema overweights ideology while underweighting cloud and chip dependence."
    - "Schema cannot distinguish concentration from legitimate coordination under safety rhetoric."
    - "Schema leaks 2026 state-security relevance backward into 2022."
  autoresearchobjectivehint: >-
    Search for graph designs that maximize retrieval of typed causal paths from
    compute and policy chokepoints to legitimacy and state alignment, while
    remaining portable to semiconductor, platform, and security-technology
    probes elsewhere in the suite.
  notes:
    - "This probe should remain transferable to other modern business-state convergence cases."
    - "All entities should be time-scoped or explicitly persistent."
    - "Machine-generated enrichments should remain separable from the human-authored core."
    - "The ontology should support fixed-dimensional node projections for downstream GNN training."