probeid: "6C-1"
family: "businessfamily6C"
name: "Big Tech Emergence, Platform Consolidation, and Political Reordering — Pre-Silicon Valley Foundations"
version: "0.1"
status: "candidate"
format: "probespecv2"
benchmark_pack: v0
compatibility_tier: v0-legacy
summary:
  purpose: >-
    Evaluate whether a single transferable graph IR can represent the prehistory of
    later Big Tech by linking Cold War state funding, defense demand, research
    universities, laboratories, semiconductor formation, regional clustering, and
    proto-network infrastructure in a form that supports grounded retrieval,
    structural querying, and downstream adaptive GNN training.
  rationale: >-
    This probe pressures the schema on a historically foundational business-state
    formation problem in which firms do not emerge from isolated entrepreneurship
    alone, but from dense interactions among federal R&D, military procurement,
    university-laboratory systems, technical ideology, early supply chains, and
    network infrastructure. It is intended as the historical substrate for later
    Big Tech probes, while explicitly preventing temporal leakage from mature
    platform logics back into 1945 to 1975.

scope:
  region: "Western / U.S."
  polity: >-
    The prehistory of Big Tech through Cold War research, universities,
    semiconductor roots, federal R&D, and proto-network infrastructure
  temporalwindow:
    startyear: 1945
    endyear: 1975
    label: "Cold War research state, semiconductors, universities, and proto-network infrastructure"
  recommendedslices:
    - sliceid: "6c1_postwar_research_state"
      startyear: 1945
      endyear: 1956
      label: "Postwar military research state and university-laboratory system"
    - sliceid: "6c1_semiconductor_origins"
      startyear: 1957
      endyear: 1968
      label: "Semiconductor industry formation, aerospace links, and regional clustering"
    - sliceid: "6c1_proto_network_infrastructure"
      startyear: 1969
      endyear: 1975
      label: "ARPA-networking, computing infrastructure, and early ecosystem institutionalization"
  exclusions:
    - "Do not import post-1975 venture-capital scaling, personal-computing mass markets, or software-platform dominance."
    - "Do not treat mature platform monopoly, app-store control, cloud concentration, or ad-tech extraction as present in this window."
    - "Do not backfill later firm identities, valuations, or consumer-market logics into earlier slices."
    - "Do not reduce defense demand to generic context; it must remain typed causal structure."
    - "Do not collapse university, lab, and contractor roles into one undifferentiated innovation sector."
    - "Do not treat Silicon Valley as the only relevant region; Route 128, military geographies, and federal centers remain in scope where causally relevant."

artifacts:
  humanauthored:
    - "Probe framing, scope boundaries, slice definitions, exclusions, and anti-leakage rules."
    - "Core ontology commitments for institutions, ideology, procurement, geography, and counterweights."
    - "Seed entities and supervised target definitions."
    - "Evaluation logic, negative tests, and ablation design."
  machinegenerated:
    - "Entity expansion from grounded sources into time-scoped node candidates."
    - "Alias resolution, cross-slice identity linking, and source-backed claim extraction."
    - "Candidate edges for funding, research collaboration, spinouts, procurement, standards, and diffusion."
    - "Target feature estimation from retrieved evidence available at or before each slice cutoff."
    - "Stress-test query generation and slice-transition comparison instances."

groundedsources:
  - source: "Wikidata"
    role: "Canonical entity IDs, aliases, dates, and institutional relationship scaffolding."
    required: true
  - source: "Wikipedia"
    role: "High-recall narrative grounding for events, organizations, technologies, and timeline verification."
    required: true
  - source: "Seshat"
    role: "Comparative historical framing when useful for state capacity, institutional complexity, and long-run context."
    required: false
  - source: "GDELT"
    role: "Retrospective salience or later memory of foundational events only; not primary evidence for the period itself."
    required: false
  - source: "U.S. government and defense-history sources"
    role: "Grounding for ARPA/DARPA, Department of Defense, procurement structures, federal R&D programs, and defense demand."
    required: true
  - source: "University and laboratory histories"
    role: "Grounding for Stanford, MIT, Bell Labs, Lincoln Laboratory, SRI, and related institutional pathways."
    required: true

corequestion: >-
  Can a single graph schema represent how Cold War state funding, universities,
  laboratories, semiconductors, military demand, and early networking
  infrastructure created the structural conditions for later Big Tech in a way
  that is queryable, temporally disciplined, and consumable by downstream GNNs?

historicaloranalyticalsubquestions:
  - "How did federal R&D programs, defense procurement, and national-security demand shape which technologies, labs, and firms became durable nodes in the ecosystem?"
  - "Which roles were played by research universities, federally linked laboratories, and hybrid public-private institutions in translating research capacity into organizational power?"
  - "How did semiconductor production, component supply chains, fabrication know-how, and aerospace demand interact during industry formation?"
  - "How should the graph represent ideology around innovation, anti-communism, security, scientific modernity, openness, and technical elite governance as typed causal structure rather than prose residue?"
  - "How did geographic clustering, land use, regional labor pipelines, military proximity, and research park development generate durable regional advantage?"
  - "What corporate formation, spinout, recruitment, and talent-circulation dynamics linked labs, universities, and early firms such as Shockley and Fairchild?"
  - "What counterweights or constraints limited or redirected growth, including cost, technical bottlenecks, antitrust memory, bureaucratic rivalry, academic norms, and procurement dependence?"
  - "What changes across the three slices distinguish postwar research-state formation, semiconductor industrialization, and proto-network infrastructural institutionalization?"

schemarequirements:
  mustrepresent:
    nodetypes:
      - "Actor"
      - "Firm"
      - "University"
      - "Laboratory"
      - "Institution"
      - "Office"
      - "FundingProgram"
      - "ResearchNetwork"
      - "Technology"
      - "Infrastructure"
      - "Event"
      - "Policy"
      - "Narrative"
      - "Norm"
      - "Counterweight"
      - "Shock"
      - "Claim"
      - "Region"
      - "SupplyChainNode"
      - "Investor"
    edgetypes:
      - "funds"
      - "researches"
      - "spinsoutfrom"
      - "procuresfrom"
      - "builds"
      - "standardizes"
      - "clustersin"
      - "legitimizes"
      - "constrains"
      - "recruitsfrom"
      - "collaborateswith"
      - "dependson"
      - "diffusesinto"
      - "respondsTo"
  mustsupport:
    - "Time-scoped entities with persistent identity and slice-local state."
    - "Typed distinction among funding, procurement, research collaboration, commercialization, and diffusion."
    - "Explicit ideology nodes and claims linked to institutions, policies, and events."
    - "Queryable geography with regions, clusters, and cross-region comparisons as first-class graph objects."
    - "Representation of supply-chain dependencies, fabrication capacity, and contractor relationships."
    - "Cross-slice transitions for clustering, commercialization, procurement, infrastructure, elite networks, and standards."
    - "Provenance-aware claims that can be retrieved and aggregated without flattening source distinctions."
    - "Fixed-dimensional node projection and edge-type stability for downstream GNN training."
  antirequirements:
    - "Forbid reducing the story to garage-founder mythology."
    - "Forbid flattening military demand into background context."
    - "Forbid collapsing ideology into text blobs."
    - "Forbid treating geography as untyped backdrop only."
    - "Forbid reading later platform logic backward into 1945-1975."

