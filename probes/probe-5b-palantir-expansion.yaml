probeid: "6B-2"
parentprobe: "6B"
name: "Palantir Counterterror Expansion and Institutional Normalization"
version: "0.1"
status: candidate
format: probespecv2
benchmark_pack: v0
compatibility_tier: v0-legacy

summary:
  purpose: "Evaluate whether a transferable graph schema can represent Palantir's 2009 to 2016 expansion through counterterror demand, defense-intelligence procurement, institutional normalization, platform deployment, and growing public-sector dependence."
  rationale: "This subprobe isolates the scale-and-normalization grammar of the parent 6B case so the IR can be tested on contracts, agency breadth, procurement pathways, product deployment, and accepted institutional legitimacy without contamination from later border-security politicization or AI-war-tech branding."

scope:
  region: "Western / U.S. with limited allied extensions where evidenced"
  polity: "Palantir as an expanding firm-state-security platform during counterterror normalization"
  temporalwindow:
    startyear: 2009
    endyear: 2016
    label: "Counterterror expansion, defense-intelligence embedding, and Obama-era institutional normalization"
  recommendedslices:
    - sliceid: "6b2_counterterror_normalization"
      startyear: 2009
      endyear: 2016
      label: "Counterterror-era scaling, contract expansion, and normalized embedding"
  exclusions:
    - "Do not frame the period only as startup growth with no procurement structure."
    - "Do not import Trump-era border controversy into this slice."
    - "Do not treat contracts only as revenue totals."
    - "Do not collapse intelligence, defense, and policing institutions into one customer node."
    - "Do not project later AI-war-tech legitimacy backward."

artifacts:
  humanauthored:
    - "Canonical subprobe boundary for 2009 to 2016"
    - "Ontology commitments for procurement channels, contracts, agencies, products, and legitimating narratives"
    - "Target definitions for institutional embedding and procurement dependence"
    - "Negative tests and ablations"
  machinegenerated:
    - "Entity linking and temporal resolution for agencies, products, and contracts"
    - "Contract-path enrichment from public procurement records"
    - "Narrative extraction from public reporting and investor materials"
    - "Fixed-dimensional node projections for downstream GNN use"

groundedsources:
  - source: "Wikidata"
    role: "Canonical IDs for actors, institutions, products, and firms"
    required: true
  - source: "Wikipedia"
    role: "Chronology, product and contract history, controversies, and public institutional relationships"
    required: true
  - source: "GDELT"
    role: "Narrative dynamics and public visibility around security, efficiency, and institutional growth"
    required: true
  - source: "ICEWS"
    role: "Optional structured political and security interaction signals relevant to institutional embedding"
    required: false
  - source: "SEC filings / annual reports / investor letters"
    role: "Public disclosures and strategic identity claims, especially customer concentration and institutional positioning"
    required: true
  - source: "U.S. federal procurement or contract databases"
    role: "Contract objects, agency pathways, award timing, and procurement structure"
    required: true

corequestion: "Can a single graph schema represent how Palantir scaled through counterterror demand, procurement channels, agency embedding, product deployment, and normalization narratives in a way that remains queryable, temporally disciplined, and usable by downstream GNNs?"

subquestions:
  - "Which agencies and procurement pathways drove Palantir's expansion during 2009 to 2016?"
  - "How should contracts be represented as distinct from the procurement channel, the customer institution, and the deployed product?"
  - "Which products became central to institutional embedding, and how did their role differ across agencies?"
  - "Which narratives around efficiency, security, and mission legitimacy normalized Palantir within defense and intelligence settings?"
  - "What degree of dependence on public-sector demand and long procurement cycles structured growth in this period?"
  - "Which counterweights, including concentration risk, scrutiny, and scaling frictions, were present but not decisive?"
  - "How can the graph distinguish real institutional embedding from marketing claims or general visibility?"
  - "What within-slice changes mark the shift from niche access to normalized institutional presence?"

schemarequirements:
  mustrepresent:
    nodetypes:
      - "Actor"
      - "Firm"
      - "Investor"
      - "Institution"
      - "Office"
      - "ProcurementChannel"
      - "Contract"
      - "PlatformProduct"
      - "Event"
      - "Policy"
      - "Narrative"
      - "Norm"
      - "Counterweight"
      - "Shock"
      - "Claim"
      - "SecurityApparatus"
      - "MilitaryFormation"
      - "RegulatoryBody"
      - "MediaNarrative"
    edgetypes:
      - "procuresfrom"
      - "contractswith"
      - "embedsin"
      - "integrateswith"
      - "scales"
      - "dependson"
      - "legitimizes"
      - "delegitimizes"
      - "constrains"
      - "alignswith"
      - "marketsas"
      - "scrutinizes"
      - "regulates"
      - "respondsTo"
      - "funds"
      - "investsin"
  mustsupport:
    - "Explicit contract objects distinct from institutions, procurement channels, and products."
    - "Time-scoped embedding across agencies and apparatus types."
    - "Typed representation of legitimizing narratives and operational norms."
    - "Public-sector dependence and customer concentration as graphable structure."
    - "Cross-slice identity continuity with 6B-1 and later child probes."
    - "Evidence-level provenance for all contract and agency relationships."
    - "Fixed-dimensional node projections for downstream GNN use."
  antirequirements:
    - "Do not collapse contracts into revenue aggregates."
    - "Do not collapse intelligence, defense, and policing institutions."
    - "Do not flatten ideology into text blobs."
    - "Do not infer embedding from later fame."
    - "Do not import later politicization into this slice."

