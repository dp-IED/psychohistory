generictargetinterface:
  graphleveltargets:
    - target: "capacityscore"
      description: "Operational and institutional capacity implied by contracts, agency breadth, and product deployment."
      computableat: "slice cutoff only"
    - target: "stateembeddingscore"
      description: "Depth and breadth of embedding across intelligence, defense, and other public-sector institutions."
      computableat: "slice cutoff only"
    - target: "procurementdependencyscore"
      description: "Degree of dependence on public-sector procurement pathways for growth."
      computableat: "slice cutoff only"
    - target: "institutionallegitimacyscore"
      description: "Net accepted legitimacy inside state institutions by the cutoff."
      computableat: "slice cutoff only"
    - target: "counterweightstrengthscore"
      description: "Strength of constraints active during this period."
      computableat: "slice cutoff only"
  slicetransitiontargets:
    - target: "procurementdelta"
      description: "Within-slice change in procurement breadth and pathway complexity."
    - target: "embeddingdelta"
      description: "Within-slice change in agency reach and depth of institutional integration."
    - target: "productdeploymentdelta"
      description: "Within-slice change in visible product deployment across agencies."

probetasks:
  retrievaltasks:
    - "Which institutions and procurement channels drove Palantir's expansion in this slice?"
    - "Which products were central to institutional embedding, and for which agencies?"
    - "Which narratives legitimized Palantir as necessary, efficient, or mission-critical?"
    - "What counterweights constrained growth, and why were they not decisive?"
  structuraltasks:
    - "Represent a contract as distinct from product, procurement channel, and customer institution."
    - "Construct typed paths from agencies to procurement channels to contracts to products."
    - "Separate institutional legitimacy from media narrative."
    - "Preserve continuity with 6B-1 while allowing relation changes."
  gnntasks:
    - "Predict procurementdependencyscore from graph structure."
    - "Predict embeddingdelta from procurement and product features."
    - "Classify whether growth is driven more by institutional breadth or product-depth integration."

labelsandtargets:
  capacityscore:
    description: "Operational and institutional scaling capacity."
    sourcepriority:
      - "U.S. federal procurement or contract databases"
      - "SEC filings / annual reports / investor letters"
      - "Wikipedia"
    leakagerule: "Use only contracts, deployments, and relationships evidenced by or before 2016."
    targetconstructionrule: "Combine normalized features for agency breadth, contract structure, and product deployment into a bounded score."
  stateembeddingscore:
    description: "Depth of Palantir's embedding in state institutions."
    sourcepriority:
      - "U.S. federal procurement or contract databases"
      - "Wikipedia"
      - "ICEWS"
    leakagerule: "Require explicit pre-cutoff agency ties."
    targetconstructionrule: "Aggregate agency diversity, continuity, and product integration evidence."
  procurementdependencyscore:
    description: "Extent of dependence on public-sector procurement."
    sourcepriority:
      - "SEC filings / annual reports / investor letters"
      - "U.S. federal procurement or contract databases"
    leakagerule: "Use only contemporaneous customer and contract exposure."
    targetconstructionrule: "Map concentration and centrality of public-sector contracts into a bounded score."
  institutionallegitimacyscore:
    description: "Net institutional legitimacy during the normalization period."
    sourcepriority:
      - "GDELT"
      - "Wikipedia"
      - "SEC filings / annual reports / investor letters"
    leakagerule: "Exclude later political controversies or AI-war-tech reframing."
    targetconstructionrule: "Aggregate legitimizing institutional and narrative relations minus active delegitimizing structures."
  counterweightstrengthscore:
    description: "Strength of constraints and scrutiny active during the slice."
    sourcepriority:
      - "GDELT"
      - "Wikipedia"
      - "SEC filings / annual reports / investor letters"
    leakagerule: "Count only pre-2017 counterweights."
    targetconstructionrule: "Score number, persistence, and authority of constraining nodes and edges."

evaluation:
  stage1validitychecks:
    - "Verify one slice covering 2009 through 2016."
    - "Verify contracts, procurement channels, agencies, and products are distinct typed objects."
    - "Verify public-sector institutions are not collapsed into one generic state node."
    - "Verify all contract and legitimacy relations are time-scoped."
  stage2groundingmetrics:
    - "Entity-link precision for agencies, products, and firms"
    - "Contract-path grounding coverage against public procurement records"
    - "Chronology consistency across product and agency relations"
  stage3retrievalmetrics:
    - "Accuracy of procurement-path retrieval"
    - "Product-to-agency linkage fidelity"
    - "Counterweight retrieval recall"
    - "Legitimacy narrative separation accuracy"
  stage4predictionmetrics:
    - "Graph-level target accuracy for stateembeddingscore and procurementdependencyscore"
    - "Within-slice delta accuracy for embeddingdelta and productdeploymentdelta"
    - "Ablation gain from adding procurement and ideology over material-only baseline"
  wincondition: "The schema wins if it represents contracts, procurement channels, agency embedding, products, and legitimacy as separate but queryable structures and improves prediction when procurement and ideology are included."

negativetests:
  - "Treat contracts only as revenue totals."
  - "Treat all state customers as one node."
  - "Return efficiency and mission legitimacy as an untyped paragraph."
  - "Infer deep embedding from later public prominence."
  - "Collapse Gotham, Foundry, agencies, and contracts into a generic platform blob."

ablationsuite:
  - "materialonly"
  - "materialplusinstitutions"
  - "materialplusinstitutionsplusideology"
  - "materialplusinstitutionsplusprocurement"
  - "fullmodelwithcounterweights"

splits:
  suggestedtrain:
    - "6b2_counterterror_normalization"
  suggestedvalidation:
    - "heldout_contract_and_agency_subset"
  suggestedstresstest:
    - "transfer_to_6B-3"

bridgerole:
  modernbridge: "Institutional-normalization business-state probe"
  purpose: "Bridge founding-stage access and later politicized scale by forcing procurement, contracts, and institutional embedding into a transferable ontology."
  downstreamalignment:
    - "Aligns with 6B-1 on identity continuity"
    - "Aligns with 6B-3 on preserved institutions, products, and counterweight structure"
    - "Aligns with semiconductor and other state-demand probes through procurement ontology"
  failuremodestowatch:
    - "Contract flattening"
    - "State homogenization"
    - "Narrative blobification"
    - "Backward leakage from later slices"
  autoresearchobjectivehint: "Prefer schemas that improve retrieval and prediction when procurement and institutional embedding are first-class objects."
  notes:
    - "This child probe should reward genuine procurement structure, not just growth summaries."